<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="color-scheme" content="dark">
<title>Compliance Grid</title>
<script src="content.js"></script>
<style>
  :root {
    --bg: #0a0a0d;
    --card: #15151c;
    --card-border: #26262f;
    --text: #eceef2;
    --text-dim: #9a9aa8;
    --text-faint: #66667a;
    --teal: #2dd4bf;
    --teal-dim: #164e46;
    --amber: #f5a524;
    --amber-dim: #4d380f;
    --red: #f5455c;
    --red-dim: #4d1620;
    --violet: #8b7cf6;
    --violet-dim: #322a5c;
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100%;
  }

  body {
    background:
      radial-gradient(circle at 50% -10%, #1b1b26 0%, var(--bg) 55%);
    background-attachment: fixed;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding: env(safe-area-inset-top, 0) 16px env(safe-area-inset-bottom, 0);
    display: flex;
    flex-direction: column;
  }

  button {
    font-family: inherit;
    border: none;
    background: none;
    color: inherit;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button:disabled { opacity: 0.4; cursor: default; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 2px 8px;
    position: sticky;
    top: 0;
    z-index: 5;
    background: linear-gradient(var(--bg) 70%, transparent);
  }
  .topbar .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    background: var(--card);
    border: 1px solid var(--card-border);
  }
  .topbar .title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--text-dim);
  }
  .topbar .spacer { width: 40px; }

  h1, h2, h3, p { margin: 0; }

  .app-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 8px 0 2px;
  }
  .app-subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 20px;
  }

  .game-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 10px 0 26px;
    text-align: center;
  }
  .game-logo .mark {
    width: 42px;
    height: 42px;
    border-radius: 13px;
    background: linear-gradient(160deg, var(--violet-dim), #1c1c25);
    border: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 21px;
    flex-shrink: 0;
  }
  .game-logo .word {
    font-size: 23px;
    font-weight: 800;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    background: linear-gradient(120deg, var(--text) 25%, var(--violet) 95%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .chapter-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 24px;
  }

  .chapter-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .chapter-card .row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .chapter-card .row1-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chapter-icon {
    font-size: 24px;
    line-height: 1;
    flex-shrink: 0;
    color: var(--text-dim);
    display: inline-flex;
  }
  .chapter-card .num {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 0.05em;
  }
  .chapter-card .name {
    font-size: 18px;
    font-weight: 600;
    margin-top: 2px;
  }
  .chapter-card .topic {
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.4;
  }
  .chapter-card .meta-row {
    display: flex;
    gap: 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .chapter-card .meta-row b { color: var(--text); }
  .chapter-card .meta-row .card-streak { color: var(--amber); font-weight: 700; }
  .segment-track {
    display: flex;
    gap: 4px;
    margin-top: 2px;
  }
  .segment {
    flex: 1;
    height: 5px;
    border-radius: 3px;
    background: #232330;
  }
  .segment.filled { background: var(--violet); }
  .chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: var(--violet-dim);
    color: var(--violet);
    font-size: 15px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 22px;
  }

  .briefing-eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--violet);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .briefing-eyebrow svg { width: 14px; height: 14px; flex-shrink: 0; }
  .briefing-title {
    font-size: 24px;
    font-weight: 700;
    margin: 8px 0 12px;
    line-height: 1.2;
  }
  .briefing-desc {
    color: var(--text-dim);
    font-size: 14.5px;
    line-height: 1.55;
    margin-bottom: 18px;
  }
  .objectives {
    list-style: none;
    padding: 0;
    margin: 0 0 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .objectives li {
    display: flex;
    gap: 10px;
    font-size: 13.5px;
    line-height: 1.4;
    color: var(--text);
  }
  .objectives li::before {
    content: "";
    min-width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--teal);
    margin-top: 6px;
  }
  .article-range {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    border-top: 1px solid var(--card-border);
    padding-top: 14px;
  }

  .btn-primary {
    width: 100%;
    padding: 16px;
    border-radius: var(--radius-md);
    background: var(--violet);
    color: #0a0a0d;
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
  }
  .btn-secondary {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-md);
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text);
    font-weight: 600;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 10px;
  }

  .q-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    margin-bottom: 14px;
  }
  .diff-tag {
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .diff-easy { background: var(--teal-dim); color: var(--teal); }
  .diff-medium { background: var(--amber-dim); color: var(--amber); }
  .diff-hard { background: var(--red-dim); color: var(--red); }

  .task-prompt {
    font-size: 16.5px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 12px;
  }
  .scenario {
    background: #1c1c25;
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 6px;
  }
  .option-btn {
    text-align: left;
    padding: 15px 16px;
    border-radius: var(--radius-md);
    background: #1c1c25;
    border: 1.5px solid var(--card-border);
    font-size: 14.5px;
    line-height: 1.4;
    transition: border-color .15s, background .15s;
    min-height: 48px;
  }
  .option-btn.passflag-pass { }
  .option-btn.passflag-flag { }
  .option-btn.selected {
    border-color: var(--violet);
    background: var(--violet-dim);
  }
  .option-btn.reveal-correct {
    border-color: var(--teal);
    background: var(--teal-dim);
  }
  .option-btn.reveal-wrong {
    border-color: var(--red);
    background: var(--red-dim);
  }
  .option-btn:disabled { opacity: 1; }

  .options.duo {
    flex-direction: row;
  }
  .options.duo .option-btn {
    flex: 1;
    text-align: center;
    font-weight: 700;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 64px;
  }


  .select-counter {
    display: inline-flex;
    align-items: center;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.03em;
    color: var(--text-dim);
    background: #1c1c25;
    border: 1px solid var(--card-border);
    padding: 5px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .select-counter-done {
    color: var(--violet);
    border-color: var(--violet);
  }

  .gloss {
    color: var(--violet);
    border-bottom: 1px dotted var(--violet);
    cursor: pointer;
    white-space: nowrap;
  }
  .gloss sup { font-size: 9px; margin-left: 1px; }

  .feedback-sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 20;
    display: flex;
    justify-content: center;
    padding: 0 12px env(safe-area-inset-bottom, 0);
    pointer-events: none;
  }
  .feedback-sheet .inner {
    pointer-events: auto;
    width: 100%;
    max-width: 456px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-bottom: none;
    border-radius: 22px 22px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0));
    box-shadow: 0 -12px 40px rgba(0,0,0,0.5);
    animation: sheet-up .22s ease-out;
  }
  @keyframes sheet-up {
    from { transform: translateY(16px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .feedback-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .feedback-label {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .feedback-label.ok { color: var(--teal); }
  .feedback-label.no { color: var(--red); }
  .feedback-minimize {
    width: 30px;
    height: 30px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    background: #1c1c25;
    border: 1px solid var(--card-border);
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .feedback-text {
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 6px;
    white-space: pre-line;
  }
  .feedback-cite {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    margin-bottom: 16px;
  }
  .feedback-choice-row {
    display: flex;
    gap: 10px;
  }
  .feedback-choice-row .btn-primary,
  .feedback-choice-row .btn-secondary {
    margin-top: 0;
  }

  .feedback-tab {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 20;
    display: flex;
    justify-content: center;
    padding: 0 12px calc(16px + env(safe-area-inset-bottom, 0));
    pointer-events: none;
  }
  .feedback-tab button {
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 30px;
    padding: 11px 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    animation: sheet-up .18s ease-out;
  }
  .feedback-tab .fb-icon.ok { color: var(--teal); }
  .feedback-tab .fb-icon.no { color: var(--red); }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,8,11,0.86);
    backdrop-filter: blur(6px);
    z-index: 30;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .overlay-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 28px 24px;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }
  .overlay-card h2 { font-size: 20px; margin-bottom: 8px; }
  .overlay-card p { color: var(--text-dim); font-size: 14px; margin-bottom: 18px; line-height: 1.5; }

  .glossary-popover .overlay-card { text-align: left; }
  .glossary-term { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
  .glossary-def { font-size: 14px; line-height: 1.5; color: var(--text); margin-bottom: 10px; }
  .glossary-src { font-family: var(--mono); font-size: 11.5px; color: var(--text-faint); }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%);
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text-dim);
    font-size: 12.5px;
    padding: 10px 16px;
    border-radius: 30px;
    z-index: 40;
  }

  .streak-strip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--amber);
    margin-bottom: 12px;
    animation: streak-pop .28s ease-out;
  }
  @keyframes streak-pop {
    0% { transform: scale(0.85) translateY(2px); opacity: 0.4; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .option-btn.reveal-correct {
    animation: correct-pop .32s ease-out;
  }
  @keyframes correct-pop {
    0% { transform: scale(1); }
    45% { transform: scale(1.035); }
    100% { transform: scale(1); }
  }
  .option-btn.reveal-wrong {
    animation: wrong-shake .28s ease-out;
  }
  @keyframes wrong-shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .feedback-label .fb-icon {
    display: inline-block;
    animation: pop-in .3s ease-out;
  }
  @keyframes pop-in {
    0% { transform: scale(0.3); opacity: 0; }
    60% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); }
  }

  /* ---------- quickcall reflex mechanic ---------- */
  .quickcall-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .quickcall-progress {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }
  .quickcall-timer {
    height: 4px;
    border-radius: 3px;
    background: #232330;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .quickcall-timer-fill {
    height: 100%;
    background: var(--violet);
    border-radius: 3px;
    width: 100%;
    transform-origin: left;
    animation: timer-shrink 4.2s linear forwards;
  }
  @keyframes timer-shrink {
    from { transform: scaleX(1); }
    to { transform: scaleX(0); }
  }
  .quickcall-scenario {
    background: #1c1c25;
    border: 1.5px solid var(--card-border);
    border-radius: var(--radius-md);
    padding: 20px 18px;
    font-size: 16px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 18px;
    text-align: center;
  }
  .quickcall-options {
    display: flex;
    gap: 10px;
  }
  .quickcall-options .option-btn {
    flex: 1;
    text-align: center;
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 76px;
  }

  .summary-stat-row {
    display: flex;
    gap: 10px;
    margin: 18px 0;
  }
  .summary-stat {
    flex: 1;
    background: #1c1c25;
    border-radius: var(--radius-sm);
    padding: 14px 8px;
    text-align: center;
  }
  .summary-stat .n {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
  }
  .summary-stat .l {
    font-size: 10.5px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 3px;
  }
  .summary-stat.highlight {
    background: var(--amber-dim);
  }
  .summary-stat.highlight .n {
    color: var(--amber);
  }
  .complete-payoff {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--violet);
    letter-spacing: 0.02em;
    margin-bottom: 4px;
  }

  .footer-space { height: 24px; flex-shrink: 0; }

  .home-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px 8px;
    gap: 4px;
  }
  .home-badge {
    width: 76px;
    height: 76px;
    border-radius: 24px;
    background: linear-gradient(160deg, var(--violet-dim), #1c1c25);
    border: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin-bottom: 18px;
  }
  .home-title {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 10px;
  }
  .home-tagline {
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.5;
    max-width: 320px;
    margin-bottom: 18px;
  }
  .home-meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 0.03em;
  }
  .home-progress {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--violet);
    letter-spacing: 0.03em;
    margin-top: 6px;
  }
  .home-wrap .btn-primary {
    max-width: 260px;
    margin-top: 28px;
  }

  /* ---------- tiergate: assemble due-diligence steps, gate responds ---------- */
  .tiergate-wrap { margin-bottom: 6px; }
  .gate-visual {
    position: relative;
    height: 92px;
    border-radius: var(--radius-md);
    background: #1c1c25;
    border: 1.5px solid var(--card-border);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }
  .gate-leaf {
    position: absolute;
    top: 0; bottom: 0;
    width: 50%;
    background: linear-gradient(160deg, var(--teal-dim), #1c1c25);
    border: 1px solid var(--card-border);
    transition: transform .35s cubic-bezier(.2,.8,.2,1), background .35s;
  }
  .gate-leaf.gate-left { left: 0; }
  .gate-leaf.gate-right { right: 0; }
  .gate-visual.tier-standard .gate-leaf { background: linear-gradient(160deg, var(--amber-dim), #1c1c25); }
  .gate-visual.tier-enhanced .gate-leaf { background: linear-gradient(160deg, var(--red-dim), #1c1c25); }
  .gate-tier-label {
    position: relative;
    z-index: 2;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 12.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--card);
    border: 1px solid var(--card-border);
    transition: color .2s;
  }
  .gate-visual.tier-simplified .gate-tier-label { color: var(--teal); }
  .gate-visual.tier-standard .gate-tier-label { color: var(--amber); }
  .gate-visual.tier-enhanced .gate-tier-label { color: var(--red); }

  .tier-steps { display: flex; flex-direction: column; gap: 8px; margin-bottom: 6px; }
  .step-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    text-align: left;
    width: 100%;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    background: #1c1c25;
    border: 1.5px solid var(--card-border);
    font-size: 13.5px;
    color: var(--text-dim);
    transition: border-color .15s, background .15s, color .15s;
  }
  .step-chip .chk {
    width: 18px; height: 18px;
    border-radius: 5px;
    border: 1.5px solid var(--text-faint);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .step-chip.active { color: var(--text); border-color: var(--violet); background: var(--violet-dim); }
  .step-chip.active .chk { background: var(--violet); border-color: var(--violet); color: #0a0a0d; }
  .step-chip.locked { opacity: 0.6; }
  .step-chip .step-note { color: var(--text-faint); font-size: 11px; margin-left: 2px; }

  /* ---------- passflag: drag-to-decide stamp ---------- */
  .passflag-wrap { margin-bottom: 6px; }
  .passflag-track { display: flex; align-items: stretch; gap: 8px; }
  .passflag-side {
    flex: 1;
    min-height: 116px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    text-align: center;
  }
  .passflag-side .ic { font-size: 22px; }
  .passflag-side.side-pass { color: var(--teal); }
  .passflag-side.side-flag { color: var(--red); }
  .passflag-side.selected.side-pass { background: var(--teal-dim); border-color: var(--teal); }
  .passflag-side.selected.side-flag { background: var(--red-dim); border-color: var(--red); }
  .passflag-side.selected:not(.reveal-correct):not(.reveal-wrong) { animation: passflag-pop .22s ease-out; }
  @keyframes passflag-pop {
    0% { transform: scale(0.9); }
    55% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }
  .passflag-stage {
    width: 92px;
    flex-shrink: 0;
    min-height: 116px;
    border-radius: var(--radius-md);
    background: #1c1c25;
    border: 1.5px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .passflag-stamp {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 2.5px solid var(--text-faint);
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    cursor: grab;
    user-select: none;
    touch-action: none;
    background: var(--card);
    transition: transform .18s, border-color .18s, color .18s, background .18s;
  }
  .passflag-stamp:active { cursor: grabbing; }
  .passflag-stamp.disabled { cursor: default; }
  .passflag-stamp.lean-a[data-tone-a="pass"], .passflag-stamp.lean-b[data-tone-b="pass"] {
    border-color: var(--teal); color: var(--teal); background: var(--teal-dim);
  }
  .passflag-stamp.lean-a[data-tone-a="flag"], .passflag-stamp.lean-b[data-tone-b="flag"] {
    border-color: var(--red); color: var(--red); background: var(--red-dim);
  }
  .passflag-hint {
    text-align: center;
    font-size: 11.5px;
    color: var(--text-faint);
    margin-top: 10px;
    min-height: 14px;
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  'use strict';

  /* ---------- content (placeholder — replaced with verified question bank) ---------- */
  var APP_CONTENT = window.__COMPLIANCE_GRID_CONTENT__ || { chapters: [], glossary: [] };

  var CHAPTER_ORDER = ['foundations', 'reading_risk', 'the_gate', 'enhanced_measures', 'the_flag'];

  /* ---------- storage ---------- */
  var STORAGE_KEY = 'complianceGridProgress_v1';

  function defaultChapterProgress() {
    return {
      everCompleted: false,
      bestAccuracy: 0,
      bestStreak: 0,
      resume: { questionIndex: 0, correctCount: 0, answeredCount: 0, streak: 0 }
    };
  }

  function loadProgress() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { chapters: {} };
      var parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== 'object') return { chapters: {} };
      if (!parsed.chapters) parsed.chapters = {};
      return parsed;
    } catch (e) {
      return { chapters: {} };
    }
  }

  function saveProgress(p) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
    } catch (e) {
      showToast('Progress could not be saved on this device.');
    }
  }

  var progress = loadProgress();

  function chapterProgress(key) {
    if (!progress.chapters[key]) progress.chapters[key] = defaultChapterProgress();
    return progress.chapters[key];
  }

  /* ---------- app state ---------- */
  var state = {
    screen: 'home',
    chapterKey: null,
    paused: false,
    session: null,     // { questionIndex, correctCount, answeredCount, streak, answered:false, selection, pendingFollowup, currentIsFollowup }
    introducedTerms: {}
  };

  var ICON_ATTRS = 'viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" ' +
    'stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"';

  // Monochrome line icons (one restrained tone, styled via CSS `color` on .chapter-icon) —
  // literal shapes: open book, compass, door/gate, alert triangle, flag/pennant.
  var CHAPTER_ICON = {
    foundations: '<svg ' + ICON_ATTRS + '><path d="M12 5.5c-1.8-1.3-4-2-6.5-2A2 2 0 0 0 3.5 5.5v12a2 2 0 0 1 2-2c2.2 0 4.4.6 6 2m0-12c1.8-1.3 4-2 6.5-2a2 2 0 0 1 2 2v12a2 2 0 0 0-2-2c-2.2 0-4.4.6-6 2m0-12v12"/></svg>',
    reading_risk: '<svg ' + ICON_ATTRS + '><circle cx="12" cy="12" r="8.5"/><path d="M14.3 9.7 12.7 12.7 9.7 14.3l1.6-3z"/></svg>',
    the_gate: '<svg ' + ICON_ATTRS + '><rect x="5" y="3" width="14" height="18" rx="1.5"/><path d="M9.3 3v18"/><circle cx="7.2" cy="12" r="0.75" fill="currentColor" stroke="none"/></svg>',
    enhanced_measures: '<svg ' + ICON_ATTRS + '><path d="M12 4 3 20h18L12 4z"/><path d="M12 10.3v4.4"/><circle cx="12" cy="17.2" r="0.75" fill="currentColor" stroke="none"/></svg>',
    the_flag: '<svg ' + ICON_ATTRS + '><path d="M6 3v18"/><path d="M6 4.2h11l-3 3.8 3 3.8H6"/></svg>'
  };

  // Brand mark: an abstract grid-of-four (echoing "Compliance Grid") inside a gate-like
  // frame, reused at both the home badge and chapter-map logo sizes. No emoji, no clip-art.
  var BRAND_MARK = '<svg viewBox="0 0 32 32" width="58%" height="58%" fill="none" xmlns="http://www.w3.org/2000/svg">' +
    '<rect x="1" y="1" width="30" height="30" rx="9" stroke="var(--text-dim)" stroke-width="1.4" opacity="0.4"/>' +
    '<rect x="6" y="6" width="8.4" height="8.4" rx="2.4" fill="var(--violet)"/>' +
    '<rect x="17.6" y="6" width="8.4" height="8.4" rx="2.4" fill="var(--teal)"/>' +
    '<rect x="6" y="17.6" width="8.4" height="8.4" rx="2.4" fill="var(--amber)"/>' +
    '<rect x="17.6" y="17.6" width="8.4" height="8.4" rx="2.4" fill="var(--red)"/>' +
    '</svg>';

  function getChapter(key) {
    for (var i = 0; i < APP_CONTENT.chapters.length; i++) {
      if (APP_CONTENT.chapters[i].chapter_key === key) return APP_CONTENT.chapters[i];
    }
    return null;
  }

  function glossaryTerm(name) {
    var lower = (name || '').toLowerCase();
    for (var i = 0; i < APP_CONTENT.glossary.length; i++) {
      if (APP_CONTENT.glossary[i].term.toLowerCase() === lower) return APP_CONTENT.glossary[i];
    }
    return null;
  }

  /* ---------- glossary text annotation ---------- */
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function annotateGlossary(text) {
    if (!text) return '';
    var terms = APP_CONTENT.glossary.slice().sort(function (a, b) { return b.term.length - a.term.length; });
    var escaped = escapeHtml(text);
    terms.forEach(function (g) {
      var esc = g.term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      var re = new RegExp('\\b(' + esc + ')\\b', 'gi');
      escaped = escaped.replace(re, function (m) {
        return '<span class="gloss" data-action="show-glossary" data-term="' + escapeHtml(g.term) + '">' + m + '<sup class="qmark">?</sup></span>';
      });
    });
    return escaped;
  }

  function markIntroduced(chapterKey, text) {
    if (!text) return;
    if (!state.introducedTerms[chapterKey]) state.introducedTerms[chapterKey] = {};
    APP_CONTENT.glossary.forEach(function (g) {
      var re = new RegExp('\\b' + g.term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
      if (re.test(text)) state.introducedTerms[chapterKey][g.term] = true;
    });
  }

  /* ---------- haptics ---------- */
  function vibrate(pattern) {
    try { if ('vibrate' in navigator) navigator.vibrate(pattern); } catch (e) {}
  }

  /* ---------- shuffle: randomize option order per question, per showing ---------- */
  function shuffleArray(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  function shuffleQuestionOptions(q) {
    if (!q) return;
    if (Array.isArray(q.options)) shuffleArray(q.options);
    if (Array.isArray(q.items)) {
      q.items.forEach(function (item) {
        if (Array.isArray(item.options)) shuffleArray(item.options);
      });
    }
  }

  /* ---------- toast ---------- */
  var toastTimer = null;
  function showToast(msg) {
    var el = document.getElementById('toast');
    if (!el) {
      el = document.createElement('div');
      el.id = 'toast';
      el.className = 'toast';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.style.display = 'none'; }, 2600);
  }

  /* ---------- rendering ---------- */
  var app = document.getElementById('app');

  function render() {
    if (state.screen === 'home') return renderHome();
    if (state.screen === 'map') return renderMap();
    if (state.screen === 'briefing') return renderBriefing();
    if (state.screen === 'question') return renderQuestion();
    if (state.screen === 'complete') return renderComplete();
  }

  function renderHome() {
    var totalChapters = APP_CONTENT.chapters.length;
    var completed = 0;
    var anyProgress = false;
    APP_CONTENT.chapters.forEach(function (ch) {
      var cp = chapterProgress(ch.chapter_key);
      if (cp.everCompleted) completed += 1;
      if (cp.everCompleted || cp.resume.questionIndex > 0) anyProgress = true;
    });
    var html = '<div class="home-wrap">';
    html += '<div class="home-badge">' + BRAND_MARK + '</div>';
    html += '<h1 class="home-title">Compliance Grid</h1>';
    html += '<p class="home-tagline">Learn to stop money laundering by playing the system that stops it.</p>';
    html += '<div class="home-meta">' + totalChapters + ' chapters · 5-10 min each</div>';
    if (anyProgress) {
      html += '<div class="home-progress">' + completed + ' / ' + totalChapters + ' chapters complete</div>';
    }
    html += '<button class="btn-primary" data-action="enter-app">' + (anyProgress ? 'Continue ▶' : 'Start ▶') + '</button>';
    html += '</div>';
    app.innerHTML = html;
  }

  function topbar(opts) {
    opts = opts || {};
    var left = opts.back
      ? '<button class="icon-btn" data-action="back-to-map">←</button>'
      : '<span class="spacer"></span>';
    var right = opts.pause
      ? '<button class="icon-btn" data-action="pause">⏸</button>'
      : '<span class="spacer"></span>';
    return '<div class="topbar">' + left +
      '<span class="title">' + (opts.title || '') + '</span>' + right + '</div>';
  }

  function renderMap() {
    var html = topbar({});
    html += '<div class="game-logo"><span class="mark">' + BRAND_MARK + '</span><span class="word">Compliance Grid</span></div>';
    html += '<div class="chapter-list">';
    APP_CONTENT.chapters.slice().sort(function (a, b) {
      return CHAPTER_ORDER.indexOf(a.chapter_key) - CHAPTER_ORDER.indexOf(b.chapter_key);
    }).forEach(function (ch, i) {
      var idx = CHAPTER_ORDER.indexOf(ch.chapter_key);
      var cp = chapterProgress(ch.chapter_key);
      var total = ch.questions.length;
      var completionPct = cp.everCompleted ? 100 : Math.round((cp.resume.questionIndex / total) * 100);
      var action = ' data-action="open-chapter" data-chapter="' + ch.chapter_key + '"';
      html += '<div class="chapter-card"' + action + '>';
      html += '<div class="row1"><div class="row1-left"><span class="chapter-icon">' + (CHAPTER_ICON[ch.chapter_key] || '') + '</span><div>';
      html += '<div class="num">CHAPTER ' + (idx + 1) + '</div>';
      html += '<div class="name">' + escapeHtml(ch.briefing.title.split(':')[0].split('—')[0].trim() || ch.briefing.title) + '</div>';
      html += '</div></div>';
      html += '<span class="chip">' + (cp.everCompleted ? '✓' : '▶') + '</span>';
      html += '</div>';
      var filled = cp.everCompleted ? total : cp.resume.questionIndex;
      html += '<div class="segment-track">';
      for (var si = 0; si < total; si++) {
        html += '<div class="segment' + (si < filled ? ' filled' : '') + '"></div>';
      }
      html += '</div>';
      html += '<div class="meta-row"><span>PROGRESS <b>' + completionPct + '%</b></span>' +
        (cp.bestStreak >= 2 ? '<span class="card-streak">🔥 ' + cp.bestStreak + '</span>' : '') + '</div>';
      html += '</div>';
    });
    html += '</div><div class="footer-space"></div>';
    app.innerHTML = html;
  }

  function renderBriefing() {
    var ch = getChapter(state.chapterKey);
    var cp = chapterProgress(state.chapterKey);
    var midway = !cp.everCompleted && cp.resume.questionIndex > 0;
    var html = topbar({ back: true, title: 'Chapter briefing' });
    html += '<div class="card">';
    html += '<div class="briefing-eyebrow">' + (CHAPTER_ICON[ch.chapter_key] || '') + ' Briefing</div>';
    html += '<div class="briefing-title">' + escapeHtml(ch.briefing.title) + '</div>';
    html += '<div class="briefing-desc">' + escapeHtml(ch.briefing.description) + '</div>';
    html += '<ul class="objectives">';
    ch.briefing.objectives.forEach(function (o) { html += '<li>' + escapeHtml(o) + '</li>'; });
    html += '</ul>';
    html += '<div class="article-range">' + escapeHtml(ch.briefing.article_range) + '</div>';
    html += '</div>';
    html += '<button class="btn-primary" data-action="start-chapter" data-chapter="' + ch.chapter_key + '">' +
      (midway ? 'Resume ▶' : 'Start ▶') + '</button>';
    if (midway || cp.everCompleted) {
      html += '<button class="btn-secondary" data-action="restart-chapter" data-chapter="' + ch.chapter_key + '">⟳ Start over</button>';
    }
    html += '<div class="footer-space"></div>';
    app.innerHTML = html;
  }

  function currentQuestion() {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    if (s.currentIsFollowup) return s.pendingFollowup;
    return ch.questions[s.questionIndex];
  }

  function renderQuestion() {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    var q = currentQuestion();

    markIntroduced(state.chapterKey, (q.scenario || '') + ' ' + q.task_prompt);

    var html = topbar({ back: true, pause: true, title: ch.briefing.title });

    if (s.streak >= 2) {
      html += '<div class="streak-strip">🔥 ' + s.streak + ' in a row</div>';
    }

    var isQuickcall = q.mechanic === 'quickcall' && !s.currentIsFollowup;

    html += '<div class="q-meta">';
    if (!s.currentIsFollowup) {
      html += '<span>QUESTION ' + (s.questionIndex + 1) + ' / ' + ch.questions.length + '</span>';
      html += isQuickcall
        ? '<span class="diff-tag diff-hard">⚡ quick call</span>'
        : '<span class="diff-tag diff-' + q.difficulty + '">' + q.difficulty + '</span>';
    } else {
      html += '<span>FOLLOW-UP — SAME CONCEPT</span><span></span>';
    }
    html += '</div>';

    html += '<div class="card">';
    if (isQuickcall) {
      html += renderQuickcall(q, s);
    } else {
      html += '<div class="task-prompt">' + annotateGlossary(q.task_prompt) + '</div>';
      if (q.scenario) html += '<div class="scenario">' + annotateGlossary(q.scenario) + '</div>';
      html += renderOptions(q, s);
    }
    html += '</div>';

    if (isQuickcall) {
      var itemAnswered = s.quickcallItemSelection !== null && s.quickcallItemSelection !== undefined;
      var isLastItem = s.quickcallIndex >= q.items.length - 1;
      html += '<button class="btn-primary" data-action="quickcall-next" ' + (itemAnswered ? '' : 'disabled') + '>' +
        (itemAnswered ? (isLastItem ? 'See results ▶' : 'Next ⚡') : 'Tap an answer above') + '</button>';
    } else {
      html += '<button class="btn-primary" data-action="confirm-answer" ' + (canConfirm(q, s) ? '' : 'disabled') + '>✓ Confirm</button>';
    }
    html += '<div class="footer-space"></div>';

    app.innerHTML = html;

    if (s.answered) {
      if (s.feedbackMinimized) renderFeedbackTab(q, s);
      else renderFeedbackSheet(q, s);
    }
  }

  function renderQuickcall(q, s) {
    var item = q.items[s.quickcallIndex];
    var html = '<div class="quickcall-wrap">';
    html += '<div class="task-prompt">' + annotateGlossary(q.task_prompt) + '</div>';
    html += '<div class="quickcall-progress">CALL ' + (s.quickcallIndex + 1) + ' / ' + q.items.length + '</div>';
    var answered = s.quickcallItemSelection !== null && s.quickcallItemSelection !== undefined;
    if (!answered) {
      html += '<div class="quickcall-timer"><div class="quickcall-timer-fill"></div></div>';
    }
    html += '<div class="quickcall-scenario">' + annotateGlossary(item.label) + '</div>';
    html += '<div class="options quickcall-options">';
    item.options.forEach(function (opt, i) {
      var cls = 'option-btn';
      var picked = s.quickcallItemSelection === i;
      if (answered) {
        if (opt.correct) cls += ' reveal-correct';
        else if (picked) cls += ' reveal-wrong';
      }
      html += '<button class="' + cls + '" ' + (answered ? 'disabled' : '') +
        ' data-action="select-quickcall-option" data-index="' + i + '">' + escapeHtml(opt.label) + '</button>';
    });
    html += '</div></div>';
    return html;
  }

  var DUO_LABEL_ICON = { pass: '✓ ', flag: '🚩 ', yes: '✓ ', no: '✕ ', true: '✓ ', false: '✕ ' };
  var DUO_LABEL_TONE = { pass: 'pass', yes: 'pass', true: 'pass', flag: 'flag', no: 'flag', false: 'flag' };

  var TIER_STEPS = [
    { label: 'Verify identity', locked: true },
    { label: 'Verify address', locked: false },
    { label: 'Confirm source of funds', locked: false },
    { label: 'Enhanced ongoing monitoring', locked: false }
  ];

  function tierForActiveCount(n) {
    if (n <= 1) return 'simplified';
    if (n <= 3) return 'standard';
    return 'enhanced';
  }

  function ensureTierSteps(s) {
    if (!Array.isArray(s.tierSteps)) s.tierSteps = [true, false, false, false];
    return s.tierSteps;
  }

  function syncTierSelection(q, s) {
    var steps = ensureTierSteps(s);
    var activeCount = steps.filter(Boolean).length;
    var tierKey = tierForActiveCount(activeCount);
    s.selection = q.options.findIndex(function (o) { return (o.tier || o.label || '').toLowerCase() === tierKey; });
  }

  function renderTierGate(q, s) {
    var steps = ensureTierSteps(s);
    if (!s.answered) syncTierSelection(q, s);
    var activeCount = steps.filter(Boolean).length;
    var tierKey = tierForActiveCount(activeCount);
    var pct = Math.round((activeCount - 1) / (steps.length - 1) * 46);
    var html = '<div class="tiergate-wrap">';
    html += '<div class="gate-visual tier-' + tierKey + '">';
    html += '<div class="gate-leaf gate-left" style="transform: translateX(-' + pct + '%)"></div>';
    html += '<div class="gate-leaf gate-right" style="transform: translateX(' + pct + '%)"></div>';
    html += '<div class="gate-tier-label">' + tierKey + '</div>';
    html += '</div>';
    html += '<div class="tier-steps">';
    TIER_STEPS.forEach(function (step, i) {
      var active = !!steps[i];
      var cls = 'step-chip' + (active ? ' active' : '') + (step.locked ? ' locked' : '');
      html += '<button class="' + cls + '" ' + ((s.answered || step.locked) ? 'disabled' : '') +
        ' data-action="toggle-tier-step" data-step="' + i + '">' +
        '<span class="chk">' + (active ? '✓' : '') + '</span>' + escapeHtml(step.label) +
        (step.locked ? ' <span class="step-note">(always required)</span>' : '') +
        '</button>';
    });
    html += '</div></div>';
    return html;
  }

  function renderPassflag(q, s) {
    var opt0 = q.options[0], opt1 = q.options[1];
    var tone0 = DUO_LABEL_TONE[(opt0.label || '').toLowerCase().trim()] || 'pass';
    var tone1 = DUO_LABEL_TONE[(opt1.label || '').toLowerCase().trim()] || 'flag';
    function sideHtml(opt, i, tone) {
      var picked = s.selection === i;
      var cls = 'option-btn passflag-side side-' + tone;
      if (!s.answered) { if (picked) cls += ' selected'; }
      else { if (opt.correct) cls += ' reveal-correct'; else if (picked) cls += ' reveal-wrong'; }
      var icon = DUO_LABEL_ICON[(opt.label || '').toLowerCase().trim()] || (tone === 'pass' ? '✓ ' : '🚩 ');
      return '<button class="' + cls + '" ' + (s.answered ? 'disabled' : '') +
        ' data-action="select-option" data-index="' + i + '"><span class="ic">' + icon + '</span>' + escapeHtml(opt.label) + '</button>';
    }
    var html = '<div class="passflag-wrap"><div class="passflag-track">';
    html += sideHtml(opt0, 0, tone0);
    html += '<div class="passflag-stage"><div class="passflag-stamp' + (s.answered ? ' disabled' : '') +
      '" data-tone-a="' + tone0 + '" data-tone-b="' + tone1 + '">⇄</div></div>';
    html += sideHtml(opt1, 1, tone1);
    html += '</div>';
    html += '<div class="passflag-hint">' + (s.answered ? '' : 'Drag the stamp, or tap a side') + '</div>';
    html += '</div>';
    return html;
  }

  function renderOptions(q, s) {
    if (!s.currentIsFollowup) {
      if (q.mechanic === 'tiergate') return renderTierGate(q, s);
      if (q.mechanic === 'passflag') return renderPassflag(q, s);
    }
    var isMulti = q.mechanic === 'multiselect' && !s.currentIsFollowup;
    var isDuo = q.options.length === 2;
    var html = '';

    if (isMulti) {
      var picked = Array.isArray(s.selection) ? s.selection.length : 0;
      var done = picked >= q.select_count;
      html += '<div class="select-counter' + (done ? ' select-counter-done' : '') + '">' +
        picked + ' / ' + q.select_count + ' selected</div>';
    }

    html += '<div class="options' + (isDuo ? ' duo' : '') + '">';
    q.options.forEach(function (opt, i) {
      var cls = 'option-btn';
      var picked = isMulti
        ? (Array.isArray(s.selection) && s.selection.indexOf(i) !== -1)
        : (s.selection === i);
      if (!s.answered) {
        if (picked) cls += ' selected';
      } else {
        if (opt.correct) cls += ' reveal-correct';
        else if (picked) cls += ' reveal-wrong';
      }
      var icon = isDuo ? (DUO_LABEL_ICON[(opt.label || '').toLowerCase().trim()] || '') : '';
      html += '<button class="' + cls + '" ' + (s.answered ? 'disabled' : '') +
        ' data-action="select-option" data-index="' + i + '">' + icon + escapeHtml(opt.label) + '</button>';
    });
    html += '</div>';
    return html;
  }

  function canConfirm(q, s) {
    if (s.answered) return false;
    if (q.mechanic === 'multiselect' && !s.currentIsFollowup) {
      return Array.isArray(s.selection) && s.selection.length === q.select_count;
    }
    return s.selection !== null && s.selection !== undefined;
  }

  function gradeCurrent(q, s) {
    if (q.mechanic === 'multiselect' && !s.currentIsFollowup) {
      var correctIdx = [];
      q.options.forEach(function (opt, i) { if (opt.correct) correctIdx.push(i); });
      var selected = s.selection.slice().sort();
      correctIdx.sort();
      if (selected.length !== correctIdx.length) return false;
      return selected.every(function (v, i) { return v === correctIdx[i]; });
    }
    return !!(q.options[s.selection] && q.options[s.selection].correct);
  }

  function renderFeedbackSheet(q, s) {
    removeFeedbackTab();
    var correct = s.lastCorrect;
    var sheet = document.createElement('div');
    sheet.className = 'feedback-sheet';
    var body;
    if (s.currentIsFollowup) {
      if (correct) {
        body = 'Correct.';
      } else {
        var correctOpt = q.options.filter(function (o) { return o.correct; })[0];
        body = 'Not quite — the correct answer is: ' + escapeHtml(correctOpt ? correctOpt.label : '');
      }
    } else {
      body = annotateGlossary(correct ? q.correct_feedback : q.incorrect_feedback);
    }
    var offerChoice = !correct && !s.currentIsFollowup && !!q.followup_question;
    var actions = offerChoice
      ? '<div class="feedback-choice-row">' +
        '<button class="btn-primary" data-action="continue-followup">Try an easier one →</button>' +
        '<button class="btn-secondary" data-action="continue-skip">Skip →</button>' +
        '</div>'
      : '<button class="btn-primary" data-action="continue">Continue →</button>';
    sheet.innerHTML =
      '<div class="inner">' +
      '<div class="feedback-header">' +
      '<div class="feedback-label ' + (correct ? 'ok' : 'no') + '"><span class="fb-icon">' + (correct ? '✓' : '✗') + '</span> ' + (correct ? 'Correct' : 'Not quite') + '</div>' +
      '<button class="feedback-minimize" data-action="minimize-feedback" aria-label="Minimize">⌄</button>' +
      '</div>' +
      '<div class="feedback-text">' + body + '</div>' +
      '<div class="feedback-cite">' + escapeHtml(q.article_citation || '') + '</div>' +
      actions +
      '</div>';
    document.body.appendChild(sheet);
  }

  function renderFeedbackTab(q, s) {
    removeFeedbackSheet();
    var correct = s.lastCorrect;
    var tab = document.createElement('div');
    tab.className = 'feedback-tab';
    tab.innerHTML =
      '<button data-action="expand-feedback">' +
      '<span class="fb-icon ' + (correct ? 'ok' : 'no') + '">' + (correct ? '✓' : '✗') + '</span>' +
      '<span>' + (correct ? 'Correct' : 'Not quite') + ' — tap to view</span>' +
      '</button>';
    document.body.appendChild(tab);
  }

  function removeFeedbackSheet() {
    var el = document.querySelector('.feedback-sheet');
    if (el) el.remove();
  }

  function removeFeedbackTab() {
    var el = document.querySelector('.feedback-tab');
    if (el) el.remove();
  }

  function renderComplete() {
    var ch = getChapter(state.chapterKey);
    var cp = chapterProgress(state.chapterKey);
    var idx = CHAPTER_ORDER.indexOf(state.chapterKey);
    var nextKey = CHAPTER_ORDER[idx + 1];
    var accuracy = Math.round(state.session.accuracyThisRun);
    var isBest = state.session.accuracyThisRun >= cp.bestAccuracy;

    var html = topbar({ back: true, title: 'Chapter complete' });
    html += '<div class="card">';
    html += '<div class="briefing-eyebrow">' + escapeHtml(ch.briefing.title) + '</div>';
    html += '<div class="briefing-title">Chapter complete</div>';
    if (accuracy >= 80) {
      html += '<div class="complete-payoff">🔥 Strong round' + (isBest ? ' — new personal best' : '') + '</div>';
    } else if (isBest && state.session.answeredCount) {
      html += '<div class="complete-payoff">✨ New personal best</div>';
    }
    html += '<div class="summary-stat-row">';
    html += '<div class="summary-stat"><div class="n" data-countup="' + accuracy + '">0%</div><div class="l">Accuracy</div></div>';
    html += '<div class="summary-stat"><div class="n">' + Math.round(cp.bestAccuracy) + '%</div><div class="l">Best</div></div>';
    html += '<div class="summary-stat highlight"><div class="n">🔥 ' + cp.bestStreak + '</div><div class="l">Best streak</div></div>';
    html += '</div>';
    if (nextKey) {
      html += '<div class="briefing-desc">Every chapter is open anytime — up next: “' + escapeHtml(getChapter(nextKey).briefing.title) + '”.</div>';
    } else {
      html += '<div class="briefing-desc">That was the final chapter. Jump into any chapter anytime from the map.</div>';
    }
    html += '</div>';
    if (nextKey) {
      html += '<button class="btn-primary" data-action="open-chapter" data-chapter="' + nextKey + '">Next chapter ▶</button>';
      html += '<button class="btn-secondary" data-action="back-to-map">Back to map</button>';
    } else {
      html += '<button class="btn-primary" data-action="back-to-map">Back to map</button>';
    }
    html += '<button class="btn-secondary" data-action="restart-chapter" data-chapter="' + state.chapterKey + '">⟳ Replay chapter</button>';
    html += '<div class="footer-space"></div>';
    app.innerHTML = html;
    animateCountUp();
  }

  function animateCountUp() {
    var el = document.querySelector('[data-countup]');
    if (!el) return;
    var target = parseInt(el.getAttribute('data-countup'), 10) || 0;
    var start = null;
    var duration = 650;
    function step(ts) {
      if (start === null) start = ts;
      var progress = Math.min(1, (ts - start) / duration);
      var eased = 1 - Math.pow(1 - progress, 3);
      el.textContent = Math.round(target * eased) + '%';
      if (progress < 1) window.requestAnimationFrame(step);
    }
    window.requestAnimationFrame(step);
  }

  function renderPauseOverlay() {
    var el = document.createElement('div');
    el.className = 'overlay';
    el.id = 'pause-overlay';
    el.innerHTML =
      '<div class="overlay-card">' +
      '<h2>Paused</h2>' +
      '<p>Your progress is saved. Resume whenever you’re ready.</p>' +
      '<button class="btn-primary" data-action="resume">▶ Resume</button>' +
      '<button class="btn-secondary" data-action="back-to-map">← Back to map</button>' +
      '</div>';
    document.body.appendChild(el);
  }

  function renderGlossaryPopover(term) {
    var g = glossaryTerm(term);
    if (!g) return;
    var el = document.createElement('div');
    el.className = 'overlay glossary-popover';
    el.id = 'glossary-overlay';
    el.innerHTML =
      '<div class="overlay-card">' +
      '<div class="glossary-term">' + escapeHtml(g.term) + '</div>' +
      '<div class="glossary-def">' + escapeHtml(g.definition) + '</div>' +
      '<div class="glossary-src">' + escapeHtml(g.source) + '</div>' +
      '<button class="btn-primary" data-action="close-glossary">✓ Got it</button>' +
      '</div>';
    document.body.appendChild(el);
  }

  /* ---------- actions ---------- */
  function startChapterSession(key, restart) {
    var ch = getChapter(key);
    var cp = chapterProgress(key);
    state.chapterKey = key;
    if (restart) {
      cp.resume = { questionIndex: 0, correctCount: 0, answeredCount: 0, streak: 0 };
      saveProgress(progress);
    }
    state.session = {
      questionIndex: cp.resume.questionIndex || 0,
      correctCount: cp.resume.correctCount || 0,
      answeredCount: cp.resume.answeredCount || 0,
      streak: cp.resume.streak || 0,
      answered: false,
      selection: null,
      currentIsFollowup: false,
      pendingFollowup: null,
      lastCorrect: null,
      accuracyThisRun: 0,
      quickcallIndex: 0,
      quickcallItemSelection: null,
      quickcallResults: [],
      feedbackMinimized: false,
      tierSteps: null
    };
    if (state.session.questionIndex >= ch.questions.length) {
      state.session.questionIndex = 0;
    }
    shuffleQuestionOptions(ch.questions[state.session.questionIndex]);
    state.screen = 'question';
    render();
  }

  function resetQuickcallState(s) {
    s.quickcallIndex = 0;
    s.quickcallItemSelection = null;
    s.quickcallResults = [];
  }

  function persistResume() {
    var cp = chapterProgress(state.chapterKey);
    var s = state.session;
    cp.resume = {
      questionIndex: s.questionIndex,
      correctCount: s.correctCount,
      answeredCount: s.answeredCount,
      streak: s.streak
    };
    saveProgress(progress);
  }

  function finishChapter() {
    var s = state.session;
    var cp = chapterProgress(state.chapterKey);
    var accuracy = s.answeredCount ? (s.correctCount / s.answeredCount) * 100 : 0;
    s.accuracyThisRun = accuracy;
    cp.everCompleted = true;
    cp.bestAccuracy = Math.max(cp.bestAccuracy, accuracy);
    cp.bestStreak = Math.max(cp.bestStreak, s.streak);
    cp.resume = { questionIndex: 0, correctCount: 0, answeredCount: 0, streak: 0 };
    saveProgress(progress);
    state.screen = 'complete';
    render();
  }

  function advanceAfterFollowup() {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    s.currentIsFollowup = false;
    s.pendingFollowup = null;
    advanceToNextQuestion();
  }

  function enterFollowup(q) {
    var s = state.session;
    s.currentIsFollowup = true;
    s.pendingFollowup = q.followup_question;
    s.answered = false;
    s.selection = null;
    s.feedbackMinimized = false;
    shuffleQuestionOptions(q.followup_question);
    render();
  }

  function advanceToNextQuestion() {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    s.questionIndex += 1;
    s.answered = false;
    s.selection = null;
    s.feedbackMinimized = false;
    s.tierSteps = null;
    resetQuickcallState(s);
    persistResume();
    if (s.questionIndex >= ch.questions.length) { finishChapter(); return; }
    shuffleQuestionOptions(ch.questions[s.questionIndex]);
    render();
  }

  function advanceAfterPrimary(wasCorrect) {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    var q = ch.questions[s.questionIndex];
    if (!wasCorrect && q.followup_question) {
      enterFollowup(q);
      return;
    }
    advanceToNextQuestion();
  }

  function handleAction(action, el) {
    if (action === 'enter-app') {
      state.screen = 'map';
      render();
    } else if (action === 'open-chapter') {
      state.chapterKey = el.getAttribute('data-chapter');
      state.screen = 'briefing';
      render();
    } else if (action === 'back-to-map') {
      removeFeedbackSheet();
      removeFeedbackTab();
      var po = document.getElementById('pause-overlay'); if (po) po.remove();
      state.screen = 'map';
      render();
    } else if (action === 'start-chapter') {
      startChapterSession(el.getAttribute('data-chapter'), false);
    } else if (action === 'restart-chapter') {
      startChapterSession(el.getAttribute('data-chapter'), true);
    } else if (action === 'pause') {
      state.paused = true;
      renderPauseOverlay();
    } else if (action === 'resume') {
      state.paused = false;
      var po2 = document.getElementById('pause-overlay'); if (po2) po2.remove();
    } else if (action === 'select-option') {
      if (state.session.answered) return;
      var qNow = currentQuestion();
      var idx = parseInt(el.getAttribute('data-index'), 10);
      if (qNow.mechanic === 'multiselect' && !state.session.currentIsFollowup) {
        if (!Array.isArray(state.session.selection)) state.session.selection = [];
        var pos = state.session.selection.indexOf(idx);
        if (pos !== -1) state.session.selection.splice(pos, 1);
        else if (state.session.selection.length < qNow.select_count) state.session.selection.push(idx);
        vibrate(8);
      } else {
        state.session.selection = idx;
      }
      render();
    } else if (action === 'toggle-tier-step') {
      if (state.session.answered) return;
      var qTier = currentQuestion();
      var stepIdx = parseInt(el.getAttribute('data-step'), 10);
      if (TIER_STEPS[stepIdx] && TIER_STEPS[stepIdx].locked) return;
      var steps = ensureTierSteps(state.session);
      steps[stepIdx] = !steps[stepIdx];
      syncTierSelection(qTier, state.session);
      vibrate(8);
      render();
    } else if (action === 'select-quickcall-option') {
      var sq = state.session;
      if (sq.quickcallItemSelection !== null && sq.quickcallItemSelection !== undefined) return;
      var qq = currentQuestion();
      var itemIdx = sq.quickcallIndex;
      var optIdx = parseInt(el.getAttribute('data-index'), 10);
      sq.quickcallItemSelection = optIdx;
      var itemCorrect = !!(qq.items[itemIdx].options[optIdx] && qq.items[itemIdx].options[optIdx].correct);
      sq.quickcallResults[itemIdx] = itemCorrect;
      vibrate(itemCorrect ? 12 : [15, 30]);
      render();
    } else if (action === 'quickcall-next') {
      var s3 = state.session;
      var q3 = currentQuestion();
      if (s3.quickcallItemSelection === null || s3.quickcallItemSelection === undefined) return;
      if (s3.quickcallIndex < q3.items.length - 1) {
        s3.quickcallIndex += 1;
        s3.quickcallItemSelection = null;
        render();
        return;
      }
      var aggregate = s3.quickcallResults.length === q3.items.length && s3.quickcallResults.every(function (r) { return r === true; });
      s3.lastCorrect = aggregate;
      s3.answered = true;
      s3.feedbackMinimized = false;
      s3.answeredCount += 1;
      if (aggregate) { s3.correctCount += 1; s3.streak += 1; } else { s3.streak = 0; }
      vibrate(aggregate ? 18 : [20, 40, 20]);
      render();
    } else if (action === 'confirm-answer') {
      var q = currentQuestion();
      var s = state.session;
      if (!canConfirm(q, s)) return;
      var correct = gradeCurrent(q, s);
      s.lastCorrect = correct;
      s.answered = true;
      s.feedbackMinimized = false;
      if (!s.currentIsFollowup) {
        s.answeredCount += 1;
        if (correct) { s.correctCount += 1; s.streak += 1; } else { s.streak = 0; }
      }
      vibrate(correct ? 18 : [20, 40, 20]);
      render();
    } else if (action === 'minimize-feedback') {
      state.session.feedbackMinimized = true;
      render();
    } else if (action === 'expand-feedback') {
      state.session.feedbackMinimized = false;
      render();
    } else if (action === 'continue') {
      removeFeedbackSheet();
      removeFeedbackTab();
      var s2 = state.session;
      var wasFollowup = s2.currentIsFollowup;
      var wasCorrect = s2.lastCorrect;
      if (wasFollowup) advanceAfterFollowup();
      else advanceAfterPrimary(wasCorrect);
    } else if (action === 'continue-followup') {
      removeFeedbackSheet();
      removeFeedbackTab();
      var ch4 = getChapter(state.chapterKey);
      enterFollowup(ch4.questions[state.session.questionIndex]);
    } else if (action === 'continue-skip') {
      removeFeedbackSheet();
      removeFeedbackTab();
      advanceToNextQuestion();
    } else if (action === 'show-glossary') {
      renderGlossaryPopover(el.getAttribute('data-term'));
    } else if (action === 'close-glossary') {
      var go = document.getElementById('glossary-overlay'); if (go) go.remove();
    }
  }

  document.addEventListener('click', function (e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    handleAction(el.getAttribute('data-action'), el);
  });

  /* ---------- passflag: drag-to-decide gesture (delegated, survives re-render) ---------- */
  var dragState = null;
  document.addEventListener('pointerdown', function (e) {
    var stampEl = e.target.closest('.passflag-stamp');
    if (!stampEl || stampEl.classList.contains('disabled')) return;
    var stage = stampEl.closest('.passflag-stage');
    dragState = { stampEl: stampEl, startX: e.clientX, dx: 0, max: stage ? stage.clientWidth / 2 + 30 : 100 };
    stampEl.style.transition = 'none';
  });
  document.addEventListener('pointermove', function (e) {
    if (!dragState) return;
    var dx = e.clientX - dragState.startX;
    dx = Math.max(-dragState.max, Math.min(dragState.max, dx));
    dragState.dx = dx;
    dragState.stampEl.style.transform = 'translateX(' + dx + 'px) rotate(' + (dx / 12) + 'deg)';
    dragState.stampEl.classList.remove('lean-a', 'lean-b');
    if (Math.abs(dx) > 14) dragState.stampEl.classList.add(dx < 0 ? 'lean-a' : 'lean-b');
  });
  document.addEventListener('pointerup', function () {
    if (!dragState) return;
    var ds = dragState;
    dragState = null;
    ds.stampEl.style.transition = '';
    ds.stampEl.style.transform = '';
    ds.stampEl.classList.remove('lean-a', 'lean-b');
    if (Math.abs(ds.dx) > 46) {
      var idx = ds.dx < 0 ? 0 : 1;
      var zone = document.querySelector('.passflag-side[data-index="' + idx + '"]');
      if (zone) handleAction('select-option', zone);
    }
  });

  /* ---------- glossary auto-surface on new terms ---------- */
  var origRenderQuestion = renderQuestion;

  render();
})();
</script>
</body>
</html>
