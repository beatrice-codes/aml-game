<body>
<div id="app"></div>
<script>
(function () {
  'use strict';

  /* ---------- content (placeholder — replaced with verified question bank) ---------- */
  var APP_CONTENT = window.__COMPLIANCE_GRID_CONTENT__ || { chapters: [], glossary: [] };

  var CHAPTER_ORDER = ['foundations', 'reading_risk', 'the_gate', 'enhanced_measures', 'the_flag'];

  /* ---------- storage ---------- */
  var STORAGE_KEY = 'complianceGridProgress_v1';
  var THEME_STORAGE_KEY = 'complianceGridTheme_v1';

  function applyTheme(theme) {
    if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
    else document.documentElement.removeAttribute('data-theme');
    var meta = document.getElementById('color-scheme-meta');
    if (meta) meta.setAttribute('content', theme === 'light' ? 'light' : 'dark');
  }

  function currentTheme() {
    return document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  }

  function toggleTheme() {
    var next = currentTheme() === 'light' ? 'dark' : 'light';
    applyTheme(next);
    try { localStorage.setItem(THEME_STORAGE_KEY, next); } catch (e) {}
  }

  function defaultChapterProgress() {
    return {
      everCompleted: false,
      bestAccuracy: 0,
      bestStreak: 0,
      resume: { questionIndex: 0, correctCount: 0, answeredCount: 0, streak: 0 }
    };
  }

  function loadProgress() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { chapters: {} };
      var parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== 'object') return { chapters: {} };
      if (!parsed.chapters) parsed.chapters = {};
      return parsed;
    } catch (e) {
      return { chapters: {} };
    }
  }

  function saveProgress(p) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
    } catch (e) {
      showToast('Progress could not be saved on this device.');
    }
  }

  var progress = loadProgress();

  function chapterProgress(key) {
    if (!progress.chapters[key]) progress.chapters[key] = defaultChapterProgress();
    return progress.chapters[key];
  }

  /* ---------- app state ---------- */
  var state = {
    screen: 'home',
    chapterKey: null,
    paused: false,
    session: null     // { questionIndex, correctCount, answeredCount, streak, answered:false, selection, pendingFollowup, currentIsFollowup }
  };

  var ICON_ATTRS = 'viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" ' +
    'stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"';

  // Monochrome line icons (one restrained tone, styled via CSS `color` on .chapter-icon) —
  // literal shapes: open book, compass, door/gate, alert triangle, flag/pennant.
  var CHAPTER_ICON = {
    foundations: '<svg ' + ICON_ATTRS + '><path d="M12 5.5c-1.8-1.3-4-2-6.5-2A2 2 0 0 0 3.5 5.5v12a2 2 0 0 1 2-2c2.2 0 4.4.6 6 2m0-12c1.8-1.3 4-2 6.5-2a2 2 0 0 1 2 2v12a2 2 0 0 0-2-2c-2.2 0-4.4.6-6 2m0-12v12"/></svg>',
    reading_risk: '<svg ' + ICON_ATTRS + '><circle cx="12" cy="12" r="8.5"/><path d="M14.3 9.7 12.7 12.7 9.7 14.3l1.6-3z"/></svg>',
    the_gate: '<svg ' + ICON_ATTRS + '><rect x="5" y="3" width="14" height="18" rx="1.5"/><path d="M9.3 3v18"/><circle cx="7.2" cy="12" r="0.75" fill="currentColor" stroke="none"/></svg>',
    enhanced_measures: '<svg ' + ICON_ATTRS + '><path d="M12 4 3 20h18L12 4z"/><path d="M12 10.3v4.4"/><circle cx="12" cy="17.2" r="0.75" fill="currentColor" stroke="none"/></svg>',
    the_flag: '<svg ' + ICON_ATTRS + '><path d="M6 3v18"/><path d="M6 4.2h11l-3 3.8 3 3.8H6"/></svg>'
  };

  // Brand mark: a thin-line violet "drop + gate" — a teardrop silhouette with two short
  // horizontal segments partway down suggesting a gate. Stroke only, no fill, no emoji.
  // The gate segments slide apart/together in a slow idle loop (see .gate-line CSS below);
  // reused at both the home badge and chapter-map logo sizes (same SVG, different scale).
  var BRAND_MARK = '<svg viewBox="0 0 32 32" width="58%" height="58%" fill="none" xmlns="http://www.w3.org/2000/svg">' +
    '<path d="M16 3.4c5.2 6.2 9.6 11.4 9.6 16.6a9.6 9.6 0 0 1-19.2 0c0-5.2 4.4-10.4 9.6-16.6z" stroke="var(--violet)" stroke-width="1.6" stroke-linejoin="round"/>' +
    '<line class="gate-line gate-line-a" x1="10.3" y1="20.5" x2="14" y2="20.5" stroke="var(--violet)" stroke-width="1.6" stroke-linecap="round"/>' +
    '<line class="gate-line gate-line-b" x1="18" y1="20.5" x2="21.7" y2="20.5" stroke="var(--violet)" stroke-width="1.6" stroke-linecap="round"/>' +
    '</svg>';

  var THEME_TOGGLE_HTML =
    '<button class="theme-toggle" data-action="toggle-theme" aria-label="Switch between dark and light theme">' +
    '<span class="theme-toggle-thumb">' +
    '<svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z"/></svg>' +
    '<svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.2M12 19.3v2.2M4.2 12H2M22 12h-2.2M5.6 5.6l1.6 1.6M16.8 16.8l1.6 1.6M18.4 5.6l-1.6 1.6M7.2 16.8l-1.6 1.6"/></svg>' +
    '</span></button>';

  function getChapter(key) {
    for (var i = 0; i < APP_CONTENT.chapters.length; i++) {
      if (APP_CONTENT.chapters[i].chapter_key === key) return APP_CONTENT.chapters[i];
    }
    return null;
  }

  function glossaryTerm(name) {
    var lower = (name || '').toLowerCase();
    for (var i = 0; i < APP_CONTENT.glossary.length; i++) {
      if (APP_CONTENT.glossary[i].term.toLowerCase() === lower) return APP_CONTENT.glossary[i];
    }
    return null;
  }

  /* ---------- glossary text annotation ---------- */
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function annotateGlossary(text) {
    if (!text) return '';
    var terms = APP_CONTENT.glossary.slice().sort(function (a, b) { return b.term.length - a.term.length; });
    var escaped = escapeHtml(text);
    terms.forEach(function (g) {
      var esc = g.term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      var re = new RegExp('\\b(' + esc + ')\\b', 'gi');
      escaped = escaped.replace(re, function (m) {
        return '<span class="gloss" data-action="show-glossary" data-term="' + escapeHtml(g.term) + '">' + m + '<sup class="qmark">?</sup></span>';
      });
    });
    return escaped;
  }

  /* ---------- haptics ---------- */
  function vibrate(pattern) {
    try { if ('vibrate' in navigator) navigator.vibrate(pattern); } catch (e) {}
  }

  /* ---------- juice: shared checkmark-draw + particle-burst helpers ---------- */
  function checkSvg(size) {
    return '<svg class="draw-check" viewBox="0 0 48 48" width="' + size + '" height="' + size + '">' +
      '<path d="M15 27 L22 34 L37 18" stroke-width="' + Math.max(3, Math.round(size / 6)) + '"/></svg>';
  }

  function drawCheckIn(svgEl) {
    if (!svgEl) return;
    var path = svgEl.querySelector('path');
    if (!path) return;
    var len = path.getTotalLength();
    path.style.strokeDasharray = len;
    path.style.strokeDashoffset = len;
    void path.getBoundingClientRect();
    path.style.transition = 'stroke-dashoffset .5s ease-out';
    path.style.strokeDashoffset = 0;
  }

  function spawnParticleBurst(x, y) {
    for (var i = 0; i < 8; i++) {
      (function (i) {
        var angle = (i / 8) * Math.PI * 2;
        var radius = 40;
        var dot = document.createElement('div');
        dot.className = 'burst-dot';
        dot.style.left = x + 'px';
        dot.style.top = y + 'px';
        dot.style.setProperty('--tx', (Math.cos(angle) * radius).toFixed(1) + 'px');
        dot.style.setProperty('--ty', (Math.sin(angle) * radius).toFixed(1) + 'px');
        document.body.appendChild(dot);
        setTimeout(function () { dot.remove(); }, 600);
      })(i);
    }
  }

  function burstFromElement(el) {
    if (!el) return;
    var r = el.getBoundingClientRect();
    spawnParticleBurst(r.left + r.width / 2, r.top + r.height / 2);
  }

  // Build-the-gate and Stamp are the two mechanics with an explicit "success
  // mark" moment (the gate's ripple+tick, the stamp's correct badge) — draw
  // the checkmark in and burst a few particles from it. No-ops for every
  // other mechanic and for a not-yet-answered or wrong answer.
  function triggerSuccessEffects(q, s) {
    if (!s.answered) return;
    if (q.mechanic === 'build_gate' && s.lastCorrect) {
      var ripple = document.querySelector('.gate-ripple');
      if (ripple) {
        drawCheckIn(ripple.querySelector('.draw-check'));
        burstFromElement(ripple);
      }
    } else if (q.mechanic === 'stamp') {
      document.querySelectorAll('.stamp-tile.reveal-correct .stamp-mark').forEach(function (mark) {
        drawCheckIn(mark.querySelector('.draw-check'));
        burstFromElement(mark);
      });
    }
  }

  /* ---------- shuffle: randomize option order per question, per showing ---------- */
  function shuffleArray(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  function shuffleQuestionOptions(q) {
    if (!q) return;
    if (Array.isArray(q.options)) shuffleArray(q.options);
    if (Array.isArray(q.items)) {
      q.items.forEach(function (item) {
        if (Array.isArray(item.options)) shuffleArray(item.options);
      });
    }
  }

  /* ---------- toast ---------- */
  var toastTimer = null;
  function showToast(msg) {
    var el = document.getElementById('toast');
    if (!el) {
      el = document.createElement('div');
      el.id = 'toast';
      el.className = 'toast';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.style.display = 'none'; }, 2600);
  }

  /* ---------- rendering ---------- */
  var app = document.getElementById('app');
  var lastScreenKey = null;

  // Wraps freshly-mounted screen HTML in a brief fade/slide-in, but only when
  // `key` actually changed — re-renders of the same screen (picking an option,
  // toggling a step) shouldn't replay the transition.
  function mountScreen(html, key) {
    var animate = key !== lastScreenKey;
    lastScreenKey = key;
    app.innerHTML = animate ? ('<div class="screen-enter">' + html + '</div>') : html;
  }

  function render() {
    if (state.screen === 'home') return renderHome();
    if (state.screen === 'map') return renderMap();
    if (state.screen === 'briefing') return renderBriefing();
    if (state.screen === 'question') return renderQuestion();
    if (state.screen === 'complete') return renderComplete();
  }

  function findContinueTarget() {
    for (var i = 0; i < CHAPTER_ORDER.length; i++) {
      var key = CHAPTER_ORDER[i];
      var ch = getChapter(key);
      if (!ch) continue;
      var cp = chapterProgress(key);
      if (!cp.everCompleted && cp.resume.questionIndex > 0) return { ch: ch, cp: cp };
    }
    return null;
  }

  function renderHome() {
    var totalChapters = APP_CONTENT.chapters.length;
    var completed = 0;
    var anyProgress = false;
    APP_CONTENT.chapters.forEach(function (ch) {
      var cp = chapterProgress(ch.chapter_key);
      if (cp.everCompleted) completed += 1;
      if (cp.everCompleted || cp.resume.questionIndex > 0) anyProgress = true;
    });
    var continueTarget = findContinueTarget();
    var html = '<div class="home-wrap">';
    html += THEME_TOGGLE_HTML;
    html += '<div class="home-badge">' + BRAND_MARK + '</div>';
    html += '<h1 class="home-title">Compliance Grid</h1>';
    html += '<p class="home-tagline">Learn to stop money laundering by playing the system that stops it.</p>';
    html += '<div class="home-meta">' + totalChapters + ' chapters · 5-10 min each</div>';
    if (anyProgress) {
      html += '<div class="home-progress">' + completed + ' / ' + totalChapters + ' chapters complete</div>';
    }
    if (continueTarget) {
      html += '<div class="continue-card" data-action="open-chapter" data-chapter="' + continueTarget.ch.chapter_key + '">' +
        '<div class="continue-eyebrow">Continue where you left off</div>' +
        '<div class="continue-name">' + escapeHtml(continueTarget.ch.briefing.title) + '</div>' +
        '<div class="continue-sub">Question ' + (continueTarget.cp.resume.questionIndex + 1) + ' of ' + continueTarget.ch.questions.length + '</div>' +
        '</div>';
      html += '<button class="btn-primary" data-action="open-chapter" data-chapter="' + continueTarget.ch.chapter_key + '">Continue ▶</button>';
      html += '<button class="btn-secondary" data-action="enter-app">Browse all chapters</button>';
    } else {
      html += '<button class="btn-primary" data-action="enter-app">Start ▶</button>';
    }
    html += '</div>';
    mountScreen(html, 'home');
  }

  function topbar(opts) {
    opts = opts || {};
    var left = opts.back
      ? '<button class="icon-btn" data-action="back-to-map">←</button>'
      : '<span class="spacer"></span>';
    var right = opts.pause
      ? '<button class="icon-btn" data-action="pause">⏸</button>'
      : '<span class="spacer"></span>';
    return '<div class="topbar">' + left +
      '<span class="title">' + (opts.title || '') + '</span>' + right + '</div>';
  }

  function renderMap() {
    var html = topbar({});
    html += '<div class="game-logo"><span class="mark">' + BRAND_MARK + '</span><span class="word">Compliance Grid</span></div>';
    html += '<div class="chapter-list">';
    APP_CONTENT.chapters.slice().sort(function (a, b) {
      return CHAPTER_ORDER.indexOf(a.chapter_key) - CHAPTER_ORDER.indexOf(b.chapter_key);
    }).forEach(function (ch, i) {
      var idx = CHAPTER_ORDER.indexOf(ch.chapter_key);
      var cp = chapterProgress(ch.chapter_key);
      var total = ch.questions.length;
      var completionPct = cp.everCompleted ? 100 : Math.round((cp.resume.questionIndex / total) * 100);
      var action = ' data-action="open-chapter" data-chapter="' + ch.chapter_key + '"';
      html += '<div class="chapter-card"' + action + '>';
      html += '<div class="row1"><div class="row1-left"><span class="chapter-icon">' + (CHAPTER_ICON[ch.chapter_key] || '') + '</span><div>';
      html += '<div class="num">CHAPTER ' + (idx + 1) + '</div>';
      html += '<div class="name">' + escapeHtml(ch.briefing.title.split(':')[0].split('—')[0].trim() || ch.briefing.title) + '</div>';
      html += '</div></div>';
      html += '<span class="chip">' + (cp.everCompleted ? '✓' : '▶') + '</span>';
      html += '</div>';
      html += '<div class="progress-track"><div class="liquid-fill" data-pct="' + completionPct + '"></div></div>';
      html += '<div class="meta-row"><span>PROGRESS <b>' + completionPct + '%</b></span>' +
        (cp.bestStreak >= 2 ? '<span class="card-streak">STREAK ' + cp.bestStreak + '</span>' : '') + '</div>';
      html += '</div>';
    });
    html += '</div><div class="footer-space"></div>';
    mountScreen(html, 'map');
    // Rendered at width:0 above so this first style change is a real transition,
    // not a no-op snap-to-value — same reason positionMatchThreads runs on a
    // rAF rather than synchronously.
    window.requestAnimationFrame(function () {
      document.querySelectorAll('.liquid-fill').forEach(function (el) {
        el.style.width = el.getAttribute('data-pct') + '%';
      });
    });
  }

  function renderBriefing() {
    var ch = getChapter(state.chapterKey);
    var cp = chapterProgress(state.chapterKey);
    var midway = !cp.everCompleted && cp.resume.questionIndex > 0;
    var html = topbar({ back: true, title: 'Chapter briefing' });
    html += '<div class="centered-body">';
    html += '<div class="card">';
    html += '<div class="briefing-eyebrow">' + (CHAPTER_ICON[ch.chapter_key] || '') + ' Briefing</div>';
    html += '<div class="briefing-title">' + escapeHtml(ch.briefing.title) + '</div>';
    html += '<div class="briefing-desc">' + escapeHtml(ch.briefing.description) + '</div>';
    html += '<ul class="objectives">';
    ch.briefing.objectives.forEach(function (o) { html += '<li>' + escapeHtml(o) + '</li>'; });
    html += '</ul>';
    html += '<div class="article-range">' + escapeHtml(ch.briefing.article_range) + '</div>';
    html += '</div>';
    html += '<button class="btn-primary" data-action="start-chapter" data-chapter="' + ch.chapter_key + '">' +
      (midway ? 'Resume ▶' : 'Start ▶') + '</button>';
    if (midway || cp.everCompleted) {
      html += '<button class="btn-secondary" data-action="restart-chapter" data-chapter="' + ch.chapter_key + '">⟳ Start over</button>';
    }
    html += '</div><div class="footer-space"></div>';
    mountScreen(html, 'briefing:' + ch.chapter_key);
  }

  function currentQuestion() {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    if (s.currentIsFollowup) return s.pendingFollowup;
    return ch.questions[s.questionIndex];
  }

  function renderQuestion() {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    var q = currentQuestion();

    var html = topbar({ back: true, pause: true, title: ch.briefing.title });
    html += '<div class="centered-body">';

    if (s.streak >= 2) {
      html += '<div class="streak-strip">' + s.streak + ' in a row</div>';
    }

    var isQuickcall = q.mechanic === 'quickcall' && !s.currentIsFollowup;
    var selfResolving = !s.currentIsFollowup && (
      q.mechanic === 'flip_card' ||
      q.mechanic === 'match_term' ||
      (q.mechanic === 'stamp' && !q.select_count)
    );

    html += '<div class="q-meta">';
    if (!s.currentIsFollowup) {
      html += '<span>QUESTION ' + (s.questionIndex + 1) + ' / ' + ch.questions.length + '</span>';
      html += isQuickcall
        ? '<span class="diff-tag diff-hard">QUICK CALL</span>'
        : '<span class="diff-tag diff-' + q.difficulty + '">' + q.difficulty + '</span>';
    } else {
      html += '<span>FOLLOW-UP — SAME CONCEPT</span><span></span>';
    }
    html += '</div>';

    html += '<div class="card">';
    if (isQuickcall) {
      html += renderQuickcall(q, s);
    } else {
      html += '<div class="task-prompt">' + annotateGlossary(q.task_prompt) + '</div>';
      if (q.scenario) html += '<div class="scenario">' + annotateGlossary(q.scenario) + '</div>';
      html += renderOptions(q, s);
    }
    html += '</div>';

    if (isQuickcall) {
      // no manual advance button — selecting an option auto-advances to the next item
    } else if (selfResolving) {
      // no Confirm button — the tap itself resolves the question
    } else if (!s.answered) {
      // dropped entirely once answered, rather than left disabled — otherwise
      // it sits right where the feedback tab is fixed and shows through it
      html += '<button class="btn-primary" data-action="confirm-answer" ' + (canConfirm(q, s) ? '' : 'disabled') + '>✓ Confirm</button>';
    }
    html += '</div><div class="footer-space"></div>';

    var screenKey = 'question:' + state.chapterKey + ':' + s.questionIndex + ':' +
      (s.currentIsFollowup ? 'f' : 'p') + (isQuickcall ? ':qc' + s.quickcallIndex : '');
    mountScreen(html, screenKey);

    if (q.mechanic === 'match_term' && !s.currentIsFollowup) {
      window.requestAnimationFrame(positionMatchThreads);
    }

    if (s.answered) {
      if (s.feedbackMinimized) renderFeedbackTab(q, s);
      else renderFeedbackSheet(q, s);
    }
  }

  function renderQuickcall(q, s) {
    var item = q.items[s.quickcallIndex];
    var html = '<div class="quickcall-wrap">';
    html += '<div class="task-prompt">' + annotateGlossary(q.task_prompt) + '</div>';
    html += '<div class="quickcall-progress">CALL ' + (s.quickcallIndex + 1) + ' / ' + q.items.length + '</div>';
    html += '<div class="quickcall-dots">';
    for (var di = 0; di < q.items.length; di++) {
      html += '<span class="dot' + (di <= s.quickcallIndex ? ' filled' : '') + '"></span>';
    }
    html += '</div>';
    html += '<div class="quickcall-caption">Take your time — no timer.</div>';
    var answered = s.quickcallItemSelection !== null && s.quickcallItemSelection !== undefined;
    var itemCorrect = answered && !!(item.options[s.quickcallItemSelection] && item.options[s.quickcallItemSelection].correct);
    html += '<div class="quickcall-scenario">' + annotateGlossary(item.label);
    if (answered) {
      html += '<div class="quickcall-tick ' + (itemCorrect ? 'tick-correct' : 'tick-wrong') + '">' +
        (itemCorrect ? '✓' : '✕') + '</div>';
    }
    html += '</div>';
    html += '<div class="options quickcall-options">';
    item.options.forEach(function (opt, i) {
      var cls = 'option-btn';
      var picked = s.quickcallItemSelection === i;
      if (answered) {
        if (opt.correct) cls += ' reveal-correct';
        else if (picked) cls += ' reveal-wrong';
      }
      html += '<button class="' + cls + '" ' + (answered ? 'disabled' : '') +
        ' data-action="select-quickcall-option" data-index="' + i + '">' + escapeHtml(opt.label) + '</button>';
    });
    html += '</div></div>';
    return html;
  }

  var SHAPE_ARC = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3.5 15c3.5-6.5 13.5-6.5 17 0"/></svg>';
  var SHAPE_SHARD = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3 19 9 16 21 8 19 5 9z"/></svg>';

  function toneFor(label) {
    var l = (label || '').toLowerCase().trim();
    if (l === 'flag' || l === 'no' || l === 'false' || l === 'escalate' || l === 'high risk') return 'alert';
    return 'calm';
  }

  function renderCalmAlert(q, s) {
    var opt0 = q.options[0], opt1 = q.options[1];
    var tone0 = toneFor(opt0.label), tone1 = toneFor(opt1.label);
    function sideHtml(opt, i, tone) {
      var picked = s.selection === i;
      var cls = 'option-btn calmalert-side side-' + tone;
      if (!s.answered) { if (picked) cls += ' selected'; }
      else { if (opt.correct) cls += ' reveal-correct'; else if (picked) cls += ' reveal-wrong'; }
      var icon = tone === 'calm' ? SHAPE_ARC : SHAPE_SHARD;
      return '<button class="' + cls + '" ' + (s.answered ? 'disabled' : '') +
        ' data-action="select-option" data-index="' + i + '">' + icon + '<span>' + escapeHtml(opt.label) + '</span></button>';
    }
    var html = '<div class="calmalert-wrap"><div class="calmalert-track">';
    html += sideHtml(opt0, 0, tone0);
    html += '<span class="calmalert-dots"><span></span><span></span><span></span></span>';
    html += sideHtml(opt1, 1, tone1);
    html += '</div></div>';
    return html;
  }

  /* ---------- build the gate: per-question due-diligence checklist, binary open/shut ---------- */
  // Fallback defaults, only used if a build_gate question somehow omits its own data.
  var DEFAULT_GATE_STEPS = [
    { label: 'Verify identity' },
    { label: 'Verify address' },
    { label: 'Confirm source of funds' },
    { label: 'Enhanced ongoing monitoring' }
  ];
  var DEFAULT_GATE_PATTERN = {
    simplified: [true, false, false, false],
    standard: [true, true, true, false],
    enhanced: [true, true, true, true]
  };

  function gateStepsFor(q) {
    return q.gate_steps || DEFAULT_GATE_STEPS;
  }

  function ensureGateSteps(s, q) {
    if (!Array.isArray(s.gateSteps)) {
      s.gateSteps = gateStepsFor(q).map(function () { return false; });
    }
    return s.gateSteps;
  }

  // A question's gate_pattern is either a flat array (one fixed correct checklist,
  // e.g. "which of these actually trigger a check") or an object keyed by tier
  // (e.g. simplified/standard/enhanced), resolved via whichever option is tagged correct.
  function expectedGatePattern(q) {
    if (Array.isArray(q.gate_pattern)) return q.gate_pattern;
    var byTier = q.gate_pattern || DEFAULT_GATE_PATTERN;
    var correctOpt = (q.options || []).filter(function (o) { return o.correct; })[0];
    var tier = ((correctOpt && (correctOpt.tier || correctOpt.label)) || '').toLowerCase();
    return byTier[tier] || byTier.standard;
  }

  function renderBuildGate(q, s) {
    var stepDefs = gateStepsFor(q);
    var steps = ensureGateSteps(s, q);
    var opened = s.answered && s.lastCorrect;
    var wrongShake = s.answered && !s.lastCorrect;
    var html = '<div class="gate-wrap">';
    html += '<div class="gate-visual' + (opened ? ' gate-open' : '') + (wrongShake ? ' gate-wrong' : '') + '">';
    html += '<div class="gate-leaf gate-left"></div><div class="gate-leaf gate-right"></div>';
    if (opened) html += '<div class="gate-ripple">' + checkSvg(22) + '</div>';
    html += '</div>';
    html += '<div class="tier-steps">';
    stepDefs.forEach(function (step, i) {
      var active = !!steps[i];
      var cls = 'step-chip' + (active ? ' active' : '');
      html += '<button class="' + cls + '" ' + (s.answered ? 'disabled' : '') +
        ' data-action="toggle-gate-step" data-step="' + i + '">' +
        '<span class="chk">' + (active ? '✓' : '') + '</span>' + escapeHtml(step.label) +
        '</button>';
    });
    html += '</div></div>';
    return html;
  }

  /* ---------- stamp: tap a tile, rubber-stamp pop-in (also used for numeric-threshold taps) ---------- */
  function renderStamp(q, s) {
    var isMulti = !!q.select_count;
    var html = '';
    if (isMulti) {
      var picked = Array.isArray(s.selection) ? s.selection.length : 0;
      var done = picked >= q.select_count;
      html += '<div class="select-counter' + (done ? ' select-counter-done' : '') + '">' +
        picked + ' / ' + q.select_count + ' selected</div>';
    }
    html += '<div class="stamp-grid">';
    q.options.forEach(function (opt, i) {
      var picked = isMulti
        ? (Array.isArray(s.selection) && s.selection.indexOf(i) !== -1)
        : (s.selection === i);
      var cls = 'option-btn stamp-tile' + (isMulti ? '' : ' numeric');
      if (s.answered) {
        if (opt.correct) cls += ' reveal-correct';
        else if (picked) cls += ' reveal-wrong';
      } else if (picked) {
        cls += ' selected';
      }
      // Only show the mark once graded — pre-confirm, the violet selected
      // border/background already signals "picked," so there's no glyph yet
      // to put in an empty badge.
      var showMark = s.answered && (opt.correct || picked);
      var markGlyph = s.answered ? (opt.correct ? checkSvg(isMulti ? 13 : 18) : '✕') : '';
      html += '<button class="' + cls + '" ' + (s.answered ? 'disabled' : '') +
        ' data-action="select-option" data-index="' + i + '">' + escapeHtml(opt.label) +
        (showMark ? '<span class="stamp-mark">' + markGlyph + '</span>' : '') +
        '</button>';
    });
    html += '</div>';
    return html;
  }

  /* ---------- flip card: claim + always-visible True/False, flips to reveal why ---------- */
  function renderFlipCard(q, s) {
    var flipped = s.answered;
    var html = '<div class="flipcard-wrap">';
    html += '<div class="flipcard-face' + (flipped ? ' flipped' : '') + '"><div class="flipcard-claim">' + annotateGlossary(q.claim) + '</div>' +
      '<div class="flipcard-back"><div class="flipcard-why">' + annotateGlossary(q.why || '') + '</div></div></div>';
    html += '<div class="options flipcard-options">';
    [true, false].forEach(function (val) {
      var label = val ? 'True' : 'False';
      var picked = s.selection === val;
      var isCorrectBtn = q.answer === val;
      var cls = 'option-btn';
      if (!s.answered) { if (picked) cls += ' selected'; }
      else { if (isCorrectBtn) cls += ' reveal-correct'; else if (picked) cls += ' reveal-wrong'; }
      html += '<button class="' + cls + '" ' + (s.answered ? 'disabled' : '') +
        ' data-action="select-flip" data-value="' + val + '">' + label + '</button>';
    });
    html += '</div></div>';
    return html;
  }

  /* ---------- match the term: two independently-shuffled columns, thread on match ---------- */
  function ensureMatchState(q, s) {
    if (!Array.isArray(s.matchTermOrder)) {
      var idxs = q.pairs.map(function (_, i) { return i; });
      s.matchTermOrder = shuffleArray(idxs.slice());
      s.matchDefOrder = shuffleArray(idxs.slice());
      s.matchSolved = q.pairs.map(function () { return false; });
      s.matchSelectedTerm = null;
      s.matchWrong = null;
      s.matchJustSolvedIdx = null;
    }
  }

  function renderMatchTerm(q, s) {
    ensureMatchState(q, s);
    var html = '<div class="match-wrap" id="match-wrap">';
    html += '<svg class="match-threads" id="match-threads"></svg>';
    html += '<div class="match-cols">';
    html += '<div class="match-col">';
    s.matchTermOrder.forEach(function (pairIdx) {
      var solved = s.matchSolved[pairIdx];
      var selected = s.matchSelectedTerm === pairIdx;
      var wrongFlash = s.matchWrong && s.matchWrong.termPairIdx === pairIdx;
      var cls = 'match-tile' + (solved ? ' solved' : '') + (selected ? ' selected' : '') + (wrongFlash ? ' wrong-flash' : '');
      html += '<button class="' + cls + '" ' + (solved ? 'disabled' : '') +
        ' data-action="select-match-term" data-pair="' + pairIdx + '" data-role="term">' +
        escapeHtml(q.pairs[pairIdx].term) + '<span class="match-peg peg-right"></span></button>';
    });
    html += '</div><div class="match-col">';
    s.matchDefOrder.forEach(function (pairIdx) {
      var solved = s.matchSolved[pairIdx];
      var wrongFlash = s.matchWrong && s.matchWrong.defPairIdx === pairIdx;
      var cls = 'match-tile' + (solved ? ' solved' : '') + (wrongFlash ? ' wrong-flash' : '');
      html += '<button class="' + cls + '" ' + (solved ? 'disabled' : '') +
        ' data-action="select-match-def" data-pair="' + pairIdx + '" data-role="def">' +
        '<span class="match-peg peg-left"></span>' + escapeHtml(q.pairs[pairIdx].definition) + '</button>';
    });
    html += '</div></div>';
    html += '<div class="match-hint">' + (s.matchSolved.every(Boolean) ? '' : 'Tap a term, then its definition') + '</div>';
    html += '</div>';
    return html;
  }

  var SVG_NS = 'http://www.w3.org/2000/svg';

  function positionMatchThreads() {
    var svg = document.getElementById('match-threads');
    var wrap = document.getElementById('match-wrap');
    if (!svg || !wrap) return;
    var s = state.session;
    var justSolvedIdx = s ? s.matchJustSolvedIdx : null;
    var wrapRect = wrap.getBoundingClientRect();
    var specs = [];
    wrap.querySelectorAll('.match-tile[data-role="term"].solved').forEach(function (termEl) {
      var pairIdx = parseInt(termEl.getAttribute('data-pair'), 10);
      var defEl = wrap.querySelector('.match-tile[data-role="def"][data-pair="' + pairIdx + '"]');
      if (!defEl) return;
      var tr = termEl.getBoundingClientRect(), dr = defEl.getBoundingClientRect();
      var x1 = tr.right - wrapRect.left, y1 = tr.top + tr.height / 2 - wrapRect.top;
      var x2 = dr.left - wrapRect.left, y2 = dr.top + dr.height / 2 - wrapRect.top;
      var mx = (x1 + x2) / 2;
      specs.push({
        d: 'M' + x1 + ' ' + y1 + ' C ' + mx + ' ' + y1 + ', ' + mx + ' ' + y2 + ', ' + x2 + ' ' + y2,
        justSolved: pairIdx === justSolvedIdx
      });
    });
    svg.setAttribute('width', wrapRect.width);
    svg.setAttribute('height', wrapRect.height);
    svg.innerHTML = '';
    specs.forEach(function (spec) {
      var path = document.createElementNS(SVG_NS, 'path');
      path.setAttribute('class', 'solved');
      path.setAttribute('d', spec.d);
      svg.appendChild(path);
      if (spec.justSolved) {
        var len = path.getTotalLength();
        path.style.strokeDasharray = len;
        path.style.strokeDashoffset = len;
        void path.getBoundingClientRect();
        path.style.transition = 'stroke-dashoffset .8s ease-out';
        path.style.strokeDashoffset = 0;
      } else {
        path.style.strokeDasharray = 'none';
        path.style.strokeDashoffset = 0;
      }
    });
  }

  /* ---------- order the chain: drag to reorder (Pointer Events), Confirm locks it in ---------- */
  function ensureChainOrder(q, s) {
    if (!Array.isArray(s.chainOrder)) {
      var idxs = q.chain_items.map(function (_, i) { return i; });
      s.chainOrder = shuffleArray(idxs);
    }
    return s.chainOrder;
  }

  function ordinal(n) {
    return ({ 1: '1st', 2: '2nd', 3: '3rd' })[n] || (n + 'th');
  }

  function renderOrderChain(q, s) {
    var order = ensureChainOrder(q, s);
    var html = '<div class="chain-wrap' + (s.answered && !s.lastCorrect ? ' wrong' : '') + '" id="chain-wrap">';
    order.forEach(function (itemIdx, slot) {
      html += '<div class="chain-row"><span class="chain-slot-label">' + ordinal(slot + 1) + '</span>' +
        '<div class="chain-item" data-orig-idx="' + itemIdx + '" data-slot="' + slot + '">' +
        escapeHtml(q.chain_items[itemIdx].label) + '</div></div>';
    });
    html += '</div>';
    return html;
  }

  /* ---------- spot the outlier: tap the odd one out, scattered chip grid ---------- */
  function renderSpotOutlier(q, s) {
    var html = '<div class="outlier-grid">';
    q.options.forEach(function (opt, i) {
      var picked = s.selection === i;
      var cls = 'option-btn outlier-chip';
      if (!s.answered) {
        if (picked) cls += ' selected';
      } else if (opt.correct) {
        cls += ' reveal-correct';
      } else if (picked) {
        cls += ' reveal-wrong selected';
      } else {
        cls += ' outlier-fade';
      }
      html += '<button class="' + cls + '" ' + (s.answered ? 'disabled' : '') +
        ' data-action="select-option" data-index="' + i + '">' +
        '<span class="outlier-idx">' + (i + 1) + '</span>' +
        '<span class="outlier-label-text">' + escapeHtml(opt.label) + '</span>' +
        '</button>';
    });
    html += '</div>';
    return html;
  }

  function renderOptions(q, s) {
    if (!s.currentIsFollowup) {
      if (q.mechanic === 'build_gate') return renderBuildGate(q, s);
      if (q.mechanic === 'calm_alert') return renderCalmAlert(q, s);
      if (q.mechanic === 'stamp') return renderStamp(q, s);
      if (q.mechanic === 'flip_card') return renderFlipCard(q, s);
      if (q.mechanic === 'match_term') return renderMatchTerm(q, s);
      if (q.mechanic === 'order_chain') return renderOrderChain(q, s);
      if (q.mechanic === 'spot_outlier') return renderSpotOutlier(q, s);
    }
    var isDuo = q.options.length === 2;
    var html = '';

    html += '<div class="options' + (isDuo ? ' duo' : '') + '">';
    q.options.forEach(function (opt, i) {
      var cls = 'option-btn';
      var picked = s.selection === i;
      if (!s.answered) {
        if (picked) cls += ' selected';
      } else {
        if (opt.correct) cls += ' reveal-correct';
        else if (picked) cls += ' reveal-wrong';
      }
      html += '<button class="' + cls + '" ' + (s.answered ? 'disabled' : '') +
        ' data-action="select-option" data-index="' + i + '">' + escapeHtml(opt.label) + '</button>';
    });
    html += '</div>';
    return html;
  }

  function canConfirm(q, s) {
    if (s.answered) return false;
    if (q.mechanic === 'build_gate' && !s.currentIsFollowup) return true;
    if (q.mechanic === 'order_chain' && !s.currentIsFollowup) return true;
    if (q.mechanic === 'stamp' && q.select_count && !s.currentIsFollowup) {
      return Array.isArray(s.selection) && s.selection.length === q.select_count;
    }
    return s.selection !== null && s.selection !== undefined;
  }

  function gradeCurrent(q, s) {
    if (q.mechanic === 'build_gate' && !s.currentIsFollowup) {
      var steps = ensureGateSteps(s, q);
      var pattern = expectedGatePattern(q);
      return steps.every(function (v, i) { return v === pattern[i]; });
    }
    if (q.mechanic === 'order_chain' && !s.currentIsFollowup) {
      var order = ensureChainOrder(q, s);
      return order.every(function (itemIdx, slot) { return q.chain_items[itemIdx].order === slot + 1; });
    }
    if (q.mechanic === 'flip_card' && !s.currentIsFollowup) {
      return s.selection === q.answer;
    }
    if (q.mechanic === 'stamp' && q.select_count && !s.currentIsFollowup) {
      var correctIdx = [];
      q.options.forEach(function (opt, i) { if (opt.correct) correctIdx.push(i); });
      var selected = s.selection.slice().sort();
      correctIdx.sort();
      if (selected.length !== correctIdx.length) return false;
      return selected.every(function (v, i) { return v === correctIdx[i]; });
    }
    return !!(q.options[s.selection] && q.options[s.selection].correct);
  }

  function commitAnswer(q, s, correct) {
    s.lastCorrect = correct;
    s.answered = true;
    // A correct answer only needs a brief non-blocking confirmation (the feedback
    // tab) rather than the full sheet; a wrong answer has something worth
    // reading, so it stays as the full sheet. Neither auto-advances on a timer —
    // the tab gives an explicit "View" or "Next" choice instead.
    s.feedbackMinimized = !!correct;
    if (!s.currentIsFollowup) {
      s.answeredCount += 1;
      if (correct) { s.correctCount += 1; s.streak += 1; } else { s.streak = 0; }
    }
    vibrate(correct ? 18 : [20, 40, 20]);
  }

  function renderFeedbackSheet(q, s) {
    removeFeedbackTab();
    var correct = s.lastCorrect;
    var sheet = document.createElement('div');
    sheet.className = 'feedback-sheet';
    var body;
    if (s.currentIsFollowup) {
      if (correct) {
        body = 'Correct.';
      } else {
        var correctOpt = q.options.filter(function (o) { return o.correct; })[0];
        body = 'Not quite — the correct answer is: ' + escapeHtml(correctOpt ? correctOpt.label : '');
      }
    } else if (q.mechanic === 'flip_card') {
      body = annotateGlossary(q.why || '');
    } else {
      body = annotateGlossary(correct ? q.correct_feedback : q.incorrect_feedback);
    }
    var offerChoice = !correct && !s.currentIsFollowup && !!q.followup_question;
    var actions = offerChoice
      ? '<div class="feedback-choice-row">' +
        '<button class="btn-primary" data-action="continue-followup">Try an easier one →</button>' +
        '<button class="btn-secondary" data-action="continue-skip">Skip →</button>' +
        '</div>'
      : '<button class="btn-primary" data-action="continue">Continue →</button>';
    sheet.innerHTML =
      '<div class="inner">' +
      '<div class="feedback-header">' +
      '<div class="feedback-label ' + (correct ? 'ok' : 'no') + '"><span class="fb-icon">' + (correct ? '✓' : '✗') + '</span> ' + (correct ? 'Correct' : 'Not quite') + '</div>' +
      '<button class="feedback-minimize" data-action="minimize-feedback" aria-label="Minimize">⌄</button>' +
      '</div>' +
      '<div class="feedback-text">' + body + '</div>' +
      '<div class="feedback-cite">' + escapeHtml(q.article_citation || '') + '</div>' +
      actions +
      '</div>';
    document.body.appendChild(sheet);
  }

  function renderFeedbackTab(q, s) {
    removeFeedbackSheet();
    var correct = s.lastCorrect;
    var tab = document.createElement('div');
    tab.className = 'feedback-tab';
    if (correct) {
      // No auto-advance timer — the player explicitly picks "View" (read the
      // explanation) or "Next" (move on now), instead of racing a countdown.
      tab.innerHTML =
        '<div class="feedback-tab-row">' +
        '<button class="feedback-tab-view" data-action="expand-feedback">' +
        '<span class="fb-icon ok">✓</span><span>Correct</span>' +
        '</button>' +
        '<button class="feedback-tab-next" data-action="continue">Next →</button>' +
        '</div>';
    } else {
      tab.innerHTML =
        '<button class="feedback-tab-view" data-action="expand-feedback">' +
        '<span class="fb-icon no">✗</span>' +
        '<span>Not quite — tap to view</span>' +
        '</button>';
    }
    document.body.appendChild(tab);
  }

  function removeFeedbackSheet() {
    var el = document.querySelector('.feedback-sheet');
    if (el) el.remove();
  }

  function removeFeedbackTab() {
    var el = document.querySelector('.feedback-tab');
    if (el) el.remove();
  }

  function renderComplete() {
    var ch = getChapter(state.chapterKey);
    var cp = chapterProgress(state.chapterKey);
    var idx = CHAPTER_ORDER.indexOf(state.chapterKey);
    var nextKey = CHAPTER_ORDER[idx + 1];
    var accuracy = Math.round(state.session.accuracyThisRun);
    var isBest = state.session.accuracyThisRun >= cp.bestAccuracy;

    var html = topbar({ back: true, title: 'Chapter complete' });
    html += '<div class="centered-body">';
    html += '<div class="card">';
    html += '<div class="briefing-eyebrow">' + escapeHtml(ch.briefing.title) + '</div>';
    html += '<div class="briefing-title">Chapter complete</div>';
    if (accuracy >= 80) {
      html += '<div class="complete-payoff">Strong round' + (isBest ? ' — new personal best' : '') + '</div>';
    } else if (isBest && state.session.answeredCount) {
      html += '<div class="complete-payoff">New personal best</div>';
    }
    html += '<div class="summary-stat-row">';
    html += '<div class="summary-stat"><div class="n" data-countup="' + accuracy + '">0%</div><div class="l">Accuracy</div></div>';
    html += '<div class="summary-stat"><div class="n">' + Math.round(cp.bestAccuracy) + '%</div><div class="l">Best</div></div>';
    html += '<div class="summary-stat highlight"><div class="n">' + cp.bestStreak + '</div><div class="l">Best streak</div></div>';
    html += '</div>';
    if (nextKey) {
      html += '<div class="briefing-desc">Every chapter is open anytime — up next: “' + escapeHtml(getChapter(nextKey).briefing.title) + '”.</div>';
    } else {
      html += '<div class="briefing-desc">That was the final chapter. Jump into any chapter anytime from the map.</div>';
    }
    html += '</div>';
    if (nextKey) {
      html += '<button class="btn-primary" data-action="open-chapter" data-chapter="' + nextKey + '">Next chapter ▶</button>';
      html += '<button class="btn-secondary" data-action="back-to-map">Back to map</button>';
    } else {
      html += '<button class="btn-primary" data-action="back-to-map">Back to map</button>';
    }
    html += '<button class="btn-secondary" data-action="restart-chapter" data-chapter="' + state.chapterKey + '">⟳ Replay chapter</button>';
    html += '</div><div class="footer-space"></div>';
    mountScreen(html, 'complete:' + state.chapterKey);
    animateCountUp();
  }

  function animateCountUp() {
    var el = document.querySelector('[data-countup]');
    if (!el) return;
    var target = parseInt(el.getAttribute('data-countup'), 10) || 0;
    var start = null;
    var duration = 650;
    function step(ts) {
      if (start === null) start = ts;
      var progress = Math.min(1, (ts - start) / duration);
      var eased = 1 - Math.pow(1 - progress, 3);
      el.textContent = Math.round(target * eased) + '%';
      if (progress < 1) window.requestAnimationFrame(step);
    }
    window.requestAnimationFrame(step);
  }

  function renderPauseOverlay() {
    var el = document.createElement('div');
    el.className = 'overlay';
    el.id = 'pause-overlay';
    el.innerHTML =
      '<div class="overlay-card">' +
      '<h2>Paused</h2>' +
      '<p>Your progress is saved. Resume whenever you’re ready.</p>' +
      '<button class="btn-primary" data-action="resume">▶ Resume</button>' +
      '<button class="btn-secondary" data-action="back-to-map">← Back to map</button>' +
      '</div>';
    document.body.appendChild(el);
  }

  function renderGlossaryPopover(term) {
    var g = glossaryTerm(term);
    if (!g) return;
    var el = document.createElement('div');
    el.className = 'overlay glossary-popover';
    el.id = 'glossary-overlay';
    el.innerHTML =
      '<div class="overlay-card">' +
      '<div class="glossary-term">' + escapeHtml(g.term) + '</div>' +
      '<div class="glossary-def">' + escapeHtml(g.definition) + '</div>' +
      '<div class="glossary-src">' + escapeHtml(g.source) + '</div>' +
      '<button class="btn-primary" data-action="close-glossary">✓ Got it</button>' +
      '</div>';
    document.body.appendChild(el);
  }

  /* ---------- actions ---------- */
  function startChapterSession(key, restart) {
    var ch = getChapter(key);
    var cp = chapterProgress(key);
    state.chapterKey = key;
    if (restart) {
      cp.resume = { questionIndex: 0, correctCount: 0, answeredCount: 0, streak: 0 };
      saveProgress(progress);
    }
    state.session = {
      questionIndex: cp.resume.questionIndex || 0,
      correctCount: cp.resume.correctCount || 0,
      answeredCount: cp.resume.answeredCount || 0,
      streak: cp.resume.streak || 0,
      answered: false,
      selection: null,
      currentIsFollowup: false,
      pendingFollowup: null,
      lastCorrect: null,
      accuracyThisRun: 0,
      quickcallIndex: 0,
      quickcallItemSelection: null,
      quickcallResults: [],
      feedbackMinimized: false,
      gateSteps: null,
      chainOrder: null,
      matchTermOrder: null,
      matchDefOrder: null,
      matchSolved: null,
      matchSelectedTerm: null,
      matchWrong: null,
      matchJustSolvedIdx: null
    };
    if (state.session.questionIndex >= ch.questions.length) {
      state.session.questionIndex = 0;
    }
    shuffleQuestionOptions(ch.questions[state.session.questionIndex]);
    state.screen = 'question';
    render();
  }

  function resetQuickcallState(s) {
    s.quickcallIndex = 0;
    s.quickcallItemSelection = null;
    s.quickcallResults = [];
  }

  function persistResume() {
    var cp = chapterProgress(state.chapterKey);
    var s = state.session;
    cp.resume = {
      questionIndex: s.questionIndex,
      correctCount: s.correctCount,
      answeredCount: s.answeredCount,
      streak: s.streak
    };
    saveProgress(progress);
  }

  function finishChapter() {
    var s = state.session;
    var cp = chapterProgress(state.chapterKey);
    var accuracy = s.answeredCount ? (s.correctCount / s.answeredCount) * 100 : 0;
    s.accuracyThisRun = accuracy;
    cp.everCompleted = true;
    cp.bestAccuracy = Math.max(cp.bestAccuracy, accuracy);
    cp.bestStreak = Math.max(cp.bestStreak, s.streak);
    cp.resume = { questionIndex: 0, correctCount: 0, answeredCount: 0, streak: 0 };
    saveProgress(progress);
    state.screen = 'complete';
    render();
  }

  function advanceAfterFollowup() {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    s.currentIsFollowup = false;
    s.pendingFollowup = null;
    advanceToNextQuestion();
  }

  function enterFollowup(q) {
    var s = state.session;
    s.currentIsFollowup = true;
    s.pendingFollowup = q.followup_question;
    s.answered = false;
    s.selection = null;
    s.feedbackMinimized = false;
    shuffleQuestionOptions(q.followup_question);
    render();
  }

  function advanceToNextQuestion() {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    s.questionIndex += 1;
    s.answered = false;
    s.selection = null;
    s.feedbackMinimized = false;
    s.gateSteps = null;
    s.chainOrder = null;
    s.matchTermOrder = null;
    s.matchDefOrder = null;
    s.matchSolved = null;
    s.matchSelectedTerm = null;
    s.matchWrong = null;
    s.matchJustSolvedIdx = null;
    resetQuickcallState(s);
    persistResume();
    if (s.questionIndex >= ch.questions.length) { finishChapter(); return; }
    shuffleQuestionOptions(ch.questions[s.questionIndex]);
    render();
  }

  function advanceAfterPrimary(wasCorrect) {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    var q = ch.questions[s.questionIndex];
    if (!wasCorrect && q.followup_question) {
      enterFollowup(q);
      return;
    }
    advanceToNextQuestion();
  }

  function handleAction(action, el) {
    if (action === 'toggle-theme') {
      // No render() here on purpose — the toggle button is a persistent DOM
      // node, so the CSS transition on its thumb (and every color, via
      // variables cascading off [data-theme]) animates smoothly. A full
      // re-render would recreate the button and the slide would just jump.
      toggleTheme();
    } else if (action === 'enter-app') {
      state.screen = 'map';
      render();
    } else if (action === 'open-chapter') {
      state.chapterKey = el.getAttribute('data-chapter');
      state.screen = 'briefing';
      render();
    } else if (action === 'back-to-map') {
      removeFeedbackSheet();
      removeFeedbackTab();
      var po = document.getElementById('pause-overlay'); if (po) po.remove();
      state.screen = 'map';
      render();
    } else if (action === 'start-chapter') {
      startChapterSession(el.getAttribute('data-chapter'), false);
    } else if (action === 'restart-chapter') {
      startChapterSession(el.getAttribute('data-chapter'), true);
    } else if (action === 'pause') {
      state.paused = true;
      renderPauseOverlay();
    } else if (action === 'resume') {
      state.paused = false;
      var po2 = document.getElementById('pause-overlay'); if (po2) po2.remove();
    } else if (action === 'select-option') {
      if (state.session.answered) return;
      var qNow = currentQuestion();
      var idx = parseInt(el.getAttribute('data-index'), 10);
      if (qNow.mechanic === 'stamp' && qNow.select_count && !state.session.currentIsFollowup) {
        if (!Array.isArray(state.session.selection)) state.session.selection = [];
        var pos = state.session.selection.indexOf(idx);
        if (pos !== -1) state.session.selection.splice(pos, 1);
        else if (state.session.selection.length < qNow.select_count) state.session.selection.push(idx);
        vibrate(8);
        render();
      } else {
        state.session.selection = idx;
        if (qNow.mechanic === 'stamp' && !qNow.select_count && !state.session.currentIsFollowup) {
          commitAnswer(qNow, state.session, gradeCurrent(qNow, state.session));
        }
        render();
        triggerSuccessEffects(qNow, state.session);
      }
    } else if (action === 'select-flip') {
      if (state.session.answered) return;
      var qFlip = currentQuestion();
      var val = el.getAttribute('data-value') === 'true';
      state.session.selection = val;
      commitAnswer(qFlip, state.session, val === qFlip.answer);
      render();
    } else if (action === 'select-match-term') {
      var sMatch = state.session;
      if (sMatch.matchWrong) return;
      var termPairIdx = parseInt(el.getAttribute('data-pair'), 10);
      if (sMatch.matchSolved[termPairIdx]) return;
      sMatch.matchSelectedTerm = termPairIdx;
      render();
    } else if (action === 'select-match-def') {
      var sDef = state.session;
      if (sDef.matchWrong) return;
      if (sDef.matchSelectedTerm === null || sDef.matchSelectedTerm === undefined) return;
      var defPairIdx = parseInt(el.getAttribute('data-pair'), 10);
      if (sDef.matchSolved[defPairIdx]) return;
      if (sDef.matchSelectedTerm === defPairIdx) {
        sDef.matchSolved[defPairIdx] = true;
        sDef.matchJustSolvedIdx = defPairIdx;
        sDef.matchSelectedTerm = null;
        vibrate(12);
        render();
        if (sDef.matchSolved.every(Boolean)) {
          commitAnswer(currentQuestion(), sDef, true);
          render();
        }
        setTimeout(function () {
          if (state.session === sDef) sDef.matchJustSolvedIdx = null;
        }, 850);
      } else {
        sDef.matchWrong = { termPairIdx: sDef.matchSelectedTerm, defPairIdx: defPairIdx };
        vibrate([15, 30]);
        render();
        setTimeout(function () {
          state.session.matchWrong = null;
          state.session.matchSelectedTerm = null;
          render();
        }, 900);
      }
    } else if (action === 'toggle-gate-step') {
      if (state.session.answered) return;
      var qGate = currentQuestion();
      var stepIdx = parseInt(el.getAttribute('data-step'), 10);
      var steps = ensureGateSteps(state.session, qGate);
      steps[stepIdx] = !steps[stepIdx];
      vibrate(8);
      render();
    } else if (action === 'select-quickcall-option') {
      var sq = state.session;
      if (sq.quickcallItemSelection !== null && sq.quickcallItemSelection !== undefined) return;
      var qq = currentQuestion();
      var itemIdx = sq.quickcallIndex;
      var optIdx = parseInt(el.getAttribute('data-index'), 10);
      sq.quickcallItemSelection = optIdx;
      var itemCorrect = !!(qq.items[itemIdx].options[optIdx] && qq.items[itemIdx].options[optIdx].correct);
      sq.quickcallResults[itemIdx] = itemCorrect;
      vibrate(itemCorrect ? 12 : [15, 30]);
      render();
      setTimeout(function () {
        if (state.session !== sq) return;
        if (sq.quickcallIndex < qq.items.length - 1) {
          sq.quickcallIndex += 1;
          sq.quickcallItemSelection = null;
          render();
          return;
        }
        var aggregate = sq.quickcallResults.length === qq.items.length && sq.quickcallResults.every(function (r) { return r === true; });
        commitAnswer(qq, sq, aggregate);
        render();
      }, 550);
    } else if (action === 'confirm-answer') {
      var q = currentQuestion();
      var s = state.session;
      if (!canConfirm(q, s)) return;
      commitAnswer(q, s, gradeCurrent(q, s));
      render();
      triggerSuccessEffects(q, s);
    } else if (action === 'minimize-feedback') {
      state.session.feedbackMinimized = true;
      render();
    } else if (action === 'expand-feedback') {
      state.session.feedbackMinimized = false;
      render();
    } else if (action === 'continue') {
      removeFeedbackSheet();
      removeFeedbackTab();
      var s2 = state.session;
      var wasFollowup = s2.currentIsFollowup;
      var wasCorrect = s2.lastCorrect;
      if (wasFollowup) advanceAfterFollowup();
      else advanceAfterPrimary(wasCorrect);
    } else if (action === 'continue-followup') {
      removeFeedbackSheet();
      removeFeedbackTab();
      var ch4 = getChapter(state.chapterKey);
      enterFollowup(ch4.questions[state.session.questionIndex]);
    } else if (action === 'continue-skip') {
      removeFeedbackSheet();
      removeFeedbackTab();
      advanceToNextQuestion();
    } else if (action === 'show-glossary') {
      renderGlossaryPopover(el.getAttribute('data-term'));
    } else if (action === 'close-glossary') {
      var go = document.getElementById('glossary-overlay'); if (go) go.remove();
    }
  }

  document.addEventListener('click', function (e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    handleAction(el.getAttribute('data-action'), el);
  });

  /* ---------- juice 4 & 6: tap-point ripple on primary/secondary buttons, plus an
     extra bounce-overshoot on Confirm specifically — fired on pointerdown so the
     animation is visible even though the button itself may be replaced by the
     re-render that follows almost immediately after ---------- */
  document.addEventListener('pointerdown', function (e) {
    var btn = e.target.closest('.btn-primary, .btn-secondary');
    if (!btn || btn.disabled) return;
    var rect = btn.getBoundingClientRect();
    var ripple = document.createElement('span');
    ripple.className = 'tap-ripple';
    ripple.style.left = (e.clientX - rect.left) + 'px';
    ripple.style.top = (e.clientY - rect.top) + 'px';
    btn.appendChild(ripple);
    setTimeout(function () { ripple.remove(); }, 500);

    if (btn.getAttribute('data-action') === 'confirm-answer') {
      btn.classList.remove('btn-overshoot');
      void btn.offsetWidth;
      btn.classList.add('btn-overshoot');
    }
  });

  /* ---------- order the chain: drag-to-reorder gesture (Pointer Events, delegated) ---------- */
  var chainDrag = null;
  document.addEventListener('pointerdown', function (e) {
    var itemEl = e.target.closest('.chain-item');
    if (!itemEl || !state.session || state.session.answered) return;
    var wrap = itemEl.closest('.chain-wrap');
    if (!wrap) return;
    var rows = Array.prototype.slice.call(wrap.querySelectorAll('.chain-row'));
    var rect = itemEl.getBoundingClientRect();
    var rowRect = itemEl.closest('.chain-row').getBoundingClientRect();
    chainDrag = {
      itemEl: itemEl,
      rows: rows,
      startSlot: parseInt(itemEl.getAttribute('data-slot'), 10),
      currentSlot: parseInt(itemEl.getAttribute('data-slot'), 10),
      startY: e.clientY,
      itemHeight: rowRect.height + 8
    };
    itemEl.classList.add('dragging');
    itemEl.style.transition = 'none';
    try { itemEl.setPointerCapture(e.pointerId); } catch (err) {}
  });
  document.addEventListener('pointermove', function (e) {
    if (!chainDrag) return;
    var dy = e.clientY - chainDrag.startY;
    chainDrag.itemEl.style.transform = 'translateY(' + dy + 'px)';
    var shift = Math.round(dy / chainDrag.itemHeight);
    var targetSlot = Math.max(0, Math.min(chainDrag.rows.length - 1, chainDrag.startSlot + shift));
    chainDrag.currentSlot = targetSlot;
    chainDrag.rows.forEach(function (row, idx) {
      if (idx === chainDrag.startSlot) return;
      var item = row.querySelector('.chain-item');
      if (!item) return;
      var between = (targetSlot >= chainDrag.startSlot)
        ? (idx > chainDrag.startSlot && idx <= targetSlot)
        : (idx < chainDrag.startSlot && idx >= targetSlot);
      item.style.transition = 'transform .12s';
      item.style.transform = between
        ? 'translateY(' + (targetSlot >= chainDrag.startSlot ? '-' : '') + chainDrag.itemHeight + 'px)'
        : '';
    });
  });
  document.addEventListener('pointerup', function () {
    if (!chainDrag) return;
    var cd = chainDrag;
    chainDrag = null;
    var moved = cd.currentSlot !== cd.startSlot;

    function finalize() {
      cd.itemEl.classList.remove('dragging');
      cd.itemEl.style.transition = '';
      cd.itemEl.style.transform = '';
      cd.rows.forEach(function (row) {
        var item = row.querySelector('.chain-item');
        if (item) { item.style.transform = ''; item.style.transition = ''; }
      });
      if (moved && state.session && Array.isArray(state.session.chainOrder)) {
        var order = state.session.chainOrder;
        var movedItem = order.splice(cd.startSlot, 1)[0];
        order.splice(cd.currentSlot, 0, movedItem);
        vibrate(10);
      }
      render();
    }

    if (moved) {
      // Animate the dragged item settling into its target slot before the full
      // re-render swaps in the final DOM — otherwise a rebuild-from-scratch render
      // has nothing to transition from and the drop reads as an instant jump.
      var settleOffset = (cd.currentSlot - cd.startSlot) * cd.itemHeight;
      cd.itemEl.style.transition = 'transform .18s cubic-bezier(.2,.8,.2,1)';
      cd.itemEl.style.transform = 'translateY(' + settleOffset + 'px)';
      cd.rows.forEach(function (row) {
        var item = row.querySelector('.chain-item');
        if (item && item !== cd.itemEl) {
          item.style.transition = 'transform .18s cubic-bezier(.2,.8,.2,1)';
          item.style.transform = '';
        }
      });
      setTimeout(finalize, 180);
    } else {
      finalize();
    }
  });

  render();
})();
</script>
</body>
</html>
