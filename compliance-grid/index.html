<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="color-scheme" content="dark">
<title>Compliance Grid</title>
<script src="content.js"></script>
<style>
  :root {
    --bg: #0a0a0d;
    --card: #15151c;
    --card-border: #26262f;
    --text: #eceef2;
    --text-dim: #9a9aa8;
    --text-faint: #66667a;
    --teal: #2dd4bf;
    --teal-dim: #164e46;
    --amber: #f5a524;
    --amber-dim: #4d380f;
    --red: #f5455c;
    --red-dim: #4d1620;
    --violet: #8b7cf6;
    --violet-dim: #322a5c;
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100%;
  }

  body {
    background:
      radial-gradient(circle at 50% -10%, #1b1b26 0%, var(--bg) 55%);
    background-attachment: fixed;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding: env(safe-area-inset-top, 0) 16px env(safe-area-inset-bottom, 0);
    display: flex;
    flex-direction: column;
  }

  button {
    font-family: inherit;
    border: none;
    background: none;
    color: inherit;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button:disabled { opacity: 0.4; cursor: default; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 2px 8px;
    position: sticky;
    top: 0;
    z-index: 5;
    background: linear-gradient(var(--bg) 70%, transparent);
  }
  .topbar .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    background: var(--card);
    border: 1px solid var(--card-border);
  }
  .topbar .title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--text-dim);
  }
  .topbar .spacer { width: 40px; }

  h1, h2, h3, p { margin: 0; }

  .app-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 8px 0 2px;
  }
  .app-subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 20px;
  }

  .chapter-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 24px;
  }

  .chapter-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .chapter-card.locked { opacity: 0.55; }
  .chapter-card .row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .chapter-card .row1-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chapter-icon {
    font-size: 24px;
    line-height: 1;
    flex-shrink: 0;
  }
  .chapter-card .num {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 0.05em;
  }
  .chapter-card .name {
    font-size: 18px;
    font-weight: 600;
    margin-top: 2px;
  }
  .chapter-card .topic {
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.4;
  }
  .chapter-card .meta-row {
    display: flex;
    gap: 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .chapter-card .meta-row b { color: var(--text); }
  .progress-track {
    height: 5px;
    border-radius: 3px;
    background: #232330;
    overflow: hidden;
    margin-top: 2px;
  }
  .progress-fill {
    height: 100%;
    background: var(--violet);
    border-radius: 3px;
  }
  .lock-badge {
    font-size: 11px;
    color: var(--text-faint);
    font-family: var(--mono);
  }
  .chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: var(--violet-dim);
    color: var(--violet);
    font-size: 15px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 22px;
  }

  .briefing-eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--violet);
    text-transform: uppercase;
  }
  .briefing-title {
    font-size: 24px;
    font-weight: 700;
    margin: 8px 0 12px;
    line-height: 1.2;
  }
  .briefing-desc {
    color: var(--text-dim);
    font-size: 14.5px;
    line-height: 1.55;
    margin-bottom: 18px;
  }
  .objectives {
    list-style: none;
    padding: 0;
    margin: 0 0 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .objectives li {
    display: flex;
    gap: 10px;
    font-size: 13.5px;
    line-height: 1.4;
    color: var(--text);
  }
  .objectives li::before {
    content: "";
    min-width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--teal);
    margin-top: 6px;
  }
  .article-range {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    border-top: 1px solid var(--card-border);
    padding-top: 14px;
  }

  .btn-primary {
    width: 100%;
    padding: 16px;
    border-radius: var(--radius-md);
    background: var(--violet);
    color: #0a0a0d;
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
  }
  .btn-secondary {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-md);
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text);
    font-weight: 600;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 10px;
  }

  .q-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    margin-bottom: 14px;
  }
  .diff-tag {
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .diff-easy { background: var(--teal-dim); color: var(--teal); }
  .diff-medium { background: var(--amber-dim); color: var(--amber); }
  .diff-hard { background: var(--red-dim); color: var(--red); }

  .task-prompt {
    font-size: 16.5px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 12px;
  }
  .scenario {
    background: #1c1c25;
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 6px;
  }
  .option-btn {
    text-align: left;
    padding: 15px 16px;
    border-radius: var(--radius-md);
    background: #1c1c25;
    border: 1.5px solid var(--card-border);
    font-size: 14.5px;
    line-height: 1.4;
    transition: border-color .15s, background .15s;
    min-height: 48px;
  }
  .option-btn.passflag-pass { }
  .option-btn.passflag-flag { }
  .option-btn.selected {
    border-color: var(--violet);
    background: var(--violet-dim);
  }
  .option-btn.reveal-correct {
    border-color: var(--teal);
    background: var(--teal-dim);
  }
  .option-btn.reveal-wrong {
    border-color: var(--red);
    background: var(--red-dim);
  }
  .option-btn:disabled { opacity: 1; }

  .options.duo {
    flex-direction: row;
  }
  .options.duo .option-btn {
    flex: 1;
    text-align: center;
    font-weight: 700;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 64px;
  }

  .options.tier-style {
    flex-direction: row;
  }
  .options.tier-style .option-btn {
    flex: 1;
    text-align: center;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    justify-content: center;
    display: flex;
    align-items: center;
  }
  .option-btn.tier-low { color: var(--teal); }
  .option-btn.tier-medium { color: var(--amber); }
  .option-btn.tier-high { color: var(--red); }
  .option-btn.tier-low.selected { background: var(--teal-dim); border-color: var(--teal); }
  .option-btn.tier-medium.selected { background: var(--amber-dim); border-color: var(--amber); }
  .option-btn.tier-high.selected { background: var(--red-dim); border-color: var(--red); }

  .select-counter {
    display: inline-flex;
    align-items: center;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.03em;
    color: var(--text-dim);
    background: #1c1c25;
    border: 1px solid var(--card-border);
    padding: 5px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .select-counter-done {
    color: var(--violet);
    border-color: var(--violet);
  }

  .node-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 6px;
  }
  .node-card {
    background: #1c1c25;
    border: 1.5px solid var(--card-border);
    border-radius: var(--radius-md);
    padding: 13px 15px;
  }
  .node-label {
    font-size: 13.5px;
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .tier-row {
    display: flex;
    gap: 8px;
  }
  .tier-btn {
    flex: 1;
    padding: 9px 4px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--card-border);
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .tier-btn.tier-low { color: var(--teal); }
  .tier-btn.tier-medium { color: var(--amber); }
  .tier-btn.tier-high { color: var(--red); }
  .tier-btn.tier-selected.tier-low { background: var(--teal-dim); border-color: var(--teal); }
  .tier-btn.tier-selected.tier-medium { background: var(--amber-dim); border-color: var(--amber); }
  .tier-btn.tier-selected.tier-high { background: var(--red-dim); border-color: var(--red); }
  .tier-btn.tier-reveal-correct { outline: 2px solid var(--teal); }
  .tier-btn.tier-reveal-wrong { outline: 2px solid var(--red); }

  .gloss {
    color: var(--violet);
    border-bottom: 1px dotted var(--violet);
    cursor: pointer;
    white-space: nowrap;
  }
  .gloss sup { font-size: 9px; margin-left: 1px; }

  .feedback-sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 20;
    display: flex;
    justify-content: center;
    padding: 0 12px env(safe-area-inset-bottom, 0);
    pointer-events: none;
  }
  .feedback-sheet .inner {
    pointer-events: auto;
    width: 100%;
    max-width: 456px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-bottom: none;
    border-radius: 22px 22px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0));
    box-shadow: 0 -12px 40px rgba(0,0,0,0.5);
    animation: sheet-up .22s ease-out;
  }
  @keyframes sheet-up {
    from { transform: translateY(16px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .feedback-label {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .feedback-label.ok { color: var(--teal); }
  .feedback-label.no { color: var(--red); }
  .feedback-text {
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 6px;
    white-space: pre-line;
  }
  .feedback-cite {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    margin-bottom: 16px;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,8,11,0.86);
    backdrop-filter: blur(6px);
    z-index: 30;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .overlay-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 28px 24px;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }
  .overlay-card h2 { font-size: 20px; margin-bottom: 8px; }
  .overlay-card p { color: var(--text-dim); font-size: 14px; margin-bottom: 18px; line-height: 1.5; }

  .glossary-popover .overlay-card { text-align: left; }
  .glossary-term { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
  .glossary-def { font-size: 14px; line-height: 1.5; color: var(--text); margin-bottom: 10px; }
  .glossary-src { font-family: var(--mono); font-size: 11.5px; color: var(--text-faint); }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%);
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text-dim);
    font-size: 12.5px;
    padding: 10px 16px;
    border-radius: 30px;
    z-index: 40;
  }

  .streak-strip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--amber);
    margin-bottom: 12px;
  }

  .summary-stat-row {
    display: flex;
    gap: 10px;
    margin: 18px 0;
  }
  .summary-stat {
    flex: 1;
    background: #1c1c25;
    border-radius: var(--radius-sm);
    padding: 14px 8px;
    text-align: center;
  }
  .summary-stat .n {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
  }
  .summary-stat .l {
    font-size: 10.5px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 3px;
  }

  .footer-space { height: 24px; flex-shrink: 0; }

  .home-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px 8px;
    gap: 4px;
  }
  .home-badge {
    width: 76px;
    height: 76px;
    border-radius: 24px;
    background: linear-gradient(160deg, var(--violet-dim), #1c1c25);
    border: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin-bottom: 18px;
  }
  .home-title {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 10px;
  }
  .home-tagline {
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.5;
    max-width: 320px;
    margin-bottom: 18px;
  }
  .home-meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 0.03em;
  }
  .home-progress {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--violet);
    letter-spacing: 0.03em;
    margin-top: 6px;
  }
  .home-wrap .btn-primary {
    max-width: 260px;
    margin-top: 28px;
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  'use strict';

  /* ---------- content (placeholder — replaced with verified question bank) ---------- */
  var APP_CONTENT = window.__COMPLIANCE_GRID_CONTENT__ || { chapters: [], glossary: [] };

  var CHAPTER_ORDER = ['foundations', 'reading_risk', 'the_gate', 'enhanced_measures', 'the_flag'];
  var UNLOCK_THRESHOLD = 60;

  /* ---------- storage ---------- */
  var STORAGE_KEY = 'complianceGridProgress_v1';

  function defaultChapterProgress() {
    return {
      everCompleted: false,
      bestAccuracy: 0,
      bestStreak: 0,
      resume: { questionIndex: 0, correctCount: 0, answeredCount: 0, streak: 0 }
    };
  }

  function loadProgress() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { chapters: {} };
      var parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== 'object') return { chapters: {} };
      if (!parsed.chapters) parsed.chapters = {};
      return parsed;
    } catch (e) {
      return { chapters: {} };
    }
  }

  function saveProgress(p) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
    } catch (e) {
      showToast('Progress could not be saved on this device.');
    }
  }

  var progress = loadProgress();

  function chapterProgress(key) {
    if (!progress.chapters[key]) progress.chapters[key] = defaultChapterProgress();
    return progress.chapters[key];
  }

  function isUnlocked(index) {
    if (index === 0) return true;
    var prevKey = CHAPTER_ORDER[index - 1];
    return chapterProgress(prevKey).bestAccuracy >= UNLOCK_THRESHOLD;
  }

  /* ---------- app state ---------- */
  var state = {
    screen: 'home',
    chapterKey: null,
    paused: false,
    session: null,     // { questionIndex, correctCount, answeredCount, streak, answered:false, selection, pendingFollowup, currentIsFollowup }
    introducedTerms: {}
  };

  var CHAPTER_ICON = {
    foundations: '📘',
    reading_risk: '🧭',
    the_gate: '🚪',
    enhanced_measures: '🚨',
    the_flag: '🏁'
  };

  function getChapter(key) {
    for (var i = 0; i < APP_CONTENT.chapters.length; i++) {
      if (APP_CONTENT.chapters[i].chapter_key === key) return APP_CONTENT.chapters[i];
    }
    return null;
  }

  function glossaryTerm(name) {
    var lower = (name || '').toLowerCase();
    for (var i = 0; i < APP_CONTENT.glossary.length; i++) {
      if (APP_CONTENT.glossary[i].term.toLowerCase() === lower) return APP_CONTENT.glossary[i];
    }
    return null;
  }

  /* ---------- glossary text annotation ---------- */
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function annotateGlossary(text) {
    if (!text) return '';
    var terms = APP_CONTENT.glossary.slice().sort(function (a, b) { return b.term.length - a.term.length; });
    var escaped = escapeHtml(text);
    terms.forEach(function (g) {
      var esc = g.term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      var re = new RegExp('\\b(' + esc + ')\\b', 'gi');
      escaped = escaped.replace(re, function (m) {
        return '<span class="gloss" data-action="show-glossary" data-term="' + escapeHtml(g.term) + '">' + m + '<sup class="qmark">?</sup></span>';
      });
    });
    return escaped;
  }

  function markIntroduced(chapterKey, text) {
    if (!text) return;
    if (!state.introducedTerms[chapterKey]) state.introducedTerms[chapterKey] = {};
    APP_CONTENT.glossary.forEach(function (g) {
      var re = new RegExp('\\b' + g.term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
      if (re.test(text)) state.introducedTerms[chapterKey][g.term] = true;
    });
  }

  /* ---------- haptics ---------- */
  function vibrate(pattern) {
    try { if ('vibrate' in navigator) navigator.vibrate(pattern); } catch (e) {}
  }

  /* ---------- toast ---------- */
  var toastTimer = null;
  function showToast(msg) {
    var el = document.getElementById('toast');
    if (!el) {
      el = document.createElement('div');
      el.id = 'toast';
      el.className = 'toast';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.style.display = 'none'; }, 2600);
  }

  /* ---------- rendering ---------- */
  var app = document.getElementById('app');

  function render() {
    if (state.screen === 'home') return renderHome();
    if (state.screen === 'map') return renderMap();
    if (state.screen === 'briefing') return renderBriefing();
    if (state.screen === 'question') return renderQuestion();
    if (state.screen === 'complete') return renderComplete();
  }

  function renderHome() {
    var totalChapters = APP_CONTENT.chapters.length;
    var completed = 0;
    var anyProgress = false;
    APP_CONTENT.chapters.forEach(function (ch) {
      var cp = chapterProgress(ch.chapter_key);
      if (cp.everCompleted) completed += 1;
      if (cp.everCompleted || cp.resume.questionIndex > 0) anyProgress = true;
    });
    var html = '<div class="home-wrap">';
    html += '<div class="home-badge">🛡</div>';
    html += '<h1 class="home-title">Compliance Grid</h1>';
    html += '<p class="home-tagline">Learn the AML/CFT rules that keep your work compliant — one short round at a time.</p>';
    html += '<div class="home-meta">' + totalChapters + ' chapters · 5-10 min each</div>';
    if (anyProgress) {
      html += '<div class="home-progress">' + completed + ' / ' + totalChapters + ' chapters complete</div>';
    }
    html += '<button class="btn-primary" data-action="enter-app">' + (anyProgress ? 'Continue ▶' : 'Start ▶') + '</button>';
    html += '</div>';
    app.innerHTML = html;
  }

  function topbar(opts) {
    opts = opts || {};
    var left = opts.back
      ? '<button class="icon-btn" data-action="back-to-map">←</button>'
      : '<span class="spacer"></span>';
    var right = opts.pause
      ? '<button class="icon-btn" data-action="pause">⏸</button>'
      : '<span class="spacer"></span>';
    return '<div class="topbar">' + left +
      '<span class="title">' + (opts.title || '') + '</span>' + right + '</div>';
  }

  function renderMap() {
    var html = topbar({});
    html += '<h1 class="app-title">Compliance Grid</h1>';
    html += '<p class="app-subtitle">AML/CFT training — Central Bank of Cyprus Directive 2025</p>';
    html += '<div class="chapter-list">';
    APP_CONTENT.chapters.slice().sort(function (a, b) {
      return CHAPTER_ORDER.indexOf(a.chapter_key) - CHAPTER_ORDER.indexOf(b.chapter_key);
    }).forEach(function (ch, i) {
      var idx = CHAPTER_ORDER.indexOf(ch.chapter_key);
      var unlocked = isUnlocked(idx);
      var cp = chapterProgress(ch.chapter_key);
      var total = ch.questions.length;
      var completionPct = cp.everCompleted ? 100 : Math.round((cp.resume.questionIndex / total) * 100);
      var action = unlocked ? ' data-action="open-chapter" data-chapter="' + ch.chapter_key + '"' : '';
      html += '<div class="chapter-card' + (unlocked ? '' : ' locked') + '"' + action + '>';
      html += '<div class="row1"><div class="row1-left"><span class="chapter-icon">' + (CHAPTER_ICON[ch.chapter_key] || '') + '</span><div>';
      html += '<div class="num">CHAPTER ' + (idx + 1) + ' / ' + CHAPTER_ORDER.length + '</div>';
      html += '<div class="name">' + escapeHtml(ch.briefing.title.split(':')[0].split('—')[0].trim() || ch.briefing.title) + '</div>';
      html += '</div></div>';
      html += unlocked
        ? '<span class="chip">' + (cp.everCompleted ? '✓' : '▶') + '</span>'
        : '<span class="lock-badge">🔒 LOCKED</span>';
      html += '</div>';
      if (unlocked) {
        html += '<div class="progress-track"><div class="progress-fill" style="width:' + Math.min(completionPct, 100) + '%"></div></div>';
        html += '<div class="meta-row"><span>PROGRESS <b>' + completionPct + '%</b></span><span>BEST <b>' + Math.round(cp.bestAccuracy) + '%</b></span></div>';
      } else {
        var prevTitle = getChapter(CHAPTER_ORDER[idx - 1]).briefing.title;
        html += '<div class="topic">Reach ' + UNLOCK_THRESHOLD + '%+ accuracy in “' + escapeHtml(prevTitle) + '” to unlock.</div>';
      }
      html += '</div>';
    });
    html += '</div><div class="footer-space"></div>';
    app.innerHTML = html;
  }

  function renderBriefing() {
    var ch = getChapter(state.chapterKey);
    var cp = chapterProgress(state.chapterKey);
    var midway = !cp.everCompleted && cp.resume.questionIndex > 0;
    var html = topbar({ back: true, title: 'Chapter briefing' });
    html += '<div class="card">';
    html += '<div class="briefing-eyebrow">' + (CHAPTER_ICON[ch.chapter_key] || '') + ' Briefing</div>';
    html += '<div class="briefing-title">' + escapeHtml(ch.briefing.title) + '</div>';
    html += '<div class="briefing-desc">' + escapeHtml(ch.briefing.description) + '</div>';
    html += '<ul class="objectives">';
    ch.briefing.objectives.forEach(function (o) { html += '<li>' + escapeHtml(o) + '</li>'; });
    html += '</ul>';
    html += '<div class="article-range">' + escapeHtml(ch.briefing.article_range) + '</div>';
    html += '</div>';
    html += '<button class="btn-primary" data-action="start-chapter" data-chapter="' + ch.chapter_key + '">' +
      (midway ? 'Resume ▶' : 'Start ▶') + '</button>';
    if (midway || cp.everCompleted) {
      html += '<button class="btn-secondary" data-action="restart-chapter" data-chapter="' + ch.chapter_key + '">⟳ Start over</button>';
    }
    html += '<div class="footer-space"></div>';
    app.innerHTML = html;
  }

  function currentQuestion() {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    if (s.currentIsFollowup) return s.pendingFollowup;
    return ch.questions[s.questionIndex];
  }

  function renderQuestion() {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    var q = currentQuestion();

    markIntroduced(state.chapterKey, (q.scenario || '') + ' ' + q.task_prompt);

    var html = topbar({ back: true, pause: true, title: ch.briefing.title });

    if (s.streak >= 3) {
      html += '<div class="streak-strip">🔥 ' + s.streak + ' in a row</div>';
    }

    html += '<div class="q-meta">';
    if (!s.currentIsFollowup) {
      html += '<span>QUESTION ' + (s.questionIndex + 1) + ' / ' + ch.questions.length + '</span>';
      html += '<span class="diff-tag diff-' + q.difficulty + '">' + q.difficulty + '</span>';
    } else {
      html += '<span>FOLLOW-UP — SAME CONCEPT</span><span></span>';
    }
    html += '</div>';

    html += '<div class="card">';
    html += '<div class="task-prompt">' + annotateGlossary(q.task_prompt) + '</div>';
    if (q.scenario) html += '<div class="scenario">' + annotateGlossary(q.scenario) + '</div>';

    if (q.mechanic === 'nodegrid' && !s.currentIsFollowup) {
      html += renderNodegrid(q, s);
    } else {
      html += renderOptions(q, s);
    }
    html += '</div>';

    html += '<button class="btn-primary" data-action="confirm-answer" ' + (canConfirm(q, s) ? '' : 'disabled') + '>✓ Confirm</button>';
    html += '<div class="footer-space"></div>';

    app.innerHTML = html;

    if (s.answered) renderFeedbackSheet(q, s);
  }

  var DUO_LABEL_ICON = { pass: '✓ ', flag: '🚩 ', yes: '✓ ', no: '✕ ', true: '✓ ', false: '✕ ' };
  var TIER_LABEL_CLASS = { simplified: 'tier-low', standard: 'tier-medium', enhanced: 'tier-high' };

  function renderOptions(q, s) {
    var isMulti = q.mechanic === 'multiselect' && !s.currentIsFollowup;
    var isTier = q.mechanic === 'tiergate' && !s.currentIsFollowup;
    var isDuo = q.options.length === 2 && !isTier;
    var html = '';

    if (isMulti) {
      var picked = Array.isArray(s.selection) ? s.selection.length : 0;
      var done = picked >= q.select_count;
      html += '<div class="select-counter' + (done ? ' select-counter-done' : '') + '">' +
        picked + ' / ' + q.select_count + ' selected</div>';
    }

    html += '<div class="options' + (isDuo ? ' duo' : '') + (isTier ? ' tier-style' : '') + '">';
    q.options.forEach(function (opt, i) {
      var cls = 'option-btn';
      var picked = isMulti
        ? (Array.isArray(s.selection) && s.selection.indexOf(i) !== -1)
        : (s.selection === i);
      if (!s.answered) {
        if (picked) cls += ' selected';
      } else {
        if (opt.correct) cls += ' reveal-correct';
        else if (picked) cls += ' reveal-wrong';
      }
      if (isTier) {
        var tierCls = TIER_LABEL_CLASS[(opt.tier || opt.label || '').toLowerCase()];
        if (tierCls) cls += ' ' + tierCls;
      }
      var icon = isDuo ? (DUO_LABEL_ICON[(opt.label || '').toLowerCase().trim()] || '') : '';
      html += '<button class="' + cls + '" ' + (s.answered ? 'disabled' : '') +
        ' data-action="select-option" data-index="' + i + '">' + icon + escapeHtml(opt.label) + '</button>';
    });
    html += '</div>';
    return html;
  }

  function renderNodegrid(q, s) {
    var html = '<div class="node-list">';
    q.nodes.forEach(function (node, ni) {
      html += '<div class="node-card"><div class="node-label">' + annotateGlossary(node.label) + '</div>';
      html += '<div class="tier-row">';
      ['low', 'medium', 'high'].forEach(function (tier) {
        var cls = 'tier-btn tier-' + tier;
        var chosen = (s.selection || [])[ni] === tier;
        if (!s.answered) {
          if (chosen) cls += ' tier-selected';
        } else {
          if (tier === node.correctTier) cls += ' tier-reveal-correct';
          if (chosen && tier !== node.correctTier) cls += ' tier-reveal-wrong';
          if (chosen && tier === node.correctTier) cls += ' tier-selected';
        }
        html += '<button class="' + cls + '" ' + (s.answered ? 'disabled' : '') +
          ' data-action="select-node-tier" data-node="' + ni + '" data-tier="' + tier + '">' + tier + '</button>';
      });
      html += '</div></div>';
    });
    html += '</div>';
    return html;
  }

  function canConfirm(q, s) {
    if (s.answered) return false;
    if (q.mechanic === 'nodegrid' && !s.currentIsFollowup) {
      return q.nodes.every(function (_, i) { return !!(s.selection && s.selection[i]); });
    }
    if (q.mechanic === 'multiselect' && !s.currentIsFollowup) {
      return Array.isArray(s.selection) && s.selection.length === q.select_count;
    }
    return s.selection !== null && s.selection !== undefined;
  }

  function gradeCurrent(q, s) {
    if (q.mechanic === 'nodegrid' && !s.currentIsFollowup) {
      return q.nodes.every(function (node, i) { return s.selection[i] === node.correctTier; });
    }
    if (q.mechanic === 'multiselect' && !s.currentIsFollowup) {
      var correctIdx = [];
      q.options.forEach(function (opt, i) { if (opt.correct) correctIdx.push(i); });
      var selected = s.selection.slice().sort();
      correctIdx.sort();
      if (selected.length !== correctIdx.length) return false;
      return selected.every(function (v, i) { return v === correctIdx[i]; });
    }
    return !!(q.options[s.selection] && q.options[s.selection].correct);
  }

  function renderFeedbackSheet(q, s) {
    var correct = s.lastCorrect;
    var sheet = document.createElement('div');
    sheet.className = 'feedback-sheet';
    var body;
    if (s.currentIsFollowup) {
      if (correct) {
        body = 'Correct.';
      } else {
        var correctOpt = q.options.filter(function (o) { return o.correct; })[0];
        body = 'Not quite — the correct answer is: ' + escapeHtml(correctOpt ? correctOpt.label : '');
      }
    } else {
      body = annotateGlossary(correct ? q.correct_feedback : q.incorrect_feedback);
    }
    sheet.innerHTML =
      '<div class="inner">' +
      '<div class="feedback-label ' + (correct ? 'ok' : 'no') + '">' + (correct ? '✓ Correct' : '✗ Not quite') + '</div>' +
      '<div class="feedback-text">' + body + '</div>' +
      '<div class="feedback-cite">' + escapeHtml(q.article_citation || '') + '</div>' +
      '<button class="btn-primary" data-action="continue">Continue →</button>' +
      '</div>';
    document.body.appendChild(sheet);
  }

  function removeFeedbackSheet() {
    var el = document.querySelector('.feedback-sheet');
    if (el) el.remove();
  }

  function renderComplete() {
    var ch = getChapter(state.chapterKey);
    var cp = chapterProgress(state.chapterKey);
    var idx = CHAPTER_ORDER.indexOf(state.chapterKey);
    var nextKey = CHAPTER_ORDER[idx + 1];
    var unlockedNext = nextKey && cp.bestAccuracy >= UNLOCK_THRESHOLD;

    var html = topbar({ back: true, title: 'Chapter complete' });
    html += '<div class="card">';
    html += '<div class="briefing-eyebrow">' + escapeHtml(ch.briefing.title) + '</div>';
    html += '<div class="briefing-title">Chapter complete</div>';
    html += '<div class="summary-stat-row">';
    html += '<div class="summary-stat"><div class="n">' + Math.round(state.session.accuracyThisRun) + '%</div><div class="l">Accuracy</div></div>';
    html += '<div class="summary-stat"><div class="n">' + Math.round(cp.bestAccuracy) + '%</div><div class="l">Best</div></div>';
    html += '<div class="summary-stat"><div class="n">' + cp.bestStreak + '</div><div class="l">Best streak</div></div>';
    html += '</div>';
    if (cp.bestAccuracy >= UNLOCK_THRESHOLD && nextKey) {
      html += '<div class="briefing-desc">Next chapter unlocked: “' + escapeHtml(getChapter(nextKey).briefing.title) + '”.</div>';
    } else if (nextKey) {
      html += '<div class="briefing-desc">Reach ' + UNLOCK_THRESHOLD + '%+ accuracy to unlock the next chapter. Replay anytime.</div>';
    } else {
      html += '<div class="briefing-desc">This was the final chapter. Replay any chapter anytime from the map.</div>';
    }
    html += '</div>';
    html += '<button class="btn-primary" data-action="back-to-map">Back to map</button>';
    html += '<button class="btn-secondary" data-action="restart-chapter" data-chapter="' + state.chapterKey + '">⟳ Replay chapter</button>';
    html += '<div class="footer-space"></div>';
    app.innerHTML = html;
  }

  function renderPauseOverlay() {
    var el = document.createElement('div');
    el.className = 'overlay';
    el.id = 'pause-overlay';
    el.innerHTML =
      '<div class="overlay-card">' +
      '<h2>Paused</h2>' +
      '<p>Your progress is saved. Resume whenever you’re ready.</p>' +
      '<button class="btn-primary" data-action="resume">▶ Resume</button>' +
      '<button class="btn-secondary" data-action="back-to-map">← Back to map</button>' +
      '</div>';
    document.body.appendChild(el);
  }

  function renderGlossaryPopover(term) {
    var g = glossaryTerm(term);
    if (!g) return;
    var el = document.createElement('div');
    el.className = 'overlay glossary-popover';
    el.id = 'glossary-overlay';
    el.innerHTML =
      '<div class="overlay-card">' +
      '<div class="glossary-term">' + escapeHtml(g.term) + '</div>' +
      '<div class="glossary-def">' + escapeHtml(g.definition) + '</div>' +
      '<div class="glossary-src">' + escapeHtml(g.source) + '</div>' +
      '<button class="btn-primary" data-action="close-glossary">✓ Got it</button>' +
      '</div>';
    document.body.appendChild(el);
  }

  /* ---------- actions ---------- */
  function startChapterSession(key, restart) {
    var ch = getChapter(key);
    var cp = chapterProgress(key);
    state.chapterKey = key;
    if (restart) {
      cp.resume = { questionIndex: 0, correctCount: 0, answeredCount: 0, streak: 0 };
      saveProgress(progress);
    }
    state.session = {
      questionIndex: cp.resume.questionIndex || 0,
      correctCount: cp.resume.correctCount || 0,
      answeredCount: cp.resume.answeredCount || 0,
      streak: cp.resume.streak || 0,
      answered: false,
      selection: null,
      currentIsFollowup: false,
      pendingFollowup: null,
      lastCorrect: null,
      accuracyThisRun: 0
    };
    if (state.session.questionIndex >= ch.questions.length) {
      state.session.questionIndex = 0;
    }
    state.screen = 'question';
    render();
  }

  function persistResume() {
    var cp = chapterProgress(state.chapterKey);
    var s = state.session;
    cp.resume = {
      questionIndex: s.questionIndex,
      correctCount: s.correctCount,
      answeredCount: s.answeredCount,
      streak: s.streak
    };
    saveProgress(progress);
  }

  function finishChapter() {
    var s = state.session;
    var cp = chapterProgress(state.chapterKey);
    var accuracy = s.answeredCount ? (s.correctCount / s.answeredCount) * 100 : 0;
    s.accuracyThisRun = accuracy;
    cp.everCompleted = true;
    cp.bestAccuracy = Math.max(cp.bestAccuracy, accuracy);
    cp.bestStreak = Math.max(cp.bestStreak, s.streak);
    cp.resume = { questionIndex: 0, correctCount: 0, answeredCount: 0, streak: 0 };
    saveProgress(progress);
    state.screen = 'complete';
    render();
  }

  function advanceAfterFollowup() {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    s.currentIsFollowup = false;
    s.pendingFollowup = null;
    s.questionIndex += 1;
    s.answered = false;
    s.selection = null;
    persistResume();
    if (s.questionIndex >= ch.questions.length) { finishChapter(); return; }
    render();
  }

  function advanceAfterPrimary(wasCorrect) {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    var q = ch.questions[s.questionIndex];
    if (!wasCorrect && q.followup_question) {
      s.currentIsFollowup = true;
      s.pendingFollowup = q.followup_question;
      s.answered = false;
      s.selection = null;
      render();
      return;
    }
    s.questionIndex += 1;
    s.answered = false;
    s.selection = null;
    persistResume();
    if (s.questionIndex >= ch.questions.length) { finishChapter(); return; }
    render();
  }

  function handleAction(action, el) {
    if (action === 'enter-app') {
      state.screen = 'map';
      render();
    } else if (action === 'open-chapter') {
      state.chapterKey = el.getAttribute('data-chapter');
      state.screen = 'briefing';
      render();
    } else if (action === 'back-to-map') {
      removeFeedbackSheet();
      var po = document.getElementById('pause-overlay'); if (po) po.remove();
      state.screen = 'map';
      render();
    } else if (action === 'start-chapter') {
      startChapterSession(el.getAttribute('data-chapter'), false);
    } else if (action === 'restart-chapter') {
      startChapterSession(el.getAttribute('data-chapter'), true);
    } else if (action === 'pause') {
      state.paused = true;
      renderPauseOverlay();
    } else if (action === 'resume') {
      state.paused = false;
      var po2 = document.getElementById('pause-overlay'); if (po2) po2.remove();
    } else if (action === 'select-option') {
      if (state.session.answered) return;
      var qNow = currentQuestion();
      var idx = parseInt(el.getAttribute('data-index'), 10);
      if (qNow.mechanic === 'multiselect' && !state.session.currentIsFollowup) {
        if (!Array.isArray(state.session.selection)) state.session.selection = [];
        var pos = state.session.selection.indexOf(idx);
        if (pos !== -1) state.session.selection.splice(pos, 1);
        else if (state.session.selection.length < qNow.select_count) state.session.selection.push(idx);
        vibrate(8);
      } else {
        state.session.selection = idx;
      }
      render();
    } else if (action === 'select-node-tier') {
      if (state.session.answered) return;
      if (!Array.isArray(state.session.selection)) state.session.selection = [];
      state.session.selection[parseInt(el.getAttribute('data-node'), 10)] = el.getAttribute('data-tier');
      vibrate(8);
      render();
    } else if (action === 'confirm-answer') {
      var q = currentQuestion();
      var s = state.session;
      if (!canConfirm(q, s)) return;
      var correct = gradeCurrent(q, s);
      s.lastCorrect = correct;
      s.answered = true;
      if (!s.currentIsFollowup) {
        s.answeredCount += 1;
        if (correct) { s.correctCount += 1; s.streak += 1; } else { s.streak = 0; }
      }
      vibrate(correct ? 18 : [20, 40, 20]);
      render();
    } else if (action === 'continue') {
      removeFeedbackSheet();
      var s2 = state.session;
      var wasFollowup = s2.currentIsFollowup;
      var wasCorrect = s2.lastCorrect;
      if (wasFollowup) advanceAfterFollowup();
      else advanceAfterPrimary(wasCorrect);
    } else if (action === 'show-glossary') {
      renderGlossaryPopover(el.getAttribute('data-term'));
    } else if (action === 'close-glossary') {
      var go = document.getElementById('glossary-overlay'); if (go) go.remove();
    }
  }

  document.addEventListener('click', function (e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    handleAction(el.getAttribute('data-action'), el);
  });

  /* ---------- glossary auto-surface on new terms ---------- */
  var origRenderQuestion = renderQuestion;

  render();
})();
</script>
</body>
</html>
