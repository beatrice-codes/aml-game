<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="color-scheme" content="dark" id="color-scheme-meta">
<title>Compliance Grid</title>
<script>
  // Applied before first paint so switching to light theme never flashes dark first.
  (function () {
    try {
      var t = localStorage.getItem('complianceGridTheme_v1');
      if (t === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        document.getElementById('color-scheme-meta').setAttribute('content', 'light');
      }
    } catch (e) {}
  })();
</script>
<script src="content.js"></script>
<style>
  :root {
    --bg: #0a0a0d;
    --bg-glow: #1b1b26;
    --card: #15151c;
    --tile: #1c1c25;
    --well: #232330;
    --card-border: #26262f;
    --text: #eceef2;
    --text-dim: #9a9aa8;
    --text-faint: #66667a;
    --sage: #6b8f86;
    --sage-dim: #1e3430;
    --terracotta: #a56b5c;
    --terracotta-dim: #3d2420;
    --green: #7fc98f;
    --green-dim: #1c3324;
    --violet: #8b7cf6;
    --violet-dim: #322a5c;
    --thread: #d9c9a3;
    --on-accent: #0a0a0d;
    --glass: rgba(255,255,255,0.055);
    --glass-border: rgba(255,255,255,0.16);
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 10px;
  }

  :root[data-theme="light"] {
    --bg: #f4f4f7;
    --bg-glow: #ffffff;
    --card: #ffffff;
    --tile: #ffffff;
    --well: #e7e7ee;
    --card-border: #e1e1e9;
    --text: #17171c;
    --text-dim: #5c5c6b;
    --text-faint: #868692;
    --sage-dim: #dcece7;
    --terracotta-dim: #f9e1db;
    --green-dim: #dcf2e0;
    --violet-dim: #e9e5fc;
    --thread: #9c8657;
    --glass: rgba(0,0,0,0.04);
    --glass-border: rgba(0,0,0,0.13);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100%;
  }

  body {
    background:
      radial-gradient(circle at 50% -10%, var(--bg-glow) 0%, var(--bg) 55%);
    background-attachment: fixed;
    transition: background-color .25s ease;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding: env(safe-area-inset-top, 0) 16px env(safe-area-inset-bottom, 0);
    display: flex;
    flex-direction: column;
  }

  button {
    font-family: inherit;
    border: none;
    background: none;
    color: inherit;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button:disabled { opacity: 0.4; cursor: default; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 2px 8px;
    position: sticky;
    top: 0;
    z-index: 5;
    background: linear-gradient(var(--bg) 70%, transparent);
  }
  .topbar .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    background: var(--card);
    border: 1px solid var(--card-border);
  }
  .topbar .title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--text-dim);
  }
  .topbar .spacer { width: 40px; }

  h1, h2, h3, p { margin: 0; }

  .app-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 8px 0 2px;
  }
  .app-subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 20px;
  }

  .game-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 10px 0 26px;
    text-align: center;
  }
  .game-logo .mark {
    width: 42px;
    height: 42px;
    border-radius: 13px;
    background: linear-gradient(160deg, var(--violet-dim), var(--tile));
    border: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 21px;
    flex-shrink: 0;
  }
  .game-logo .word {
    font-size: 23px;
    font-weight: 800;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    background: linear-gradient(120deg, var(--text) 25%, var(--violet) 95%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .gate-line { animation: gate-breathe 3.4s ease-in-out infinite; }
  .gate-line-a { animation-name: gate-breathe-a; }
  .gate-line-b { animation-name: gate-breathe-b; }
  @keyframes gate-breathe-a {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(-2.2px); }
  }
  @keyframes gate-breathe-b {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(2.2px); }
  }

  .chapter-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 24px;
  }

  .chapter-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .chapter-card .row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .chapter-card .row1-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chapter-icon {
    font-size: 24px;
    line-height: 1;
    flex-shrink: 0;
    color: var(--text-dim);
    display: inline-flex;
  }
  .chapter-card .num {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 0.05em;
  }
  .chapter-card .name {
    font-size: 18px;
    font-weight: 600;
    margin-top: 2px;
  }
  .chapter-card .topic {
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.4;
  }
  .chapter-card .meta-row {
    display: flex;
    gap: 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .chapter-card .meta-row b { color: var(--text); }
  .chapter-card .meta-row .card-streak { color: var(--violet); font-weight: 700; }
  .chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: var(--violet-dim);
    color: var(--violet);
    font-size: 15px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 26px 22px;
  }
  /* Inside the three single-card screens (briefing/question/complete), the
     card grows to fill the space a short question would otherwise leave
     empty, and centers its own content rather than sitting cramped at the
     card's top edge. Long content (e.g. match-the-term) just overflows this
     minimum size exactly as before. */
  .centered-body .card {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 0;
  }

  .briefing-eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--violet);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .briefing-eyebrow svg { width: 14px; height: 14px; flex-shrink: 0; }
  .briefing-title {
    font-size: 24px;
    font-weight: 700;
    margin: 8px 0 12px;
    line-height: 1.2;
  }
  .briefing-desc {
    color: var(--text-dim);
    font-size: 14.5px;
    line-height: 1.55;
    margin-bottom: 18px;
  }
  .objectives {
    list-style: none;
    padding: 0;
    margin: 0 0 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .objectives li {
    display: flex;
    gap: 10px;
    font-size: 13.5px;
    line-height: 1.4;
    color: var(--text);
  }
  .objectives li::before {
    content: "";
    min-width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--sage);
    margin-top: 6px;
  }
  .article-range {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    border-top: 1px solid var(--card-border);
    padding-top: 14px;
  }

  .btn-primary {
    width: 100%;
    padding: 16px;
    border-radius: var(--radius-md);
    background: var(--violet);
    color: var(--on-accent);
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
  }
  .btn-secondary {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-md);
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text);
    font-weight: 600;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 10px;
  }

  .q-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    margin-bottom: 14px;
  }
  .diff-tag {
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .diff-easy { background: var(--sage-dim); color: var(--sage); }
  .diff-medium { background: var(--violet-dim); color: var(--violet); }
  .diff-hard { background: var(--terracotta-dim); color: var(--terracotta); }

  .task-prompt {
    font-size: 16.5px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 12px;
  }
  .scenario {
    background: var(--tile);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 6px;
  }
  .option-btn {
    text-align: left;
    padding: 15px 16px;
    border-radius: var(--radius-md);
    background: var(--tile);
    border: 1.5px solid var(--card-border);
    font-size: 14.5px;
    line-height: 1.4;
    transition: border-color .15s, background .15s;
    min-height: 48px;
  }
  .option-btn.selected {
    border-color: var(--violet);
    background: var(--violet-dim);
  }
  .option-btn.reveal-correct {
    border-color: var(--green);
    background: var(--green-dim);
  }
  .option-btn.reveal-wrong {
    border-color: var(--terracotta);
    background: var(--terracotta-dim);
  }
  .option-btn:disabled { opacity: 1; }

  .options.duo {
    flex-direction: row;
  }
  .options.duo .option-btn {
    flex: 1;
    text-align: center;
    font-weight: 700;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 64px;
  }


  .select-counter {
    display: inline-flex;
    align-items: center;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.03em;
    color: var(--text-dim);
    background: var(--tile);
    border: 1px solid var(--card-border);
    padding: 5px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .select-counter-done {
    color: var(--violet);
    border-color: var(--violet);
  }

  .gloss {
    color: var(--violet);
    border-bottom: 1px dotted var(--violet);
    cursor: pointer;
    white-space: nowrap;
  }
  .gloss sup { font-size: 9px; margin-left: 1px; }

  .feedback-sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 20;
    display: flex;
    justify-content: center;
    padding: 0 12px env(safe-area-inset-bottom, 0);
    pointer-events: none;
  }
  .feedback-sheet .inner {
    pointer-events: auto;
    width: 100%;
    max-width: 456px;
    max-height: 82vh;
    overflow-y: auto;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-bottom: none;
    border-radius: 22px 22px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0));
    box-shadow: 0 -12px 40px rgba(0,0,0,0.5);
    animation: sheet-up .22s ease-out;
  }
  @keyframes sheet-up {
    from { transform: translateY(16px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .feedback-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .feedback-label {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .feedback-label.ok { color: var(--green); }
  .feedback-label.no { color: var(--terracotta); }
  .feedback-minimize {
    width: 30px;
    height: 30px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    background: var(--tile);
    border: 1px solid var(--card-border);
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .feedback-text {
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 6px;
    white-space: pre-line;
  }
  .feedback-cite {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    margin-bottom: 16px;
  }
  .feedback-choice-row {
    display: flex;
    gap: 10px;
  }
  .feedback-choice-row .btn-primary,
  .feedback-choice-row .btn-secondary {
    margin-top: 0;
  }

  .feedback-tab {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 20;
    display: flex;
    justify-content: center;
    padding: 0 12px calc(16px + env(safe-area-inset-bottom, 0));
    pointer-events: none;
  }
  .feedback-tab-row {
    pointer-events: auto;
    display: flex;
    gap: 8px;
    animation: sheet-up .18s ease-out;
  }
  .feedback-tab button {
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 30px;
    padding: 11px 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    animation: sheet-up .18s ease-out;
  }
  .feedback-tab-row button { animation: none; }
  .feedback-tab-next {
    background: var(--violet);
    border-color: var(--violet);
    color: var(--on-accent);
  }
  .feedback-tab .fb-icon.ok { color: var(--green); }
  .feedback-tab .fb-icon.no { color: var(--terracotta); }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,8,11,0.86);
    backdrop-filter: blur(6px);
    z-index: 30;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .overlay-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 28px 24px;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }
  .overlay-card h2 { font-size: 20px; margin-bottom: 8px; }
  .overlay-card p { color: var(--text-dim); font-size: 14px; margin-bottom: 18px; line-height: 1.5; }

  .glossary-popover .overlay-card { text-align: left; }
  .glossary-term { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
  .glossary-def { font-size: 14px; line-height: 1.5; color: var(--text); margin-bottom: 10px; }
  .glossary-src { font-family: var(--mono); font-size: 11.5px; color: var(--text-faint); }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%);
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text-dim);
    font-size: 12.5px;
    padding: 10px 16px;
    border-radius: 30px;
    z-index: 40;
  }

  .streak-strip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--violet);
    margin-bottom: 12px;
    animation: streak-pop .28s ease-out;
  }
  @keyframes streak-pop {
    0% { transform: scale(0.85) translateY(2px); opacity: 0.4; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .option-btn.reveal-correct {
    animation: correct-pop .32s ease-out;
  }
  @keyframes correct-pop {
    0% { transform: scale(1); }
    45% { transform: scale(1.035); }
    100% { transform: scale(1); }
  }
  .option-btn.reveal-wrong {
    animation: wrong-shake .28s ease-out;
  }
  @keyframes wrong-shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .feedback-label .fb-icon {
    display: inline-block;
    animation: pop-in .3s ease-out;
  }
  @keyframes pop-in {
    0% { transform: scale(0.3); opacity: 0; }
    60% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); }
  }

  /* ---------- quickcall reflex mechanic ---------- */
  .quickcall-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .quickcall-progress {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }
  .quickcall-dots {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .quickcall-dots .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--well);
  }
  .quickcall-dots .dot.filled { background: var(--violet); }
  .quickcall-caption {
    text-align: center;
    font-size: 11.5px;
    color: var(--text-faint);
    margin-top: 10px;
  }
  .quickcall-scenario {
    position: relative;
    background: var(--tile);
    border: 1.5px solid var(--card-border);
    border-radius: var(--radius-md);
    padding: 20px 18px;
    font-size: 16px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 18px;
    text-align: center;
  }
  .quickcall-tick {
    position: absolute;
    top: -10px;
    right: -10px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    animation: quickcall-tick-in .3s cubic-bezier(.2,.8,.3,1.3);
  }
  .quickcall-tick.tick-correct { border-color: var(--green); color: var(--green); }
  .quickcall-tick.tick-wrong { border-color: var(--terracotta); color: var(--terracotta); }
  @keyframes quickcall-tick-in {
    0% { transform: scale(.3); opacity: 0; }
    70% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .quickcall-options {
    display: flex;
    gap: 10px;
  }
  .quickcall-options .option-btn {
    flex: 1;
    text-align: center;
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 76px;
  }

  .summary-stat-row {
    display: flex;
    gap: 10px;
    margin: 18px 0;
  }
  .summary-stat {
    flex: 1;
    background: var(--tile);
    border-radius: var(--radius-sm);
    padding: 14px 8px;
    text-align: center;
  }
  .summary-stat .n {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
  }
  .summary-stat .l {
    font-size: 10.5px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 3px;
  }
  .summary-stat.highlight {
    background: var(--violet-dim);
  }
  .summary-stat.highlight .n {
    color: var(--violet);
  }
  .complete-payoff {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--violet);
    letter-spacing: 0.02em;
    margin-bottom: 4px;
  }

  .footer-space { height: 24px; flex-shrink: 0; }

  .home-wrap {
    position: relative;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px 8px;
    gap: 4px;
  }

  /* ---------- theme toggle: small iOS-switch-style slider, dark/light ---------- */
  .theme-toggle {
    position: absolute;
    top: env(safe-area-inset-top, 0px);
    right: 8px;
    margin-top: 10px;
    width: 44px;
    height: 24px;
    border-radius: 999px;
    background: var(--well);
    border: 1px solid var(--card-border);
    padding: 2px;
    display: flex;
    align-items: center;
    transition: background .2s ease, border-color .2s ease;
  }
  .theme-toggle-thumb {
    position: relative;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--violet);
    flex-shrink: 0;
    transform: translateX(0);
    transition: transform .3s cubic-bezier(.3,.7,.3,1.15);
  }
  [data-theme="light"] .theme-toggle-thumb { transform: translateX(20px); }
  .theme-toggle-thumb svg {
    position: absolute;
    top: 50%; left: 50%;
    width: 12px; height: 12px;
    margin: -6px 0 0 -6px;
    color: var(--on-accent);
    transition: opacity .2s ease;
  }
  .theme-toggle-thumb .theme-icon-sun { opacity: 0; }
  [data-theme="light"] .theme-toggle-thumb .theme-icon-moon { opacity: 0; }
  [data-theme="light"] .theme-toggle-thumb .theme-icon-sun { opacity: 1; }
  .home-badge {
    width: 76px;
    height: 76px;
    border-radius: 24px;
    background: linear-gradient(160deg, var(--violet-dim), var(--tile));
    border: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin-bottom: 18px;
  }
  .home-title {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 10px;
  }
  .home-tagline {
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.5;
    max-width: 320px;
    margin-bottom: 18px;
  }
  .home-meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 0.03em;
  }
  .home-progress {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--violet);
    letter-spacing: 0.03em;
    margin-top: 6px;
  }
  .home-wrap .btn-primary {
    max-width: 260px;
    margin-top: 28px;
  }
  .home-wrap .btn-secondary {
    max-width: 260px;
  }
  .continue-card {
    width: 100%;
    max-width: 320px;
    background: var(--card);
    border: 1px solid var(--violet);
    border-radius: var(--radius-md);
    padding: 14px 18px;
    margin-top: 22px;
    text-align: left;
  }
  .continue-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--violet);
    margin-bottom: 4px;
  }
  .continue-name { font-size: 15px; font-weight: 600; }
  .continue-sub { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; }

  /* ---------- build the gate: assemble due-diligence checklist, gate opens/shuts ---------- */
  .gate-wrap { margin-bottom: 6px; }
  .gate-visual {
    position: relative;
    height: 92px;
    border-radius: var(--radius-md);
    background: var(--tile);
    border: 1.5px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }
  .gate-leaf {
    position: absolute;
    top: 50%;
    width: 20%;
    height: 2px;
    background: var(--violet);
    transition: transform .45s cubic-bezier(.2,.8,.2,1);
  }
  .gate-leaf.gate-left {
    left: 28%;
    transform-origin: left center;
    animation: gate-breathe-left 3.4s ease-in-out infinite;
  }
  .gate-leaf.gate-right {
    right: 28%;
    transform-origin: right center;
    animation: gate-breathe-right 3.4s ease-in-out infinite;
  }
  @keyframes gate-breathe-left {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(-1.5px); }
  }
  @keyframes gate-breathe-right {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(1.5px); }
  }
  .gate-visual.gate-open .gate-leaf.gate-left { animation: none; transform: rotate(38deg); }
  .gate-visual.gate-open .gate-leaf.gate-right { animation: none; transform: rotate(-38deg); }
  .gate-visual.gate-wrong { animation: wrong-shake .3s ease-out; }
  .gate-ripple {
    position: absolute;
    z-index: 3;
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 2px solid var(--green);
    display: flex; align-items: center; justify-content: center;
    color: var(--green);
    font-size: 18px;
    animation: gate-ripple .5s ease-out;
  }
  @keyframes gate-ripple {
    0% { transform: scale(0.3); opacity: 0; box-shadow: 0 0 0 0 var(--green-dim); }
    60% { opacity: 1; }
    100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 14px transparent; }
  }

  .tier-steps { display: flex; flex-direction: column; gap: 8px; margin-bottom: 6px; }
  .step-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    text-align: left;
    width: 100%;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    background: var(--tile);
    border: 1.5px solid var(--card-border);
    font-size: 13.5px;
    color: var(--text-dim);
    transition: border-color .15s, background .15s, color .15s;
  }
  .step-chip .chk {
    width: 18px; height: 18px;
    border-radius: 5px;
    border: 1.5px solid var(--text-faint);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .step-chip.active { color: var(--text); border-color: var(--violet); background: var(--violet-dim); }
  .step-chip.active .chk { background: var(--violet); border-color: var(--violet); color: var(--on-accent); }

  /* ---------- calm or alert: shape icons, no color-block zones ---------- */
  .calmalert-wrap { margin-bottom: 6px; }
  .calmalert-track { display: flex; align-items: center; justify-content: center; gap: 6px; }
  .calmalert-side {
    flex: 1;
    min-height: 116px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    text-align: center;
    background: var(--tile);
  }
  .calmalert-side svg { width: 34px; height: 34px; }
  .calmalert-side.side-calm { color: var(--sage); }
  .calmalert-side.side-alert { color: var(--terracotta); }
  .calmalert-side.selected { border-color: var(--violet); background: var(--violet-dim); color: var(--text); }
  .calmalert-side.selected:not(.reveal-correct):not(.reveal-wrong) { animation: calmalert-pop .22s ease-out; }
  @keyframes calmalert-pop {
    0% { transform: scale(0.9); }
    55% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }
  .calmalert-dots {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .calmalert-dots span {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--text-faint);
  }

  /* ---------- stamp: tap a tile, rubber-stamp pop-in ---------- */
  .stamp-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 6px;
  }
  .stamp-tile {
    position: relative;
    flex: 1 1 calc(50% - 5px);
    min-width: 120px;
    text-align: left;
    padding: 15px 16px;
    border-radius: var(--radius-md);
    background: var(--tile);
    border: 1.5px solid var(--card-border);
    font-size: 14px;
    line-height: 1.35;
  }
  .stamp-tile.numeric { flex: 1 1 calc(25% - 8px); min-width: 70px; text-align: center; font-weight: 700; font-size: 16px; }
  /* Default: a small corner badge, so the verdict never covers multi-line option
     text. Only the numeric variant (always short, e.g. "25%") gets the bigger
     centered stamp — there's no text underneath it to obscure. */
  .stamp-mark {
    position: absolute;
    top: -9px; right: -9px;
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid var(--violet);
    color: var(--violet);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    background: var(--card);
    animation: stamp-pop .35s cubic-bezier(.2,.8,.3,1.4);
  }
  .stamp-tile.numeric .stamp-mark {
    top: 50%; left: 50%; right: auto;
    margin: -17px 0 0 -17px;
    width: 34px; height: 34px;
    font-size: 13px;
  }
  .stamp-tile.reveal-correct .stamp-mark { border-color: var(--green); color: var(--green); }
  .stamp-tile.reveal-wrong .stamp-mark { border-color: var(--terracotta); color: var(--terracotta); }
  .stamp-tile.reveal-correct { border-color: var(--green); background: var(--green-dim); }
  .stamp-tile.reveal-wrong { border-color: var(--terracotta); background: var(--terracotta-dim); }
  @keyframes stamp-pop {
    0% { transform: scale(0.3) rotate(-18deg); opacity: 0; }
    100% { transform: scale(1) rotate(-8deg); opacity: 1; }
  }

  /* ---------- flip card: true/false, both options always visible ---------- */
  .flipcard-wrap { margin-bottom: 6px; perspective: 900px; }
  .flipcard-face {
    min-height: 120px;
    border-radius: var(--radius-md);
    background: var(--tile);
    border: 1.5px solid var(--card-border);
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 16px;
    transform-style: preserve-3d;
    transition: transform .5s cubic-bezier(.3,.6,.3,1);
    backface-visibility: hidden;
    position: relative;
  }
  .flipcard-face.flipped { transform: rotateY(180deg); }
  .flipcard-back {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    border-radius: var(--radius-md);
    background: var(--violet-dim);
    border: 1.5px solid var(--violet);
    font-size: 14px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
    backface-visibility: hidden;
    transform: rotateY(180deg);
  }
  .flipcard-options { display: flex; gap: 10px; }
  .flipcard-options .option-btn { flex: 1; }

  /* ---------- match the term: two columns, thread draws on a match ---------- */
  .match-wrap { position: relative; margin-bottom: 6px; }
  .match-cols { display: flex; gap: 14px; position: relative; z-index: 1; }
  .match-col { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .match-tile {
    position: relative;
    min-height: 68px;
    display: flex;
    align-items: center;
    text-align: left;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    background: var(--tile);
    border: 1.5px solid var(--card-border);
    font-size: 13px;
    line-height: 1.35;
    transition: border-color .15s, background .15s, opacity .15s;
  }
  .match-tile.selected { border-color: var(--violet); background: var(--violet-dim); }
  .match-tile.solved { border-color: var(--violet); background: var(--violet-dim); opacity: 0.75; }
  .match-tile.wrong-flash { border-color: var(--terracotta); animation: wrong-shake .3s ease-out; }
  .match-peg {
    position: absolute;
    top: 50%;
    width: 5px;
    height: 5px;
    margin-top: -2.5px;
    border-radius: 50%;
    background: var(--violet);
  }
  .match-peg.peg-right { right: -2.5px; }
  .match-peg.peg-left { left: -2.5px; }
  .match-threads {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: visible;
  }
  .match-threads path {
    fill: none;
    stroke: var(--thread);
    stroke-width: 1.6;
    stroke-linecap: round;
  }
  .match-hint { text-align: center; font-size: 11.5px; color: var(--text-faint); margin-top: 10px; }

  /* ---------- order the chain: drag to reorder, glassy stack ---------- */
  .chain-wrap { margin-bottom: 6px; }
  .chain-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .chain-slot-label {
    width: 34px;
    flex-shrink: 0;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    text-align: right;
  }
  .chain-item {
    flex: 1;
    padding: 14px 16px;
    border-radius: 16px;
    background: var(--glass);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    border: 1px solid var(--glass-border);
    font-size: 14px;
    line-height: 1.35;
    touch-action: none;
    user-select: none;
    transition: background .18s, border-color .18s, transform .18s;
  }
  .chain-item.dragging {
    background: rgba(139,124,246,0.16);
    border-color: rgba(139,124,246,0.55);
    transform: scale(1.04);
    z-index: 5;
    position: relative;
  }
  .chain-wrap.wrong .chain-item { animation: wrong-shake .3s ease-out; }

  /* ---------- spot the outlier: tap the odd one out — scattered chip grid, one card pops ---------- */
  .outlier-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 6px;
  }
  .outlier-chip {
    position: relative;
    text-align: left;
    padding: 18px 14px 14px;
    border-radius: 4px 18px 18px 18px;
    background: var(--tile);
    border: 1.5px solid var(--card-border);
    font-size: 13.5px;
    line-height: 1.35;
    transition: transform .18s, opacity .18s, border-color .15s, background .15s;
  }
  .outlier-chip .outlier-idx {
    position: absolute;
    top: 7px; left: 11px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
  }
  .outlier-chip .outlier-label-text { display: block; margin-top: 12px; }
  .outlier-chip:nth-child(4n+1) { transform: rotate(-1.2deg); }
  .outlier-chip:nth-child(4n+2) { transform: rotate(0.9deg); }
  .outlier-chip:nth-child(4n+3) { transform: rotate(0.6deg); }
  .outlier-chip:nth-child(4n+4) { transform: rotate(-0.8deg); }
  .outlier-chip.selected {
    border-color: var(--violet);
    background: var(--violet-dim);
    transform: rotate(0deg) scale(1.02);
  }
  .outlier-chip.reveal-correct {
    border-color: var(--green);
    background: var(--green-dim);
    transform: rotate(0deg) scale(1.05);
    z-index: 1;
  }
  .outlier-chip.reveal-wrong {
    border-color: var(--terracotta);
    background: var(--terracotta-dim);
    transform: rotate(0deg);
  }
  .outlier-chip.outlier-fade {
    opacity: 0.4;
    transform: rotate(0deg);
  }

  /* ---------- screen/question transitions: brief fade+slide, no hard cuts ---------- */
  .screen-enter {
    animation: screen-fade-in .2s ease-out;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  @keyframes screen-fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- centered body: fills the space below the topbar instead of
     leaving a dead gap, so a short question/briefing/summary doesn't look
     stranded at the top of a tall screen ---------- */
  .centered-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 0;
  }

  /* ---------- press feedback: every interactive element compresses slightly on tap ---------- */
  button:active,
  .option-btn:active,
  .step-chip:active,
  .stamp-tile:active,
  .match-tile:active,
  .chapter-card:active,
  .continue-card:active,
  .icon-btn:active {
    transform: scale(0.97);
  }
  .outlier-chip:active { transform: scale(0.97) rotate(0deg); }
  .calmalert-side.selected:active,
  .option-btn.selected:active { transform: scale(0.98); }

  /* ---------- juice 1: particle burst on gate/stamp success ---------- */
  .burst-dot {
    position: fixed;
    top: 0; left: 0;
    width: 5px; height: 5px;
    margin: -2.5px 0 0 -2.5px;
    border-radius: 50%;
    background: var(--green);
    pointer-events: none;
    z-index: 999;
    animation: burst-dot .6s ease-out forwards;
  }
  @keyframes burst-dot {
    0% { transform: translate(0, 0) scale(.4); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(1); opacity: 0; }
  }

  /* ---------- juice 2: stroke-drawn checkmark (gate ripple / stamp correct mark) ---------- */
  .draw-check { display: block; overflow: visible; }
  .draw-check path { fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; }

  /* ---------- juice 4: ripple from the actual tap point (primary buttons) ---------- */
  .btn-primary, .btn-secondary { position: relative; overflow: hidden; }
  .tap-ripple {
    position: absolute;
    top: 0; left: 0;
    width: 12px; height: 12px;
    margin: -6px 0 0 -6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.55);
    pointer-events: none;
    animation: tap-ripple-out .5s ease-out forwards;
  }
  @keyframes tap-ripple-out {
    from { transform: scale(0); opacity: .55; }
    to { transform: scale(4); opacity: 0; }
  }

  /* ---------- juice 5: liquid-fill chapter progress bar ---------- */
  .progress-track {
    height: 5px;
    border-radius: 3px;
    background: var(--well);
    overflow: hidden;
    margin-top: 2px;
  }
  .liquid-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--violet);
    width: 0%;
    transition: width 1s cubic-bezier(.2,.8,.2,1);
  }

  /* ---------- juice 6: bounce-overshoot press on the Confirm button ---------- */
  @keyframes btn-overshoot {
    0% { transform: scale(1); }
    40% { transform: scale(.9); }
    70% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  .btn-overshoot { animation: btn-overshoot .4s ease-out; }
</style>
