<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="color-scheme" content="dark">
<title>Compliance Grid</title>
<script src="content.js"></script>
<style>
  :root {
    --bg: #0a0a0d;
    --card: #15151c;
    --card-border: #26262f;
    --text: #eceef2;
    --text-dim: #9a9aa8;
    --text-faint: #66667a;
    --teal: #2dd4bf;
    --teal-dim: #164e46;
    --amber: #f5a524;
    --amber-dim: #4d380f;
    --red: #f5455c;
    --red-dim: #4d1620;
    --violet: #8b7cf6;
    --violet-dim: #322a5c;
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100%;
  }

  body {
    background:
      radial-gradient(circle at 50% -10%, #1b1b26 0%, var(--bg) 55%);
    background-attachment: fixed;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding: env(safe-area-inset-top, 0) 16px env(safe-area-inset-bottom, 0);
    display: flex;
    flex-direction: column;
  }

  button {
    font-family: inherit;
    border: none;
    background: none;
    color: inherit;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button:disabled { opacity: 0.4; cursor: default; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 2px 8px;
    position: sticky;
    top: 0;
    z-index: 5;
    background: linear-gradient(var(--bg) 70%, transparent);
  }
  .topbar .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    background: var(--card);
    border: 1px solid var(--card-border);
  }
  .topbar .title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--text-dim);
  }
  .topbar .spacer { width: 40px; }

  h1, h2, h3, p { margin: 0; }

  .app-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 8px 0 2px;
  }
  .app-tagline {
    font-size: 14.5px;
    font-style: italic;
    color: var(--violet);
    margin: 2px 0 8px;
    line-height: 1.4;
  }
  .app-subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .chapter-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 24px;
  }

  .chapter-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .chapter-card .row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .chapter-card .num {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 0.05em;
  }
  .chapter-card .name {
    font-size: 18px;
    font-weight: 600;
    margin-top: 2px;
  }
  .chapter-card .topic {
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.4;
  }
  .chapter-card .meta-row {
    display: flex;
    gap: 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .chapter-card .meta-row b { color: var(--text); }
  .progress-track {
    height: 5px;
    border-radius: 3px;
    background: #232330;
    overflow: hidden;
    margin-top: 2px;
    margin-bottom: 12px;
  }
  .progress-fill {
    height: 100%;
    background: var(--violet);
    border-radius: 3px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: var(--violet-dim);
    color: var(--violet);
    font-size: 15px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 22px;
  }

  .briefing-eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--violet);
    text-transform: uppercase;
  }
  .briefing-title {
    font-size: 24px;
    font-weight: 700;
    margin: 8px 0 12px;
    line-height: 1.2;
  }
  .briefing-desc {
    color: var(--text-dim);
    font-size: 14.5px;
    line-height: 1.55;
    margin-bottom: 18px;
  }
  .objectives {
    list-style: none;
    padding: 0;
    margin: 0 0 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .objectives li {
    display: flex;
    gap: 10px;
    font-size: 13.5px;
    line-height: 1.4;
    color: var(--text);
  }
  .objectives li::before {
    content: "";
    min-width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--teal);
    margin-top: 6px;
  }
  .article-range {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    border-top: 1px solid var(--card-border);
    padding-top: 14px;
  }

  .btn-primary {
    width: 100%;
    padding: 16px;
    border-radius: var(--radius-md);
    background: var(--violet);
    color: #0a0a0d;
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
  }
  .btn-secondary {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-md);
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text);
    font-weight: 600;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 10px;
  }

  .q-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    margin-bottom: 14px;
  }
  .diff-tag {
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .diff-easy { background: var(--teal-dim); color: var(--teal); }
  .diff-medium { background: var(--amber-dim); color: var(--amber); }
  .diff-hard { background: var(--red-dim); color: var(--red); }

  .task-prompt {
    font-size: 16.5px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 12px;
  }
  .scenario {
    background: #1c1c25;
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .checklist-hint {
    font-size: 12.5px;
    color: var(--text-faint);
    margin-bottom: 10px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 6px;
  }
  .option-btn {
    text-align: left;
    padding: 15px 16px;
    border-radius: var(--radius-md);
    background: #1c1c25;
    border: 1.5px solid var(--card-border);
    font-size: 14.5px;
    line-height: 1.4;
    transition: border-color .15s, background .15s;
    min-height: 48px;
  }
  .option-btn.selected {
    border-color: var(--violet);
    background: var(--violet-dim);
  }
  .option-btn.reveal-correct {
    border-color: var(--teal);
    background: var(--teal-dim);
  }
  .option-btn.reveal-wrong {
    border-color: var(--red);
    background: var(--red-dim);
  }
  .option-btn:disabled { opacity: 1; }
  .chk-mark {
    display: inline-block;
    width: 20px;
    margin-right: 6px;
  }

  .node-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 6px;
  }
  .node-card {
    background: #1c1c25;
    border: 1.5px solid var(--card-border);
    border-radius: var(--radius-md);
    padding: 13px 15px;
  }
  .node-label {
    font-size: 13.5px;
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .tier-row {
    display: flex;
    gap: 8px;
  }
  .tier-btn {
    flex: 1;
    padding: 9px 4px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--card-border);
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .tier-btn.tier-low { color: var(--teal); }
  .tier-btn.tier-medium { color: var(--amber); }
  .tier-btn.tier-high { color: var(--red); }
  .tier-btn.tier-selected.tier-low { background: var(--teal-dim); border-color: var(--teal); }
  .tier-btn.tier-selected.tier-medium { background: var(--amber-dim); border-color: var(--amber); }
  .tier-btn.tier-selected.tier-high { background: var(--red-dim); border-color: var(--red); }
  .tier-btn.tier-reveal-correct { outline: 2px solid var(--teal); }
  .tier-btn.tier-reveal-wrong { outline: 2px solid var(--red); }

  .gloss {
    color: var(--violet);
    border-bottom: 1px dotted var(--violet);
    cursor: pointer;
    white-space: nowrap;
  }
  .gloss sup { font-size: 9px; margin-left: 1px; }

  .feedback-sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 20;
    display: flex;
    justify-content: center;
    padding: 0 12px env(safe-area-inset-bottom, 0);
    pointer-events: none;
  }
  .feedback-sheet .inner {
    pointer-events: auto;
    width: 100%;
    max-width: 456px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-bottom: none;
    border-radius: 22px 22px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0));
    box-shadow: 0 -12px 40px rgba(0,0,0,0.5);
    animation: sheet-up .22s ease-out;
  }
  @keyframes sheet-up {
    from { transform: translateY(16px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .feedback-label {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .feedback-label.ok { color: var(--teal); }
  .feedback-label.no { color: var(--red); }
  .feedback-text {
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 6px;
    white-space: pre-line;
  }
  .feedback-cite {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    margin-bottom: 16px;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,8,11,0.86);
    backdrop-filter: blur(6px);
    z-index: 30;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .overlay-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 28px 24px;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }
  .overlay-card h2 { font-size: 20px; margin-bottom: 8px; }
  .overlay-card p { color: var(--text-dim); font-size: 14px; margin-bottom: 18px; line-height: 1.5; }

  .glossary-popover .overlay-card { text-align: left; }
  .glossary-term { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
  .glossary-def { font-size: 14px; line-height: 1.5; color: var(--text); margin-bottom: 10px; }
  .glossary-src { font-family: var(--mono); font-size: 11.5px; color: var(--text-faint); }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%);
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text-dim);
    font-size: 12.5px;
    padding: 10px 16px;
    border-radius: 30px;
    z-index: 40;
  }

  .streak-strip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--amber);
    margin-bottom: 12px;
  }

  .summary-stat-row {
    display: flex;
    gap: 10px;
    margin: 18px 0;
  }
  .summary-stat {
    flex: 1;
    background: #1c1c25;
    border-radius: var(--radius-sm);
    padding: 14px 8px;
    text-align: center;
  }
  .summary-stat .n {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
  }
  .summary-stat .l {
    font-size: 10.5px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 3px;
  }

  .footer-space { height: 24px; flex-shrink: 0; }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  'use strict';

  /* ---------- content ---------- */
  var APP_CONTENT = window.__COMPLIANCE_GRID_CONTENT__ || { chapters: [], glossary: [] };

  var CHAPTER_ORDER = ['foundations', 'sow', 'the_gate', 'enhanced_measures', 'the_flag'];

  /* ---------- storage ---------- */
  var STORAGE_KEY = 'complianceGridProgress_v2';

  function defaultChapterProgress() {
    return {
      everCompleted: false,
      bestAccuracy: 0,
      bestStreak: 0,
      lastRunAccuracy: 0,
      lastMistakes: [],
      lastDifficultyStats: null,
      resume: { questionIndex: 0, correctCount: 0, answeredCount: 0, streak: 0 }
    };
  }

  function loadProgress() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { chapters: {} };
      var parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== 'object') return { chapters: {} };
      if (!parsed.chapters) parsed.chapters = {};
      return parsed;
    } catch (e) {
      return { chapters: {} };
    }
  }

  function saveProgress(p) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
    } catch (e) {
      showToast('Progress could not be saved on this device.');
    }
  }

  var progress = loadProgress();

  function chapterProgress(key) {
    if (!progress.chapters[key]) progress.chapters[key] = defaultChapterProgress();
    return progress.chapters[key];
  }

  /* ---------- app state ---------- */
  var state = {
    screen: 'map',
    chapterKey: null,
    paused: false,
    session: null,     // { questionIndex, correctCount, answeredCount, streak, answered, selection, optionOrder, pendingFollowup, currentIsFollowup, missedThisRun, difficultyStats }
    introducedTerms: {}
  };

  function getChapter(key) {
    for (var i = 0; i < APP_CONTENT.chapters.length; i++) {
      if (APP_CONTENT.chapters[i].chapter_key === key) return APP_CONTENT.chapters[i];
    }
    return null;
  }

  function glossaryTerm(name) {
    var lower = (name || '').toLowerCase();
    for (var i = 0; i < APP_CONTENT.glossary.length; i++) {
      if (APP_CONTENT.glossary[i].term.toLowerCase() === lower) return APP_CONTENT.glossary[i];
    }
    return null;
  }

  /* ---------- glossary text annotation ---------- */
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function annotateGlossary(text) {
    if (!text) return '';
    var terms = APP_CONTENT.glossary.slice().sort(function (a, b) { return b.term.length - a.term.length; });
    var escaped = escapeHtml(text);
    terms.forEach(function (g) {
      var esc = g.term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      var re = new RegExp('\\b(' + esc + ')\\b', 'gi');
      escaped = escaped.replace(re, function (m) {
        return '<span class="gloss" data-action="show-glossary" data-term="' + escapeHtml(g.term) + '">' + m + '<sup class="qmark">?</sup></span>';
      });
    });
    return escaped;
  }

  function markIntroduced(chapterKey, text) {
    if (!text) return;
    if (!state.introducedTerms[chapterKey]) state.introducedTerms[chapterKey] = {};
    APP_CONTENT.glossary.forEach(function (g) {
      var re = new RegExp('\\b' + g.term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
      if (re.test(text)) state.introducedTerms[chapterKey][g.term] = true;
    });
  }

  /* ---------- haptics ---------- */
  function vibrate(pattern) {
    try { if ('vibrate' in navigator) navigator.vibrate(pattern); } catch (e) {}
  }

  /* ---------- toast ---------- */
  var toastTimer = null;
  function showToast(msg) {
    var el = document.getElementById('toast');
    if (!el) {
      el = document.createElement('div');
      el.id = 'toast';
      el.className = 'toast';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.style.display = 'none'; }, 2600);
  }

  /* ---------- rendering ---------- */
  var app = document.getElementById('app');

  function render() {
    if (state.screen === 'map') return renderMap();
    if (state.screen === 'briefing') return renderBriefing();
    if (state.screen === 'question') return renderQuestion();
    if (state.screen === 'retry-offer') return renderRetryOffer();
    if (state.screen === 'summary') return renderSummary();
    if (state.screen === 'mistakes') return renderMistakes();
  }

  function topbar(opts) {
    opts = opts || {};
    var left = opts.back
      ? '<button class="icon-btn" data-action="back-to-map">←</button>'
      : '<span class="spacer"></span>';
    var right = opts.pause
      ? '<button class="icon-btn" data-action="pause">⏸</button>'
      : '<span class="spacer"></span>';
    return '<div class="topbar">' + left +
      '<span class="title">' + (opts.title || '') + '</span>' + right + '</div>';
  }

  function shortTitle(ch) {
    return ch.briefing.title.split(':')[0].split('—')[0].trim() || ch.briefing.title;
  }

  function renderMap() {
    var html = topbar({});
    html += '<h1 class="app-title">Compliance Grid</h1>';
    html += '<p class="app-tagline">Learn to stop money laundering by playing the system that stops it.</p>';
    html += '<p class="app-subtitle">A training game for everyone at Pay.com — no AML background needed. Play any chapter, in any order, at your own pace.</p>';
    html += '<div class="chapter-list">';
    APP_CONTENT.chapters.slice().sort(function (a, b) {
      return CHAPTER_ORDER.indexOf(a.chapter_key) - CHAPTER_ORDER.indexOf(b.chapter_key);
    }).forEach(function (ch) {
      var idx = CHAPTER_ORDER.indexOf(ch.chapter_key);
      var cp = chapterProgress(ch.chapter_key);
      var total = ch.questions.length;
      var completionPct = cp.everCompleted ? 100 : Math.round((cp.resume.questionIndex / total) * 100);
      html += '<div class="chapter-card" data-action="open-chapter" data-chapter="' + ch.chapter_key + '">';
      html += '<div class="row1"><div>';
      html += '<div class="num">CHAPTER ' + (idx + 1) + ' / ' + CHAPTER_ORDER.length + '</div>';
      html += '<div class="name">' + escapeHtml(shortTitle(ch)) + '</div>';
      html += '</div>';
      html += '<span class="chip">' + (cp.everCompleted ? '✓' : '▶') + '</span>';
      html += '</div>';
      html += '<div class="progress-track"><div class="progress-fill" style="width:' + Math.min(completionPct, 100) + '%"></div></div>';
      html += '<div class="meta-row"><span>PROGRESS <b>' + completionPct + '%</b></span><span>BEST <b>' + Math.round(cp.bestAccuracy) + '%</b></span></div>';
      html += '</div>';
    });
    html += '</div><div class="footer-space"></div>';
    app.innerHTML = html;
  }

  function renderBriefing() {
    var ch = getChapter(state.chapterKey);
    var cp = chapterProgress(state.chapterKey);
    var midway = !cp.everCompleted && cp.resume.questionIndex > 0;
    var html = topbar({ back: true, title: 'Chapter briefing' });
    html += '<div class="card">';
    html += '<div class="briefing-eyebrow">Briefing</div>';
    html += '<div class="briefing-title">' + escapeHtml(ch.briefing.title) + '</div>';
    html += '<div class="briefing-desc">' + escapeHtml(ch.briefing.description) + '</div>';
    html += '<ul class="objectives">';
    ch.briefing.objectives.forEach(function (o) { html += '<li>' + escapeHtml(o) + '</li>'; });
    html += '</ul>';
    html += '<div class="article-range">' + escapeHtml(ch.briefing.article_range) + '</div>';
    html += '</div>';
    html += '<button class="btn-primary" data-action="start-chapter" data-chapter="' + ch.chapter_key + '">' +
      (midway ? 'Resume ▶' : 'Start ▶') + '</button>';
    if (midway || cp.everCompleted) {
      html += '<button class="btn-secondary" data-action="restart-chapter" data-chapter="' + ch.chapter_key + '">⟳ Start over</button>';
    }
    html += '<div class="footer-space"></div>';
    app.innerHTML = html;
  }

  function currentQuestion() {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    if (s.currentIsFollowup) return s.pendingFollowup;
    return ch.questions[s.questionIndex];
  }

  function shuffleIndices(n) {
    var arr = [];
    for (var i = 0; i < n; i++) arr.push(i);
    for (var i2 = arr.length - 1; i2 > 0; i2--) {
      var j = Math.floor(Math.random() * (i2 + 1));
      var tmp = arr[i2]; arr[i2] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  function resetQuestionState() {
    var s = state.session;
    var q = currentQuestion();
    s.answered = false;
    s.lastCorrect = null;
    var isChecklist = q.mechanic === 'checklist' && !s.currentIsFollowup;
    var isNodegrid = q.mechanic === 'nodegrid' && !s.currentIsFollowup;
    s.selection = (isChecklist || isNodegrid) ? [] : null;
    s.optionOrder = (!isNodegrid && q.options) ? shuffleIndices(q.options.length) : null;
  }

  function describeAnswer(q, s) {
    if (q.mechanic === 'nodegrid') {
      var yours = q.nodes.map(function (n, i) {
        return n.label.split(/[—-]/)[0].trim() + ': ' + ((s.selection || [])[i] || '—');
      }).join('; ');
      var correctN = q.nodes.map(function (n) {
        return n.label.split(/[—-]/)[0].trim() + ': ' + n.correctTier;
      }).join('; ');
      return { yours: yours, correct: correctN };
    }
    if (q.mechanic === 'checklist') {
      var sel = s.selection || [];
      var yoursL = sel.map(function (i) { return q.options[i].label; }).join(', ') || '(nothing selected)';
      var corrL = q.options.filter(function (o) { return o.correct; }).map(function (o) { return o.label; }).join(', ');
      return { yours: yoursL, correct: corrL };
    }
    var yoursOpt = q.options[s.selection];
    var corrOpt = q.options.filter(function (o) { return o.correct; })[0];
    return { yours: yoursOpt ? yoursOpt.label : '—', correct: corrOpt ? corrOpt.label : '—' };
  }

  function renderQuestion() {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    var q = currentQuestion();

    markIntroduced(state.chapterKey, (q.scenario || '') + ' ' + q.task_prompt);

    var html = topbar({ back: true, pause: true, title: ch.briefing.title });

    if (!s.currentIsFollowup) {
      var pct = Math.round((s.questionIndex / ch.questions.length) * 100);
      html += '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
    }

    if (s.streak >= 3) {
      html += '<div class="streak-strip">🔥 ' + s.streak + ' in a row</div>';
    }

    html += '<div class="q-meta">';
    if (!s.currentIsFollowup) {
      html += '<span>QUESTION ' + (s.questionIndex + 1) + ' / ' + ch.questions.length + '</span>';
      html += '<span class="diff-tag diff-' + q.difficulty + '">' + q.difficulty + '</span>';
    } else {
      html += '<span>FOLLOW-UP — SAME CONCEPT</span><span></span>';
    }
    html += '</div>';

    html += '<div class="card">';
    html += '<div class="task-prompt">' + annotateGlossary(q.task_prompt) + '</div>';
    if (q.scenario) html += '<div class="scenario">' + annotateGlossary(q.scenario) + '</div>';

    if (q.mechanic === 'nodegrid' && !s.currentIsFollowup) {
      html += renderNodegrid(q, s);
    } else if (q.mechanic === 'checklist' && !s.currentIsFollowup) {
      html += renderChecklist(q, s);
    } else {
      html += renderOptions(q, s);
    }
    html += '</div>';

    html += '<button class="btn-primary" data-action="confirm-answer" ' + (canConfirm(q, s) ? '' : 'disabled') + '>✓ Confirm</button>';
    html += '<div class="footer-space"></div>';

    app.innerHTML = html;

    if (s.answered) renderFeedbackSheet(q, s);
  }

  function renderOptions(q, s) {
    var order = s.optionOrder || q.options.map(function (_, i) { return i; });
    var html = '<div class="options">';
    order.forEach(function (i) {
      var opt = q.options[i];
      var cls = 'option-btn';
      if (!s.answered) {
        if (s.selection === i) cls += ' selected';
      } else {
        if (opt.correct) cls += ' reveal-correct';
        else if (s.selection === i) cls += ' reveal-wrong';
      }
      html += '<button class="' + cls + '" ' + (s.answered ? 'disabled' : '') +
        ' data-action="select-option" data-index="' + i + '">' + escapeHtml(opt.label) + '</button>';
    });
    html += '</div>';
    return html;
  }

  function renderChecklist(q, s) {
    var order = s.optionOrder || q.options.map(function (_, i) { return i; });
    var sel = s.selection || [];
    var html = '<div class="checklist-hint">Select every option that applies, then confirm.</div>';
    html += '<div class="options">';
    order.forEach(function (i) {
      var opt = q.options[i];
      var chosen = sel.indexOf(i) !== -1;
      var cls = 'option-btn checklist-btn';
      var mark;
      if (!s.answered) {
        if (chosen) cls += ' selected';
        mark = chosen ? '☑' : '☐';
      } else {
        if (opt.correct) cls += ' reveal-correct';
        else if (chosen) cls += ' reveal-wrong';
        mark = opt.correct ? '✓' : (chosen ? '✗' : '☐');
      }
      html += '<button class="' + cls + '" ' + (s.answered ? 'disabled' : '') +
        ' data-action="select-checklist" data-index="' + i + '"><span class="chk-mark">' + mark + '</span>' + escapeHtml(opt.label) + '</button>';
    });
    html += '</div>';
    return html;
  }

  function renderNodegrid(q, s) {
    var html = '<div class="node-list">';
    q.nodes.forEach(function (node, ni) {
      html += '<div class="node-card"><div class="node-label">' + annotateGlossary(node.label) + '</div>';
      html += '<div class="tier-row">';
      ['low', 'medium', 'high'].forEach(function (tier) {
        var cls = 'tier-btn tier-' + tier;
        var chosen = (s.selection || [])[ni] === tier;
        if (!s.answered) {
          if (chosen) cls += ' tier-selected';
        } else {
          if (tier === node.correctTier) cls += ' tier-reveal-correct';
          if (chosen && tier !== node.correctTier) cls += ' tier-reveal-wrong';
          if (chosen && tier === node.correctTier) cls += ' tier-selected';
        }
        html += '<button class="' + cls + '" ' + (s.answered ? 'disabled' : '') +
          ' data-action="select-node-tier" data-node="' + ni + '" data-tier="' + tier + '">' + tier + '</button>';
      });
      html += '</div></div>';
    });
    html += '</div>';
    return html;
  }

  function canConfirm(q, s) {
    if (s.answered) return false;
    if (q.mechanic === 'nodegrid' && !s.currentIsFollowup) {
      return q.nodes.every(function (_, i) { return !!(s.selection && s.selection[i]); });
    }
    if (q.mechanic === 'checklist' && !s.currentIsFollowup) {
      return Array.isArray(s.selection) && s.selection.length > 0;
    }
    return s.selection !== null && s.selection !== undefined;
  }

  function gradeCurrent(q, s) {
    if (q.mechanic === 'nodegrid' && !s.currentIsFollowup) {
      return q.nodes.every(function (node, i) { return s.selection[i] === node.correctTier; });
    }
    if (q.mechanic === 'checklist' && !s.currentIsFollowup) {
      var correctIdxs = [];
      q.options.forEach(function (o, i) { if (o.correct) correctIdxs.push(i); });
      var sel = (s.selection || []).slice().sort(function (a, b) { return a - b; });
      var corr = correctIdxs.slice().sort(function (a, b) { return a - b; });
      return sel.length === corr.length && sel.every(function (v, i) { return v === corr[i]; });
    }
    return !!(q.options[s.selection] && q.options[s.selection].correct);
  }

  function renderFeedbackSheet(q, s) {
    var correct = s.lastCorrect;
    var sheet = document.createElement('div');
    sheet.className = 'feedback-sheet';
    var body;
    if (s.currentIsFollowup) {
      if (correct) {
        body = 'Correct.';
      } else {
        var correctOpt = q.options.filter(function (o) { return o.correct; })[0];
        body = 'Not quite — the correct answer is: ' + escapeHtml(correctOpt ? correctOpt.label : '');
      }
    } else {
      body = annotateGlossary(correct ? q.correct_feedback : q.incorrect_feedback);
    }
    sheet.innerHTML =
      '<div class="inner">' +
      '<div class="feedback-label ' + (correct ? 'ok' : 'no') + '">' + (correct ? '✓ Correct' : '✗ Not quite') + '</div>' +
      '<div class="feedback-text">' + body + '</div>' +
      '<div class="feedback-cite">' + escapeHtml(q.article_citation || '') + '</div>' +
      '<button class="btn-primary" data-action="continue">Continue →</button>' +
      '</div>';
    document.body.appendChild(sheet);
  }

  function removeFeedbackSheet() {
    var el = document.querySelector('.feedback-sheet');
    if (el) el.remove();
  }

  function renderRetryOffer() {
    var ch = getChapter(state.chapterKey);
    var html = topbar({ back: true, pause: true, title: ch.briefing.title });
    html += '<div class="card">';
    html += '<div class="task-prompt">Want another shot at this concept?</div>';
    html += '<div class="scenario">Here’s a simpler follow-up question on the same idea — a good way to lock it in before moving on. Totally optional.</div>';
    html += '</div>';
    html += '<button class="btn-primary" data-action="accept-retry">Try a simpler one →</button>';
    html += '<button class="btn-secondary" data-action="decline-retry">No thanks, next question</button>';
    html += '<div class="footer-space"></div>';
    app.innerHTML = html;
  }

  function feedbackLine(cp) {
    var m = (cp.lastMistakes || []).length;
    if (m === 0) return 'Strong grasp of this chapter — every question was answered correctly on the first try.';
    var stats = cp.lastDifficultyStats || {};
    var weakest = null, weakestRate = 2;
    ['easy', 'medium', 'hard'].forEach(function (d) {
      var st = stats[d];
      if (st && st.total) {
        var rate = st.correct / st.total;
        if (rate < weakestRate) { weakestRate = rate; weakest = d; }
      }
    });
    var extra = weakest ? (' Focus area: ' + weakest + '-level questions.') : '';
    return m + ' question' + (m === 1 ? '' : 's') + ' needed a second attempt.' + extra;
  }

  function renderDifficultyBreakdown(stats) {
    var html = '<div class="meta-row" style="margin-top:10px;">';
    ['easy', 'medium', 'hard'].forEach(function (d) {
      var st = stats[d] || { correct: 0, total: 0 };
      html += '<span>' + d.toUpperCase() + ' <b>' + st.correct + '/' + st.total + '</b></span>';
    });
    html += '</div>';
    return html;
  }

  function renderSummary() {
    var ch = getChapter(state.chapterKey);
    var cp = chapterProgress(state.chapterKey);
    var html = topbar({ back: true, title: 'Your results' });
    html += '<div class="card">';
    html += '<div class="briefing-eyebrow">' + escapeHtml(shortTitle(ch)) + '</div>';
    html += '<div class="briefing-title">Chapter complete</div>';
    html += '<div class="summary-stat-row">';
    html += '<div class="summary-stat"><div class="n">' + Math.round(cp.lastRunAccuracy || 0) + '%</div><div class="l">Last score</div></div>';
    html += '<div class="summary-stat"><div class="n">' + Math.round(cp.bestAccuracy || 0) + '%</div><div class="l">Best</div></div>';
    html += '<div class="summary-stat"><div class="n">' + (cp.bestStreak || 0) + '</div><div class="l">Best streak</div></div>';
    html += '</div>';
    html += '<div class="briefing-desc">' + escapeHtml(feedbackLine(cp)) + '</div>';
    if (cp.lastDifficultyStats) html += renderDifficultyBreakdown(cp.lastDifficultyStats);
    html += '</div>';
    html += '<button class="btn-primary" data-action="restart-chapter" data-chapter="' + ch.chapter_key + '">▶ Play again</button>';
    if (cp.lastMistakes && cp.lastMistakes.length) {
      html += '<button class="btn-secondary" data-action="review-mistakes">🔍 Review mistakes (' + cp.lastMistakes.length + ')</button>';
    }
    html += '<button class="btn-secondary" data-action="view-briefing" data-chapter="' + ch.chapter_key + '">ℹ️ About this chapter</button>';
    html += '<div class="footer-space"></div>';
    app.innerHTML = html;
  }

  function renderMistakes() {
    var cp = chapterProgress(state.chapterKey);
    var html = topbar({ back: true, title: 'Review mistakes' });
    (cp.lastMistakes || []).forEach(function (m) {
      html += '<div class="card" style="margin-bottom:12px;">';
      html += '<div class="task-prompt">' + annotateGlossary(m.prompt) + '</div>';
      html += '<div class="scenario"><b>You answered:</b> ' + escapeHtml(m.yourAnswer) + '<br><b>Correct answer:</b> ' + escapeHtml(m.correctAnswer) + '</div>';
      html += '<div class="feedback-text">' + annotateGlossary(m.explanation || '') + '</div>';
      html += '<div class="feedback-cite">' + escapeHtml(m.citation || '') + '</div>';
      html += '</div>';
    });
    if (!cp.lastMistakes || !cp.lastMistakes.length) {
      html += '<div class="card"><div class="briefing-desc">No mistakes to review — nice work.</div></div>';
    }
    html += '<button class="btn-primary" data-action="back-to-summary">← Back to results</button>';
    html += '<div class="footer-space"></div>';
    app.innerHTML = html;
  }

  function renderPauseOverlay() {
    var el = document.createElement('div');
    el.className = 'overlay';
    el.id = 'pause-overlay';
    el.innerHTML =
      '<div class="overlay-card">' +
      '<h2>Paused</h2>' +
      '<p>Your progress is saved. Resume whenever you’re ready.</p>' +
      '<button class="btn-primary" data-action="resume">▶ Resume</button>' +
      '<button class="btn-secondary" data-action="back-to-map">← Back to map</button>' +
      '</div>';
    document.body.appendChild(el);
  }

  function renderGlossaryPopover(term) {
    var g = glossaryTerm(term);
    if (!g) return;
    var el = document.createElement('div');
    el.className = 'overlay glossary-popover';
    el.id = 'glossary-overlay';
    el.innerHTML =
      '<div class="overlay-card">' +
      '<div class="glossary-term">' + escapeHtml(g.term) + '</div>' +
      '<div class="glossary-def">' + escapeHtml(g.definition) + '</div>' +
      '<div class="glossary-src">' + escapeHtml(g.source) + '</div>' +
      '<button class="btn-primary" data-action="close-glossary">✓ Got it</button>' +
      '</div>';
    document.body.appendChild(el);
  }

  /* ---------- actions ---------- */
  function startChapterSession(key, restart) {
    var ch = getChapter(key);
    var cp = chapterProgress(key);
    state.chapterKey = key;
    if (restart) {
      cp.resume = { questionIndex: 0, correctCount: 0, answeredCount: 0, streak: 0 };
      saveProgress(progress);
    }
    state.session = {
      questionIndex: cp.resume.questionIndex || 0,
      correctCount: cp.resume.correctCount || 0,
      answeredCount: cp.resume.answeredCount || 0,
      streak: cp.resume.streak || 0,
      answered: false,
      selection: null,
      optionOrder: null,
      currentIsFollowup: false,
      pendingFollowup: null,
      lastCorrect: null,
      accuracyThisRun: 0,
      missedThisRun: [],
      difficultyStats: { easy: { correct: 0, total: 0 }, medium: { correct: 0, total: 0 }, hard: { correct: 0, total: 0 } }
    };
    if (state.session.questionIndex >= ch.questions.length) {
      state.session.questionIndex = 0;
    }
    resetQuestionState();
    state.screen = 'question';
    render();
  }

  function persistResume() {
    var cp = chapterProgress(state.chapterKey);
    var s = state.session;
    cp.resume = {
      questionIndex: s.questionIndex,
      correctCount: s.correctCount,
      answeredCount: s.answeredCount,
      streak: s.streak
    };
    saveProgress(progress);
  }

  function finishChapter() {
    var s = state.session;
    var cp = chapterProgress(state.chapterKey);
    var accuracy = s.answeredCount ? (s.correctCount / s.answeredCount) * 100 : 0;
    s.accuracyThisRun = accuracy;
    cp.everCompleted = true;
    cp.bestAccuracy = Math.max(cp.bestAccuracy, accuracy);
    cp.bestStreak = Math.max(cp.bestStreak, s.streak);
    cp.lastRunAccuracy = accuracy;
    cp.lastMistakes = s.missedThisRun.slice();
    cp.lastDifficultyStats = s.difficultyStats;
    cp.resume = { questionIndex: 0, correctCount: 0, answeredCount: 0, streak: 0 };
    saveProgress(progress);
    state.screen = 'summary';
    render();
  }

  function goToNextPrimaryQuestion() {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    s.questionIndex += 1;
    persistResume();
    if (s.questionIndex >= ch.questions.length) { finishChapter(); return; }
    resetQuestionState();
    state.screen = 'question';
    render();
  }

  function advanceAfterFollowup() {
    var s = state.session;
    s.currentIsFollowup = false;
    s.pendingFollowup = null;
    goToNextPrimaryQuestion();
  }

  function handlePrimaryContinue() {
    var ch = getChapter(state.chapterKey);
    var s = state.session;
    var q = ch.questions[s.questionIndex];
    if (s.lastCorrect || !q.followup_question) {
      goToNextPrimaryQuestion();
    } else {
      state.screen = 'retry-offer';
      render();
    }
  }

  function handleAction(action, el) {
    if (action === 'open-chapter') {
      state.chapterKey = el.getAttribute('data-chapter');
      var cpOpen = chapterProgress(state.chapterKey);
      state.screen = cpOpen.everCompleted ? 'summary' : 'briefing';
      render();
    } else if (action === 'back-to-map') {
      removeFeedbackSheet();
      var po = document.getElementById('pause-overlay'); if (po) po.remove();
      state.screen = 'map';
      render();
    } else if (action === 'start-chapter') {
      startChapterSession(el.getAttribute('data-chapter'), false);
    } else if (action === 'restart-chapter') {
      startChapterSession(el.getAttribute('data-chapter'), true);
    } else if (action === 'view-briefing') {
      state.screen = 'briefing';
      render();
    } else if (action === 'review-mistakes') {
      state.screen = 'mistakes';
      render();
    } else if (action === 'back-to-summary') {
      state.screen = 'summary';
      render();
    } else if (action === 'pause') {
      state.paused = true;
      renderPauseOverlay();
    } else if (action === 'resume') {
      state.paused = false;
      var po2 = document.getElementById('pause-overlay'); if (po2) po2.remove();
    } else if (action === 'select-option') {
      if (state.session.answered) return;
      state.session.selection = parseInt(el.getAttribute('data-index'), 10);
      render();
    } else if (action === 'select-checklist') {
      if (state.session.answered) return;
      var idxC = parseInt(el.getAttribute('data-index'), 10);
      if (!Array.isArray(state.session.selection)) state.session.selection = [];
      var posC = state.session.selection.indexOf(idxC);
      if (posC === -1) state.session.selection.push(idxC); else state.session.selection.splice(posC, 1);
      vibrate(6);
      render();
    } else if (action === 'select-node-tier') {
      if (state.session.answered) return;
      if (!Array.isArray(state.session.selection)) state.session.selection = [];
      state.session.selection[parseInt(el.getAttribute('data-node'), 10)] = el.getAttribute('data-tier');
      vibrate(8);
      render();
    } else if (action === 'confirm-answer') {
      var q = currentQuestion();
      var s = state.session;
      if (!canConfirm(q, s)) return;
      var correct = gradeCurrent(q, s);
      s.lastCorrect = correct;
      s.answered = true;
      if (!s.currentIsFollowup) {
        s.answeredCount += 1;
        if (correct) { s.correctCount += 1; s.streak += 1; } else { s.streak = 0; }
        var diff = (q.difficulty && s.difficultyStats[q.difficulty]) ? q.difficulty : null;
        if (diff) {
          s.difficultyStats[diff].total += 1;
          if (correct) s.difficultyStats[diff].correct += 1;
        }
        if (!correct) {
          var desc = describeAnswer(q, s);
          s.missedThisRun.push({
            id: q.id,
            prompt: q.task_prompt,
            yourAnswer: desc.yours,
            correctAnswer: desc.correct,
            explanation: q.incorrect_feedback,
            citation: q.article_citation
          });
        }
      }
      vibrate(correct ? 18 : [20, 40, 20]);
      render();
    } else if (action === 'continue') {
      removeFeedbackSheet();
      if (state.session.currentIsFollowup) advanceAfterFollowup();
      else handlePrimaryContinue();
    } else if (action === 'accept-retry') {
      var chR = getChapter(state.chapterKey);
      var sR = state.session;
      var qR = chR.questions[sR.questionIndex];
      sR.currentIsFollowup = true;
      sR.pendingFollowup = qR.followup_question;
      resetQuestionState();
      state.screen = 'question';
      render();
    } else if (action === 'decline-retry') {
      goToNextPrimaryQuestion();
    } else if (action === 'show-glossary') {
      renderGlossaryPopover(el.getAttribute('data-term'));
    } else if (action === 'close-glossary') {
      var go = document.getElementById('glossary-overlay'); if (go) go.remove();
    }
  }

  document.addEventListener('click', function (e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    handleAction(el.getAttribute('data-action'), el);
  });

  render();
})();
</script>
</body>
</html>
